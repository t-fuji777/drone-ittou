  {cat:2,lvl:"common",q:"以下の選択肢の中から、GNSSの測位精度に影響を及ぼす要素について適切ではないものを1つ選べ。",o:["GNSSの測位精度は、衛星に搭載された時計の精度や受信環境のノイズにも影響される。","一般的に位置精度は、高度方向の誤差に比べ、水平方向の誤差の方が小さい。","GNSSは最低4個以上の人工衛星からの信号を同時に受信することができれば、それ以上の人工衛星から受信をしても精度は向上しない。","障害物などによるマルチパスはGNSSの測位精度に影響を及ぼす。"],a:2,e:"GNSSの測位精度は、衛星の時計の精度、捕捉しているGNSS衛星の数、障害物などによるマルチパス、受信環境のノイズなどに影響されます。安定飛行のためには、より多くの人工衛星から信号を受信することが望ましいです。また、一般的に位置精度は、水平方向に比べて高度方向の誤差が大きくなります。",ref:"教則 第4章 4.4.3 GNSS"},
  {cat:2,lvl:"common",q:"以下の無人航空機の飛行に用いられるセンサの説明の中から、適切ではないものを１つ選べ。",o:["超音波センサは音波の反射時間から高度を計測する。","気圧センサは、気圧の変化を歪みゲージを利用して読み取り、高度を計測する。","ジャイロセンサは機体の角速度を計測する。","LiDARはレーザー光を地上に照射したときの出力値から高度を計測する。"],a:3,e:"高度センサには、気圧センサ、超音波センサ、LiDARなどがあり、それぞれ気圧の変化、音波の反射時間、レーザー光の反射時間から高度を計測します。LiDARは出力値ではなく、レーザー光を照射してから反射して戻るまでの時間により高度を計測します。",ref:"教則 第4章 4.3 機体の構成"},
  {cat:2,lvl:"common",q:"以下の選択肢の中から、エンジン機の整備について適切ではないものを1つ選べ。",o:["エンジンの整備知識が不足している場合は、専門の整備業者に依頼する。","エンジンの整備技能があれば、メーカーの整備項目は参考資料とし、自身で内容を決めるべきである。","整備で異常が確認された場合は、飛行を行う前に修理等の必要な措置を講じる。","一定の総飛行時間毎に、メーカーの整備手順に従って整備を実施する。"],a:1,e:"エンジン機の整備は、一定の総飛行時間毎に、メーカーが定めた整備手順に従って実施することが必要です。整備技能があっても、メーカーの整備項目を参考資料扱いとして自己判断で内容を決めることは適切ではありません。運航者がエンジンの整備に関する知識及び技能が不足している場合は、専門の整備業者に依頼しましょう。",ref:"教則 第4章 4.5.2 エンジン機における整備・点検"},
];
const Q_PILOT_X = [
  {cat:3,lvl:"common",q:"無人航空機のセキュリティについて、正しいものを１つ選べ。",o:["機体認証を受けた機体を使用することは、無人航空機のサイバーセキュリティ対策となる。","航空法に基づく機体認証・型式認証に係る安全基準には、サイバーセキュリティの観点からの適合性は含まれていない。","遠隔操作ではなく自動操縦されている無人航空機は、ハッキングされるリスクが少ないため、無人航空機のサイバーセキュリティ対策となる。","無人航空機のセキュリティ対策は機体の物理的な盗難防止のみを指し、プログラムの不正な書き換えの防止は含まれない。"],a:0,e:"無人航空機には盗難や悪用のリスクがあり、これらから守るためのセキュリティ対策が必要です。物理的な盗難防止だけでなく、プログラムに基づき自動又は自律で飛行するものについては、プログラムの不正な書き換えによる悪用の防止も含まれます。航空法に基づく機体認証・型式認証に係る安全基準ではサイバーセキュリティにも配慮されており、認証を受けた機体は一定のサイバーセキュリティ対策がなされているため、リスクの軽減策となります。",ref:"教則 第5章 5.1.4 セキュリティ（p.55）"},
  {cat:3,lvl:"common",q:"アルコール又は薬物に関する規定とその注意点について、正しいものを１つ選べ。",o:["アルコール検知器の使用は、飲酒を行った直後には有効だが、前日の飲酒については検知できない。","少量の飲酒であれば操縦への影響はないため、飛行直前の飲酒は認められている。","前日に飲酒した場合でも、睡眠前に大量の水を飲んだ場合は、翌日のアルコールの影響はないと考えてよい。","前夜に飲酒した場合でも、翌日の操縦時にアルコールの影響を受けている可能性があり、アルコール検知器の利用が有用である。"],a:3,e:"アルコールが体内から完全に排出されるまでには時間が必要であるため、前夜に飲酒した場合でも、翌日の操縦時にアルコールの影響を受けている可能性があります。アルコール検知器を活用し、適切なタイミングで飛行を開始することが重要です。なお、睡眠前に大量の水を飲んでも、翌日アルコールの影響を受ける可能性はあります。",ref:"教則 第5章 5.3.2 アルコール又は薬物に関する規定（p.61）"},
  {cat:3,lvl:"common",q:"操縦者のパフォーマンスの低下とその対策について、最も適切なものを１つ選べ。",o:["疲労は、操縦者自身にしかわからないことであるため、運航の計画に対策を組み込むことは困難である。","疲労や高いストレスは飛行の安全を妨げるため、適切な飛行時間管理とストレス軽減策を講じる必要がある。","熟練の操縦者とは疲労が溜まっていても、安全な飛行ができる者のことを指す。","疲労やストレスの影響は操縦経験を積むことで克服できるため、特段の対策は不要である。"],a:1,e:"操縦者が疲労を感じていたり高いストレスを抱えている状態は、安全な飛行を妨げる要因となります。適切に飛行時間を管理して疲労を防ぐことや、適切なコミュニケーションを通じてストレスの軽減を図ることが必要です。これらの対策は、飛行計画の作成、運航体制の構築、飛行前の準備、飛行中及び飛行後の対応といった一連の運航全般に係る計画に組み込むべきです。熟練の操縦者とは疲労を管理し、状況に応じて飛行計画を中止できる者です。",ref:"教則 第5章 5.3.1 操縦者のパフォーマンスの低下（p.61）"},
  {cat:3,lvl:"common",q:"無人航空機の飛行における補助者の役割について、適切ではないものを１つ選べ。",o:["補助者は第三者の立ち入り管理を行う。","補助者は技能・知識を有している必要があることから技能証明を受けた者のみがなれる。","補助者は飛行経路周辺の地上や空域の安全確認を行う。","補助者は操縦者に対して危険予知の警告や緊急着陸地点への誘導を行う。"],a:1,e:"無人航空機の飛行では、補助者が飛行準備や飛行経路の安全管理、第三者の立ち入り管理などを行います。操縦者とのコミュニケーションはあらかじめ決められた手段を用いて行い、危険予知の警告や緊急着陸地点への誘導、着陸後の機体回収や安全点検の補助も行います。これらの役割を遂行するため、飛行経路や範囲に応じた補助者の数や配置、各人の担当範囲や役割、異常運航時の対応方法も決めておく必要があります。なお、技能証明を有していない者も補助者になることは可能です。",ref:"教則 第5章 補助者の役割（p.62）"},
  {cat:3,lvl:"common",q:"機体のフェールセーフ機能について、最も適切なものを１つ選べ。",o:["フェールセーフ機能発動時の機体の動作は全ての機体で共通に固定されており、操縦者が設定を変更できる機体はない。","バッテリー残量が不足し飛行が継続できない場合、その場に着陸する機体は、フェールセーフ機能を有する機体とは言えない。","フェールセーフ機能とはホームポイントに自動帰還する機能のみを指す。","電波の不具合時にその場でホバリングする機能を有する機体は、フェールセーフ機能を有する機体と言える。"],a:3,e:"フェールセーフ機能は、送信電波や電源容量の減少などにより飛行の継続ができない場合や予想される場合に、自動帰還モードへ切り替わり離陸地点へ飛行するなどの動作を行うものです。バッテリー残量が極端に少ない場合などは、その場で自動着陸を試みます。機体によっては、フェールセーフ機能発動時の動作をホバリング、その地点での着陸、自動帰還などから設定できるものもあります。これらの機能は、飛行中の異常事態に対応し安全を確保するためのものです。",ref:"教則 第5章 5.2.2 フェールセーフ機能（p.59）"},
  {cat:3,lvl:"common",q:"ヘリコプターの離着陸について最も適切なものを１つ選べ。",o:["離着陸直前は機体が水平となるため、テール部が地面に接触するリスクを軽減する方法として傾斜地を選定する。","十分にローター回転が上昇してから地面効果外まで垂直方向に急上昇させること。","ローター半径以下の高度では、地面効果の影響が顕著となる。","着陸時は地面効果範囲内で長時間ホバリングを行い、機体を安定させてから接地する。"],a:2,e:"回転翼航空機（ヘリコプター）の離着陸では、十分なローター回転が必要であり、地面効果内での不安定性を避けるために速やかに機体を上昇させます。ただし、垂直方向の急上昇は避ける必要があります。ローター半径以下の高度では地面効果の影響が顕著となるため、地面効果範囲内でのホバリングは避け、速やかに着陸します。また、滑りやすい場所や、視界を遮る砂埃等が飛散する砂や乾燥した土地上での離陸は避けます。離着陸直前は機体が水平となり、傾斜地ではテール部などが地面に接触する恐れがあるため、水平な場所を選定します。",ref:"教則 第5章 5.2.1 ヘリコプターの離着陸（p.56）"},
  {cat:3,lvl:"common",q:"無人航空機の事故発生時(負傷者あり)に運航者が行うべき行動として、適切ではないものを１つ選べ。",o:["負傷者がいる場合には、第一にその負傷者の救護、救急車の手配を行う。","事故の日時や場所などの必要事項を国土交通大臣に報告する。","事故発生時においては、直ちに無人航空機の飛行を中止する。","事故発生時においては、国土交通大臣に報告しない場合は罰則があるが、救護しなかったことについて罰則は明記されていない。"],a:3,e:"無人航空機の運航者は、事故が発生した際には直ちに飛行を中止し、負傷者の救護や緊急通報、事故状況に応じた警察や消防への通報など、危険を防止するための措置を取ります。その後、事故の日時や場所などの必要事項を国土交通大臣に報告します。報告しなかった場合だけでなく、救護等の措置を取らなかった場合にも航空法上の罰則があります。",ref:"教則 第5章 5.1.2 異常事態発生時の措置（p.52）"},
  {cat:3,lvl:"common",q:"以下の選択肢の中から、無人航空機の運航に関する安全点検のプロセスについて適切ではないものを１つ選べ。",o:["飛行前の点検ではバッテリーのチェックや機体の異常チェックなど、無人航空機が正常に飛行できることを最終確認する。","点検は飛行前後に行うもので、飛行中に行う点検はないことが望ましい。","運航終了後の点検として、無人航空機やバッテリーを安全に保管するための確認や、飛行日誌の作成などが挙げられる。","運航当日の準備では、必要な装置や設備の設置を行い、飛行に必要な許可・承認や機体登録等の有効期間が切れていないかを確認する。"],a:1,e:"安全点検のプロセスは次のとおりです。1）運航当日の準備：必要な装置や設備の設置を行い、飛行に必要な許可・承認や機体登録等の有効期間が切れていないかを確認します。2）飛行前の点検：機体を飛行させる前に都度行うべき最終点検で、バッテリーや機体の異常の有無など、正常に飛行できることを最終確認します。3）飛行中の点検：飛行中の機体の状態や、飛行している機体の周囲の状況を確認します。4）飛行後の点検：着陸したあとに、各部品の摩耗等の状態を確認します。5）運航終了後の点検：機体やバッテリーを安全に保管するための確認や、飛行日誌の作成などを行います。6）異常事態発生時の点検：危機回避行動を行い、安全に着陸するための項目を確認します。このように、飛行中に行う点検も存在します。",ref:"教則 第5章 5.1.2 運航時の点検及び確認事項（p.52）"},
  {cat:3,lvl:"common",q:"TEM (Threat and Error Management)、CRM (Crew Resource Management)について、正しいものを１つ選べ。",o:["スレット（Threat）とは、操縦者のエラーによって生じる望ましくない航空機の状態のことをいう。","エラーにつながりかねないスレットの早期把握・管理することは「TEM」の考え方に含まれる。","CRMスキルには、操縦技能も含まれる。","無人航空機の安全マージンの低下した状態を「TEM」という。"],a:1,e:"事故等の防止のためには、操縦技量（テクニカルスキル）の向上だけではヒューマンエラーを完全になくすことはできず、全ての利用可能な人的リソース、ハードウェア及び情報を活用する「CRM（Crew Resource Management）」という概念が有効です。CRMの効果を最大限発揮するために「TEM（Threat and Error Management）」という手法が取り入れられています。「スレット（Threat）」は「エラー（Error）」を誘発する要因（気象の変化、疲労、機材不具合など）であり、適切に対処できないと安全マージンの低下したUAS（Undesired Aircraft State：望ましくない航空機の状態）に至り、さらに事故等につながるおそれがあります。TEMは、全ての利用可能なリソースを活用してスレットの発生状況を早期に把握・管理し、万一エラーやUASに至っても事故等に至らないよう適切に対処しようとする手法です。TEMを効果的に実践するための能力は、状況認識、意思決定、ワークロード管理、チームワーク、コミュニケーションの5つのCRMスキル（ノンテクニカルスキル）であり、操縦技能は含まれません。",ref:"教則 第5章 5.4.1 CRM・TEM（p.62）"},
  {cat:3,lvl:"common",q:"無人航空機の操縦方法（自動操縦と手動操縦）について、最も適切なものを１つ選べ。",o:["自動操縦は再現性の低い飛行となるため、経過観察が必要とされる用地の飛行には適さない。","手動操縦は高い再現性を求められる操縦には不向きである。","ウェイポイントは地図上の位置情報の設定はできるが、機体の向きや高度、速度など詳細な設定はできない。","自動操縦ができる機体であれば、手動操縦はできる必要性は低い。"],a:1,e:"自動操縦では、アプリケーションソフトに搭載されている地図情報に、あらかじめ複数のウェイポイント（経過点）を設定して飛行経路を作成できます。このため自動操縦は再現性の高い飛行が可能であり、経過観察が必要とされる用地や離島への輸送、生育状況を把握する耕作地などの飛行に利用されます。ウェイポイントは地図上の位置情報だけでなく、機体の向きや高度、速度など詳細な設定が可能です。一方、手動操縦では操縦者の習熟度によって飛行高度の微調整や回転半径・航行速度の調整、遠隔地での高精度な着陸など細かな操作が行えますが、高い再現性を求められる操縦には不向きです。また、自動操縦ができる機体でも不具合発生時には手動での操縦が必要となる場合があるため、手動操縦の必要性が低いとは言えません。",ref:"教則 第5章 5.2.2 手動操縦及び自動操縦（p.59）"},
  {cat:3,lvl:"common",q:"ガソリンエンジンで駆動する機体の運用について、最も適切なものを1つ選べ。",o:["ガソリンエンジンで駆動する機体のガソリンは航空法上の危険物に該当する。","機体の振動が大きいため、ネジ類等が緩みやすい。","ガソリンを車で運搬する場合は、消防法で定められた32リットル以下の専用の容器で運搬することが必要である。","ガソリンは引火性が低いため、給油の際に周囲の火気に注意する必要はない。"],a:1,e:"ガソリンを車で運搬する場合は、消防法により22リットル以下の専用の容器を用いる必要があります。また、エンジン駆動の機体は振動が大きくなるため、ネジ類の緩みなどには特に注意を払い、定期的に点検する必要があります。なお、無人航空機の飛行のために必要な燃料としてのガソリンは、航空法上の危険物には該当しません。ガソリンは引火性が高いため、給油の際は周囲の火気に十分注意します。",ref:"教則 第5章 5.1.2 ガソリンエンジン機の注意事項（p.52）"},
  {cat:3,lvl:"common",q:"手動操縦におけるヒューマンエラーの傾向について、適切ではないものを１つ選べ。",o:["機体と操縦者に距離があると、機体付近の障害物との距離差が掴みにくくなる。","機体をあらゆる方向に向けても確実に意図した方向や高度に制御できる訓練はヒューマンエラー回避の対策となる。","操縦経験の浅い操縦者が操作を行うと、意図しない方向に飛行してしまう場合がある。","操縦者の視線と回転翼航空機の正面方向が異なる場合であっても、機体が自動で方向を処理するため、意図しない方向に飛行する可能性は低い。"],a:3,e:"手動操縦におけるヒューマンエラーの傾向として、操縦経験の浅い操縦者が操作を行うと、意図しない方向に飛行してしまう場合があります。特に、操縦者の視線と回転翼航空機の正面方向が異なる場合や、機体と操縦者との距離が離れた場合には、機体付近の障害物との距離差が掴みにくくなり、接触しやすい状況となります。これらのリスクを回避するためには、機体をあらゆる方向に向けても確実に意図した方向や高度に制御できる訓練や、指定された距離での着陸訓練が有効です。",ref:"教則 第5章 5.2.2 手動操縦のヒューマンエラー（p.59）"},
  {cat:3,lvl:"common",q:"以下の選択肢の中から、無人航空機の運航に関する安全点検のプロセスについて適切ではないものを１つ選べ。",o:["飛行後の点検とは、無人航空機が飛行を終えて着陸したあとに行うべき点検であり、飛行の結果、無人航空機の各部品の摩耗等の状態を確認する。","飛行中の点検では、飛行中の機体の状態や、飛行している機体の周囲の状況を確認する。","運航当日の準備では、必要な装置や設備の設置を行い、飛行に必要な許可・承認や機体登録等の有効期間が切れていないかを確認するが、連日で飛行する場合は、省略ができる。","異常事態発生時の措置として、事故発生時は直ちに無人航空機の飛行を中止し、負傷者がいる場合は救護・通報を行う。"],a:2,e:"運航当日の準備では、必要な装置や設備の設置を行い、飛行に必要な許可・承認や機体登録等の有効期間が切れていないかを確認します。連日の飛行であっても、これを省略することはできません。飛行中の点検では、飛行中の機体の状態や周囲の状況を確認します。飛行後の点検は、無人航空機が飛行を終えて着陸したあとに行うべき点検で、各部品の摩耗等の状態を確認します。異常事態発生時には、あらかじめ設定した手順等に従った危機回避行動をとり、事故発生時には直ちに飛行を中止して危険を防止するための措置を取ることが必要です。",ref:"教則 第5章 5.1.2 運航時の点検及び確認事項（p.52）"},
  {cat:3,lvl:"common",q:"飛行機の離着陸について最も適切なものを１つ選べ。",o:["離陸方向は原則として向かい風を選ぶ。","滑走路として使用するエリアは、傾斜地であっても支障はない。","着陸操縦は、降下速度を遅くする必要があるため、追い風方向で行うことが望ましい。","滑走路に草が伸びていても機体の高さ以下であれば問題ない。"],a:0,e:"飛行機の離着陸では、向かい風の方向を選ぶのが原則です。追い風で離着陸を行うと、失速の危険性や滑走路を逸脱する危険が生じるためです。また、滑走路は水平で草などが伸びていない場所を選定することが重要で、草が伸びているとプロペラに接触し飛行ができなくなる可能性があります。着陸時も、向かい風方向に滑走できるエリアを確保してから着陸操縦に入ります。",ref:"教則 第5章 5.2.1 飛行機の離着陸（p.56）"},
  {cat:3,lvl:"common",q:"自動操縦と手動操縦の切り替えにおける操作上の注意と対応について、最も適切なものを１つ選べ。",o:["何らかの原因で不安定な飛行と判断した場合は、手動操縦はせずその場に着陸させることが望ましい。","手動操縦に切り替えた後は、急な航行速度の低下や失速に備えた操作準備は不要である。","作業指示による手動操作への切り替えは危険なため行うべきではない。","手動操縦に切り替えた後は、ホバリングをして機体の安定性や周囲の安全を確認する。"],a:3,e:"自動操縦から手動操縦に切り替える場合としては、作業指示による手動操作や、何らかの原因で不安定な飛行と判断した場合などが考えられます。手動操縦に切り替えた後は、急な航行速度の低下や失速に備えた操作準備が必要となるとともに、障害物への接近を避けるための機体方向の確認や、ホバリングをして機体の安定性や周囲の安全を確認することなどが求められます。",ref:"教則 第5章 5.2.2 自動操縦と手動操縦の切り替え（p.59）"},
];
const Q_RISK_X = [
  {cat:4,lvl:"common",q:"無人航空機の運航中の事故・インシデントへの対応について正しいものを１つ選べ。",o:["航空機と衝突又は接触するおそれがあったと認めたときは、国土交通大臣への報告対象となる事故に該当する。","操縦者自身が軽傷を負った場合は、国土交通大臣への報告対象となる事故に該当する。","操縦者自身の車と衝突した場合、国土交通大臣への報告対象となる事故等には該当しない。","保管中にバッテリーが発火した場合は、国土交通大臣への報告対象となる重大インシデントに該当する。"],a:2,e:"国土交通大臣への報告対象となる「事故」は、①無人航空機による人の死傷（重傷以上）、②第三者の所有する物件の損壊、③航空機との衝突又は接触です。「重大インシデント」は、①無人航空機による人の負傷（軽傷）、②無人航空機の制御が不能となった事態、③無人航空機が飛行中に発火した事態、④航空機との衝突又は接触のおそれがあったと認めたときです。操縦者自身の車は第三者の所有する物件に当たらないため、報告対象となる事故等には該当しません。",ref:"教則 第6章 事故・重大インシデントへの対応"},
  {cat:4,lvl:"common",q:"無人航空機の飛行を実施する際の気象状況の判断について、最も適切なものを１つ選べ。",o:["霧雨であれば飛行は可能である。","霧の発生時は飛行の延期や中止が望ましい。","雷鳴が聞こえても、降雨がなければ飛行を継続してよい。","霧の発生時は視認性が低下するが、自動操縦ができる無人航空機であれば問題ない。"],a:1,e:"無人航空機の飛行は気象条件に大きく影響されます。降雨時、降雪時、霧の発生時や雷鳴が聞こえるときは、安全を考慮して飛行の延期や中止が望ましいとされています。霧の発生時は視認性が低下するため、自動操縦が可能な機体であっても飛行は避けるべきです。",ref:"教則 第6章 6.2.2 気象（霧）（p.72）"},
  {cat:4,lvl:"common",q:"回転翼航空機（ヘリコプター）の運航の特徴について、適切ではないものを１つ選べ。",o:["回転翼航空機（ヘリコプター）は、ホバリングや垂直離着陸が可能である。","オートローテーション機構がある場合、動力が停止しても条件によっては軟着陸が可能である。","前進させながら降下することは、ボルテックス・リング・ステートの予防になる。","垂直上昇は前進させながら上昇させる方法に比べ、必要パワーを削減できる。"],a:3,e:"回転翼航空機（ヘリコプター）では、垂直降下時や低速前進飛行時にボルテックス・リング・ステートが発生しやすく、急激に高度が低下して回復できない危険があります。そのため、前進させながら降下することはボルテックス・リング・ステートの予防に有効です。また、前進させながら上昇させた方が必要パワーを削減できるため、垂直上昇は避けることが望ましいです。オートローテーション機構がある場合は、動力が停止しても高度等の条件が揃えば軟着陸が可能です。",ref:"教則 第6章 6.3.2 回転翼航空機（ヘリコプター）（p.75）"},
  {cat:4,lvl:"common",q:"無人航空機の飛行におけるリスク管理について、最も適切ではないものを１つ選べ。",o:["ハザードによって生じる「リスク」を評価したうえで、「リスク」の発生確率をゼロにすることが重要である。","「リスク」の結果となる被害を軽減する措置を講じることで、「リスク」を許容可能な程度まで低減することが重要である。","リスク管理の考え方は特にカテゴリーⅢ飛行において重要となるが、その他の飛行においても理解したうえで安全に配慮した飛行を行うことが重要である。","事故等につながりかねない危険性のある要素である「ハザード」を具体的に可能な限り多く特定することは重要である。"],a:0,e:"無人航空機の飛行にあたっては、法令等に基づく基準や要件に適合させることに加え、運航上のリスクを管理することが安全確保上非常に重要です。運航の形態に応じて、危険性のある要素（ハザード）を具体的に可能な限り多く特定し、リスクを評価したうえで、発生確率を低減させるか、被害を軽減する措置を講じることで、リスクを許容可能な程度まで低減します。ただし、リスクはゼロにすることはできないことを理解して対策を取る必要があります。",ref:"教則 第6章 リスク管理の基礎（p.63）"},
  {cat:4,lvl:"common",q:"無人航空機の飛行における気象の影響について、最も適切なものを１つ選べ。",o:["離陸から着陸まで、支障のある気象状況にならないことを確認した後に飛行を開始するべきである。","飛行中に天候が悪化した場合でも、当初の飛行計画どおり飛行を完了させることを優先するべきである。","テレビでの天気予報を参照することで、無人航空機の飛行に必要な気象情報を得ることができる。","防水性能を有している機体であれば、雨の中でも安全な飛行が可能である。"],a:0,e:"無人航空機を安全に飛行させるためには、気象の影響を理解し適切に対処する必要があります。離陸から着陸に至るまで、支障のある気象状況にならないことを確認したうえで飛行を開始しなければなりません。また、目視で飛行状況や他の物件との安全な距離が確認できない雲中や濃霧等の気象状態では飛行させてはならず、一般的な天気予報だけでなく、飛行に影響する具体的な気象情報を適切に入手・分析する必要があります。",ref:"教則 第6章 気象情報の活用（p.69）"},
  {cat:4,lvl:"common",q:"飛行空域の安全マージンについて、最も適切なものを１つ選べ。",o:["危険半径は、飛行高度にかかわらず一律10ｍとすればよい。","飛行範囲に危険半径（高度と同じ数値又は30ｍのいずれか長い方）を加えた範囲を、立入管理措置を講じて無人地帯とした後、飛行する。","ジオフェンス機能を使用することで危険半径を小さくすることができる。","緊急時に必要な一時的な着陸スペースは、飛行中に機体カメラで確認し選定する。"],a:1,e:"飛行範囲に危険半径（高度と同じ数値又は30ｍのいずれか長い方）を加えた範囲を、立入管理措置を講じて無人地帯とした後に飛行することが、安全マージンを確保した飛行といえます。ジオフェンス機能は飛行範囲の逸脱防止に役立ちますが、危険半径を小さくする理由にはなりません。また、緊急時に一時的な着陸が可能なスペースは、前もって確認・確保しておく必要があります。",ref:"教則 第6章 6.1.1 安全マージン〔一等〕（p.63）"},
  {cat:4,lvl:"common",q:"無人航空機の飛行におけるリスク評価とリスク軽減策について、最も適切ではないものを１つ選べ。",o:["送信機との通信断絶というハザードによる墜落というリスクに対して、墜落時にパラシュートが開くことは、事象発生による被害の軽減に寄与する。","送信機との通信断絶というハザードによる墜落というリスクに対して、飛行前に飛行空域の電波環境を確認することは、事象の発生確率を低減することに寄与する。","送信機との通信断絶というハザードによる墜落というリスクに対して、飛行高度を高く設定することは、事象発生による被害の軽減に寄与する。","送信機との通信断絶というハザードによる墜落というリスクに対して、フェールセーフ機能による自動帰還が作動することは、事象の発生確率を低減することに寄与する。"],a:2,e:"運航形態に応じて、事故等につながりかねないハザードを可能な限り多く特定し、それによって生じるリスクを評価したうえで、リスクを許容可能な程度まで低減する必要があります。リスクの低減には、事象の発生確率を低減する対策と、事象発生による被害を軽減する対策の両方を検討します。墜落時にパラシュートが開くことは被害の軽減に、フェールセーフ機能による自動帰還は発生確率の低減に寄与します。一方、飛行高度を高く設定することは、被害の軽減にはつながりません。",ref:"教則 第6章 6.1.4 ハザードとリスク（p.65）"},
  {cat:4,lvl:"common",q:"飛行計画に関する説明の中から最も適切なものを１つ選べ。",o:["飛行経路の設定における緊急用務空域の確認は、飛行前日に行えば十分である。","無人航空機の離着陸地点以外の飛行経路下に係る自治体や関係者・権利者への周知や承諾は不要である。","着陸予定地点に着陸できないリスクがある場合でも、緊急着陸地点は飛行開始後に検討すればよい。","離着陸場の選定には、人の立ち入りやコンパスエラーの原因となる構造物がないかを確認する。"],a:3,e:"飛行計画の策定にあたっては、無人航空機の飛行経路・飛行範囲を決定し、自治体など各関係者・権利者への周知や承諾が必要となる場合があります。飛行経路の設定では、電力施設や緊急用務空域、航空機の往来などを考慮に入れる必要があります。また、着陸予定地点に着陸できないときに離陸地点まで戻るほどの飛行可能距離が確保できないなどのリスクがある場合は、事前に緊急着陸地点を確保しておくべきです。飛行計画策定時には、機体の物理的障害や飛行範囲特有の現象、制度面での規制、事前に予想しうる状況の変化などを想定した確認事項の作成が求められます。",ref:"教則 第6章 飛行計画の立案"},
  {cat:4,lvl:"common",q:"日本の天気について、適切ではないものを１つ選べ。",o:["冬は日本海側に大雪をもたらすが、これはシベリア高気圧が優勢になるためである。","冬型の天気の典型は西高東低といわれるものである。","日本の天気を支配するのは、冬のシベリア高気圧と夏の太平洋高気圧である。","春と秋はシベリア高気圧と太平洋高気圧の勢力が入れ替わるときで、このとき日本の広い範囲に良い天気をもたらし、１か月ほど視界良好な日となる。"],a:3,e:"日本の天気を支配するのは冬のシベリア高気圧と夏の太平洋高気圧であり、春と秋は両高気圧の勢力が入れ替わるときです。このとき日本付近に両気団の境界ができて前線が停滞し、広い範囲に悪い天気をもたらし、１週間くらい雨が降り続き、低い雲高や視程障害をもたらします（正確にはオホーツク海高気圧と太平洋高気圧の間に前線が停滞します）。冬は日本海側に大雪をもたらしますが、これはシベリア高気圧が優勢になるためです。このとき天気図では西側に高気圧、東側に低気圧という気圧配置となるため、西高東低といわれます。",ref:"教則 第6章 6.2.1 日本の天気（季節）"},
  {cat:4,lvl:"common",q:"無人航空機の運航に関するハザードとリスクについて、最も適切なものを１つ選べ。",o:["発生事象のリスクは、被害の発生確率と被害の大きさにより計量する。","発生事象のリスクは、結果の重大性は考慮せず、予測される頻度のみにより計量する。","リスクとハザードは同義語であり、事故等につながる可能性のある危険要素を指す。","「ハザード」とは事故等につながる可能性のある危険要素を指すが、潜在的なものは「リスク」という。"],a:0,e:"無人航空機の運航において、「ハザード」は事故等につながる可能性のある危険要素（潜在的なものを含む）を指します。「リスク」は無人航空機の運航の安全に影響を与える何らかの事象が発生する可能性を指します。発生事象のリスクは、予測される頻度（被害の発生確率）と結果の重大性（被害の大きさ）により計量されます。",ref:"教則 第6章 6.1.4 ハザードとリスク"},
  {cat:4,lvl:"common",q:"回転翼航空機（マルチローター）の特徴について、適切ではないものを１つ選べ。",o:["地面効果範囲内の飛行時間はできるだけ長くする。","フライトコントロールシステムにより安定した飛行ができる。","複数のローターを回転させることにより揚力を得て垂直上昇する。","各ローターの回転数を制御することにより、機体の姿勢や移動方向を制御する。"],a:0,e:"回転翼航空機（マルチローター）は、複数のローターを機体周辺に備え、ローターを回転させることにより揚力を得て垂直上昇します。各ローターの回転数を制御することで機体の姿勢や移動方向を制御し、フライトコントロールシステムにより安定した飛行を行うことができます。また、地面効果範囲内の飛行時間はできるだけ短くすることが望ましいです。",ref:"教則 第6章 6.3.3 回転翼航空機（マルチローター）"},
  {cat:4,lvl:"common",q:"ダウンバーストについて、適切ではないものを１つ選べ。",o:["ダウンバーストは数１００mから１０kmまで広がることがある。","直径が４km程度以下の下降流はマイクロバーストと呼ばれ、範囲は小さいが下降流はダウンバーストより強烈なことがある。","ダウンバーストとは、積乱雲に発生する強烈な下降流が地表にぶつかり、水平方向にドーナツ状に渦を巻きながら四方に広がってゆく状態を指す。","ダウンバーストの広がりには、直径が4km程度の小さいものもあるが、発生時間が1日以上と長く、小さいため観測網でも検知されない。"],a:3,e:"ダウンバーストとは、積乱雲や積雲内に発生する強烈な下降流が地表にぶつかり、水平方向にドーナツ状に渦を巻きながら四方に広がってゆく状態をいいます。その大きさは数百ｍから１０kmにもおよびます。その中でマイクロバーストと呼ばれるものは、直径が４km程度以下の下降流で、範囲は小さいですが下降流はダウンバーストより強烈なものです。発生時間は数分から１０分程度のものが多く、通常の観測網では探知されない局地的なものです。",ref:"教則 第6章 6.2.2 ダウンバースト"},
  {cat:4,lvl:"common",q:"目視外飛行の運航で求められる無人航空機の要件について、最も適切なものを１つ選べ。",o:["補助者を配置する場合、機体に設置したカメラ等により機体の外の様子が監視できる必要はない。","補助者を配置しない場合、立入管理区画の有無に関わらず、第三者に危害を加えないことを製造事業者等が証明した機能を有することは必要である。","自動操縦システムを装備していない機体であっても、カメラ映像を常時監視していれば目視外飛行を行うことができる。","補助者の有無に関わらず、電波断絶時、離陸地点まで自動的に戻る機能や空中で位置を維持する機能を有していることは必要である。"],a:3,e:"目視外飛行の運航では、使用する無人航空機に要件があります。例えば、自動操縦システムを装備し、電波が断絶した場合に自動的に離陸地点まで戻る機能や空中で位置を維持する機能を有すること、機体に設置したカメラ等により機体の外の様子を監視できることが挙げられます。補助者を配置しない場合にはさらなる要件が追加され、例えば第三者に危害を加えないことを製造事業者等が証明した機能を有する必要がありますが、この代替措置として立入管理区画を設定することも可能です。",ref:"教則 第6章 6.4.2 目視外飛行"},
  {cat:4,lvl:"common",q:"飛行機の運航の特徴について、適切ではないものを１つ選べ。",o:["離着陸は向かい風となる方向に行うことが基本である。","回転翼航空機と比べて、飛行中の最小旋回半径が大きくなることが特徴である。","着陸は失速しないように速度を上げて行う。","上空待機を行う場合はサークルを描くように旋回飛行を行う。"],a:2,e:"飛行機の着陸は、失速しない程度に速度を下げて行う必要があります。離着陸は向かい風となる方向に行うことが基本です。上空待機を行う場合はサークルを描くように旋回飛行を行います。回転翼航空機はその場で水平回転ができますが、飛行機はできないため、最小旋回半径が大きいのが特徴です。",ref:"教則 第6章 6.3.1 飛行機"},
  {cat:4,lvl:"common",q:"大型機（最大離陸重量 25kg 以上）の運航の特徴について、適切ではないものを１つ選べ。",o:["一般に小型の機体よりも騒音が大きくなるため、飛行経路の周囲への配慮が必要である。","緊急着陸地点の選定も小型機よりは広い範囲が要求される。","大型機の慣性力は大きく、増減速や昇降に時間と距離が必要で、障害物回避に注意が必要である。","大型機の運航では、性能が高いため、操縦者の運航への習熟度は必要ではない。"],a:3,e:"大型機（最大離陸重量25kg以上）の運航は、機体の慣性力が大きいため、増速・減速・上昇・降下などに要する時間と距離が長くなり、障害物回避に特に注意が必要となります。緊急着陸地点の選定も小型機より広い範囲が要求されます。また、操縦者の運航への習熟度や安全運航意識が十分に高いことが求められ、一般に小型の機体よりも騒音が大きくなるため、飛行経路周囲への配慮も必要です。",ref:"教則 第6章 6.3.4 大型機（最大離陸重量25kg以上）"},
  {cat:4,lvl:"common",q:"無人航空機の飛行経路設定について、正しいものを１つ選べ。",o:["目視限界域の飛行では、機体と障害物との距離差が曖昧になりやすいため、事前に飛行経路付近の障害物との距離を現地で確認しておくことが望ましい。","操縦者の目視が限界域付近となる飛行であっても、補助者の配置を検討する必要はない。","事前に現場を確認したうえで設定した飛行経路は、飛行前に変更しない方が望ましい。","鳥などの動く障害物には対応した飛行経路は設定が困難なため、建物のみを考慮する。"],a:0,e:"飛行経路は、無人航空機が飛行する高度と経路において、障害となる建物や鳥などの妨害から避けられるよう設定する必要があります。障害物付近を飛行せざるを得ない経路を設定する際は、機体の性能に応じて安全な距離を保つよう心がけます。また、操縦者の目視が限界域付近となる飛行では、付近の障害物との距離差が曖昧になりやすいため、事前に飛行経路付近の障害物との距離を現地で確認し、必要と判断した場合は補助者を配置することが望ましいとされています。事前に現場を確認したうえで設定した飛行経路でも、飛行前の周囲の状況に応じて変更が必要な場合があります。",ref:"教則 第6章 6.1.3 経路設定"},
];
const Q_ONE_X = [
  {cat:4,lvl:"one",q:"〔一等〕目視外飛行におけるリスク軽減策と運航計画の立案について、最も適切なものを１つ選べ。",o:["補助者は飛行状況と気象状況の変化を監視し、操縦者へ助言を行う。","補助者を配置しない場合、飛行前に飛行させようとする経路及びその周囲についての現場確認は必要ない。","補助者は飛行開始時に状況を確認すればよく、飛行中の常時監視は不要である。","補助者を配置する場合、事故が発生したときのみ連絡が取れる体制であればよい。"],a:0,e:"目視外飛行におけるリスク軽減策と運航計画の立案では、補助者を配置する場合は、飛行状況及び周囲の気象状況の変化等を常に監視できる双眼鏡等を有する補助者を配置し、操縦者へ必要な助言を行います。操縦者と補助者が常時連絡を取れることも求められます。また、補助者の有無に関わらず、飛行前に、飛行させようとする経路及びその周辺について、不測の事態が発生した際に適切に安全上の措置を講じることができる状態であるか現場確認を行うことが推奨されています。",ref:"教則 第6章 6.4.2 目視外飛行〔一等〕（p.80）"},
  {cat:4,lvl:"one",q:"〔一等〕カテゴリーⅢ飛行のリスク管理に関する次の記述のうち、最も適切なものを１つ選べ。",o:["リスク評価については、「安全確保措置検討のための無人航空機の運航リスク評価ガイドライン」（公益財団法人福島イノベーション・コースト構想推進機構 福島ロボットテストフィールド発行）を活用することが推奨されている。","リスク評価については、現在参考となるガイドライン等はない。","リスク評価については、飛行形態に関係なく一律のリスク評価手法と軽減策が適用され、特別なガイドラインは必要ない。","リスク評価は国土交通省航空局が実施するため、申請者自らがリスクの分析及び評価を行う必要はない。"],a:0,e:"カテゴリーⅢ飛行の運航管理は、飛行形態に応じたリスク分析と評価を基に行われ、その結果に基づくリスク軽減策を講じる必要があります。リスク評価については、「安全確保措置検討のための無人航空機の運航リスク評価ガイドライン」（公益財団法人福島イノベーション・コースト構想推進機構 福島ロボットテストフィールド発行）の活用が推奨されています。",ref:"教則 第6章 6.1.6 リスク評価ガイドライン〔一等〕（p.65）"},
  {cat:4,lvl:"one",q:"〔一等〕飛行機の飛行計画について、最も適切なものを１つ選べ。",o:["緊急着陸は垂直に降下して行うため、緊急着陸地点は狭い範囲のエリアで足りる。","高度に応じた風速と風向きを確認するサイトやアプリ等はないため、事実上、地上風速以外確認の方法がない。","着陸は失速しないように高速度で滑走路に確実に進入させる。","離着陸においては向かい風で行うため風向の予測と風向に適した滑走路の確保が必要となる。"],a:3,e:"飛行機の飛行計画では、気象、経路、緊急着陸地点の確保が重要となります。特に、離陸と着陸は向かい風で行うことが一般的で、そのために風向きの予測と風向きに適した滑走路の確保が必要となります。また、緊急着陸は滑空により行うため、広範囲のエリアが必要となります。飛行計画が正しく設定されているかを確認するために、複数の人でチェックを行う運航者の体制も重要です。着陸は失速しない程度の低速度で滑走路に確実に進入させ、安全に接地させます。地上風速だけでなく上空の風速の確認も重要で、高度に応じた風速や風向きを調べることができるサイト等も存在します。",ref:"教則 第6章 6.3.1 飛行機（p.74）"},
  {cat:2,lvl:"one",q:"〔一等〕以下の選択肢のうち、電波の特性及びそれらが無人航空機の通信等にどのように利用されているかについて最も適切なものを１つ選べ。",o:["超短波は、極超短波に比べて、直進性が強いが、多少の山や建物の陰には回り込んで伝わる特性を持つ。","極超短波は、超短波に比べて、直進性が強いが、多少の山や建物の陰には回り込んで伝わる特性を持つ。","極超短波は、マイクロ波に比べて、直進性が強いが、多少の山や建物の陰には回り込んで伝わる特性を持つ。","マイクロ波は、極超短波に比べて直進性が弱く、山や建物の陰に回り込んで伝わりやすい特性を持つ。"],a:1,e:"電波には、波長が長いほど直進性が弱く情報伝達容量が小さくなり、減衰しにくくなるという特性があります。反対に、波長が短いほど直進性が強く情報伝達容量が大きくなり、減衰しやすくなります。無人航空機の制御用通信に多く使用される極超短波（周波数300MHz～3GHz）は10cm～1mの波長で、直進性が強いのですが、多少の山や建物の陰には回り込んで伝わる特性があります。マイクロ波（周波数3～30GHz）は1～10cmの波長で、直進性が強い性質を持つため特定の方向に向けて発射するのに適しており、伝送できる情報量が非常に大きく、衛星通信、衛星放送等に利用されます。直進性は超短波、極超短波、マイクロ波の順に強くなります。",ref:"教則 第4章 4.5.1 電波の特性（p.47）"},
  {cat:4,lvl:"one",q:"〔一等〕大型機の運航計画立案におけるリスク軽減策の留意点について、適切ではないものを１つ選べ。",o:["緊急着陸地点は、第三者の進入が少ない場所（河川敷、農地など）を選定する。","進行方向を変えるときは、時間的、距離的な余裕を考慮した飛行経路と速度を設定する。","大型機は機体の慣性力が大きいことから、飛行速度に応じた障害物回避に必要な時間や距離を事前に把握する。","離着陸地点及び飛行経路周辺の飛行騒音については、大型機であり仕方がないものとして対応の検討は不要である。"],a:3,e:"大型機の運航計画立案におけるリスク軽減策では、機体の慣性力が大きいことから、進行方向を変えるときは時間的、距離的な余裕を考慮した飛行経路と速度の設定が重要となります。また、緊急着陸地点の選定のほか、飛行騒音等について飛行経路近隣エリアへの事前説明、調整を行うことも留意すべき要素です。",ref:"教則 第6章 6.3.4 大型機〔一等〕（p.78）"},
  {cat:4,lvl:"one",q:"〔一等〕カテゴリーⅢ飛行における緊急時対応手順について、適切ではないものを１つ選べ。",o:["緊急対応が求められた場合に備えて、予め対応手順を設定する。","緊急時の対応手順を設定し、速やかに当該対応が実施できるよう訓練を実施する必要がある。","機体が発火した際の消火方法について、予め検討しておく。","緊急連絡網の作成は、緊急対応手順の設定時に考慮する必要性は低い。"],a:3,e:"カテゴリーⅢ飛行では、リスクの分析及び評価を行い、その結果に基づくリスク軽減策を講じる必要があります。緊急対応が求められる場合に備えて、予め対応手順を設定し、速やかに対応が実施できるよう訓練を実施することが求められます。その際に考慮すべき項目として、GNSSによる位置の安定機能を用いない飛行訓練、機体寸法に応じた緊急着陸地点の確保、フェールセーフ機能が動作しない飛行距離等の把握、墜落時の安全優先順位の明確化、機体が発火した際の消火方法、緊急連絡網の作成などがあります。",ref:"教則 第6章 6.1.2 カテゴリーⅢ飛行において追加となる安全確保〔一等〕（p.64）"},
  {cat:4,lvl:"one",q:"〔一等〕カテゴリーⅢ飛行におけるリスク評価における「無人航空機の飛行マニュアルの作成・遵守」について最も適切なものを１つ選べ。",o:["飛行マニュアルは作成して提出すれば足り、飛行時にその内容を遵守することまでは求められない。","飛行形態に応じてリスクの分析及び評価を行い、その結果を記載するが、リスク軽減策の内容までは求められない。","飛行形態に応じたリスク分析及び評価は航空局が行い、その結果に基づき、リスク軽減策の内容を記載することが求められる。","飛行形態に応じてリスクの分析及び評価を行い、その結果に基づくリスク軽減策の内容を記載することが求められる。"],a:3,e:"無人航空機を飛行させる際の適切な運航管理の体制を維持するため、飛行形態に応じてリスクの分析及び評価を行い、その結果に基づくリスク軽減策の内容等を記載した飛行マニュアルを作成し、遵守することが求められます。リスクの分析及び評価は主に申請者側が行います。",ref:"教則 第6章 6.1.2 カテゴリーⅢ飛行において追加となる安全確保〔一等〕（p.64）"},
  {cat:4,lvl:"one",q:"〔一等〕カテゴリーⅢ飛行における自動操縦に関する注意点について、最も適切なものを１つ選べ。",o:["野生動物からの妨害は稀な事象であるため、具体的な対策は必要ない。","自動操縦中は機体が設定経路を自動で維持するため、操縦者による飛行状況の監視は不要である。","手動操縦への切り替えを速やかに行える体制を整えておく。","飛行経路付近に緊急着陸地点や不時着エリアを予め設定することは困難なため、飛行後に操縦者の判断で設定する。"],a:2,e:"カテゴリーⅢ飛行における自動操縦では、事前に飛行経路の設定や緊急着陸地点、不時着エリアの選定などが必要です。また、野生動物からの妨害に対する防御策や、手動操縦への切り替えを速やかに行える体制の整備も必要となります。これらは安全な飛行を行うための重要なポイントとなります。",ref:"教則 第6章 6.1.2 カテゴリーⅢ飛行において追加となる安全確保〔一等〕（p.64）"},
  {cat:4,lvl:"one",q:"〔一等〕以下の選択肢から、リスク評価の基本的なコンセプトについて適切ではないものを1つ選べ。",o:["機体や外部システムの異常等の影響で想定飛行空間を外れて飛行してしまうことに備える空間として「想定外飛行空間」を設定する。","想定飛行空間を「オペレーション空間」という。","「想定飛行空間」は、飛行目的、システムの性能、環境に応じて設定される飛行範囲である。","「オペレーション空間」は、想定飛行空間と想定外飛行空間を合わせた空間である。"],a:1,e:"「オペレーション空間」は、無人航空機の運航に関連するリスクを評価するための基本的なコンセプトの一つで、想定飛行空間と想定外飛行空間を合わせたものを指します。想定飛行空間のみを指すものではありません。",ref:"教則 第6章 6.1.6 リスク評価ガイドライン〔一等〕（p.65）"},
  {cat:4,lvl:"one",q:"〔一等〕目視外飛行におけるリスク軽減の検討要素について、以下のうち最も適切なものを１つ選べ。",o:["立入管理区画に道路、鉄道、家屋等、第三者が存在する可能性を排除できない場所が含まれる場合には、飛行計画を取りやめることが推奨される。","補助者を配置しない場合、連携が不要なため、緊急時の対応と、緊急着陸地点は飛行中に決定してもよい。","補助者を配置しない場合、飛行経路直下やその周辺の状況を確認するためのカメラ等の装備は不要である。","補助者を配置する場合、補助者にも機体の特性を理解させておく。"],a:3,e:"補助者を配置する場合は、補助者にも機体の特性を理解させておく必要があります。補助者の有無にかかわらず、緊急時の対応と緊急着陸地点はあらかじめ設定することが望まれます。また、立入管理区画に道路、鉄道、家屋等、第三者が存在する可能性を排除できない場所が含まれる場合には、追加の第三者の立入りを制限する方法を講じ、それでも安全が確保できない場合は飛行計画の中止などを検討します。",ref:"教則 第6章 6.4.2 目視外飛行〔一等〕（p.80）"},
  {cat:2,lvl:"one",q:"〔一等〕以下の選択肢から、無人航空機における送信機の信号や電波混信についての最も適切なものを１つ選べ。",o:["周辺の電波の状態を確認する測定器のようなものは存在しない。","高圧送電線の近くでは電磁波によるノイズの影響を受けないため、飛行時に考慮する必要はない。","無人航空機で使用される送信機の電波は、無線ＬＡＮやＷｉ‐Ｆｉのような微弱な電波の干渉は受けにくい。","同じ周波数帯の電波が同時かつ複数使用されているような場所では複数の電波が干渉して混信による誤作動が起きる可能性がある。"],a:3,e:"無人航空機の飛行において、送信機の信号は重要な役割を果たします。同じ周波数帯の電波が同時かつ複数使用されているような場所では、複数の電波が干渉して混信による誤作動が起きる可能性があります。そのため、飛行させる前には測定器などで周辺の電波の状態を確認することが望ましいです。また、無線LANやWi-Fi、高圧送電線の影響も考慮する必要があり、これらの環境下での飛行には十分な注意が必要です。",ref:"教則 第4章 4.4.3 送信機（電波混信）（p.44）"},
  {cat:2,lvl:"one",q:"〔一等〕電波環境の調査について、最も適切なものを１つ選べ。",o:["市街地の飛行時は、電波環境の調査の必要性は低い。","電波環境の調査は、飛行終了後に実施すれば十分である。","無人航空機で使用している周波数と同じ電波の使用状況や他設備からのノイズは、スペクトラムアナライザで確認できる。","外来電波や他の設備・機器からのノイズにより無線設備の通信環境が不安定になることはない。"],a:2,e:"無人航空機の通信環境は、外来電波や他の設備・機器からのノイズによって影響を受けます。そのため、同じ周波数の電波の使用状況や他設備からのノイズの確認にはスペクトラムアナライザが使用されます。特に、無線局が散在する市街地での飛行では、飛行前にこれらの調査を行うことが重要です。",ref:"教則 第4章 4.5.1 電波（電波環境の調査）〔一等〕（p.48）"},
  {cat:3,lvl:"one",q:"〔一等〕カテゴリーⅢ飛行のリスク評価結果による保険、セキュリティについて、最も適切なものを１つ選べ。",o:["カテゴリーⅢ飛行は、第三者上空を飛行するリスクの高い運航であるが、事故等を補償する保険はない。","カテゴリーⅢ飛行の許可・承認の審査では、無人航空機を飛行させる者が賠償能力を有することの確認は行われない。","飛行の形態に応じたリスク評価結果に基づき、必要な保険に加入することが望ましい。","無人航空機の選定においては、セキュリティ対策が講じられているかどうかは考慮する必要はない。"],a:2,e:"カテゴリーⅢ飛行は、第三者上空を飛行するリスクの高い運航であり、飛行の許可・承認の審査にあわせて、無人航空機を飛行させる者が賠償能力を有することの確認が行われます。また、その飛行の形態に応じたリスク評価を行い、その結果に基づき、必要な保険に加入することが望ましいとされています。さらに、無人航空機の選定においても、リスク評価の結果に基づき、必要なセキュリティ対策が講じられていることを考慮する必要があります。",ref:"教則 第5章 5.1.4 保険及びセキュリティ（p.55）"},
  {cat:4,lvl:"one",q:"〔一等〕飛行機のリスク軽減策に関連した運航計画の要素について、最も適切なものを１つ選べ。",o:["緊急着陸地点は、飛行中断の可能性がある場合のみ事前に選定する必要がある。","離陸及び着陸地点は、取扱説明書等に推奨距離が記載されていない場合は、操縦者及び補助者と20m以上離れることが推奨されている。","離陸後は高度を上げるため、取扱説明書等で指定された上昇角度以上の角度をとることが推奨されている。","旋回は、取扱説明書等で指定された旋回半径より小さい半径で行うことが推奨されている。"],a:1,e:"飛行機の運航計画では、リスク軽減策を考慮した要素が重要です。離着陸地点は操縦者及び補助者と20m以上離れることが推奨されています。ただし、取扱説明書等に推奨距離が記載されている場合は、その指示に従います。また、飛行中は取扱説明書等で指定された上昇角度、旋回半径、速度等を守ることが求められます。さらに、飛行中断の可能性は常にあるものとして、緊急着陸地点を事前に選定することも重要な要素の一つです。",ref:"教則 第6章 6.3.1 飛行機（p.74）"},
  {cat:4,lvl:"one",q:"〔一等〕カテゴリーⅢ飛行における経路設定について、適切ではないものを１つ選べ。",o:["ジオフェンス機能の設定において、当日の他の航空機との空域調整結果が反映されていることを確認する。","可能な限り第三者の立入りが少ない飛行経路を設定する。","経路設定に必要となる機体の機能や安全対策は、事前に検証しておく。","飛行経路付近に緊急着陸地点や不時着エリアを予め設定する必要はない。"],a:3,e:"カテゴリーⅢ飛行では、飛行形態に応じてリスクの分析及び評価を行い、その結果に基づくリスク軽減策を講じる必要があります。具体的な対策としては、可能な限り第三者の立入りが少ない飛行経路を設定する、飛行経路付近に緊急着陸地点や不時着エリアを予め設定する、飛行経路からの逸脱を防止するためのジオフェンス機能を設定するなどがあります。これらに必要となる機体の機能や安全対策は事前の検証が必要であり、ジオフェンス機能の設定においては、当日の他の航空機との空域調整結果が反映されていることを確認する必要があります。",ref:"教則 第6章 6.1.3 経路設定〔一等〕（p.64）"},
  {cat:4,lvl:"one",q:"〔一等〕回転翼航空機（マルチローター）におけるリスク軽減策を踏まえた運航計画の立案の際の留意要素について、最も適切なものを１つ選べ。",o:["離陸地点は操縦者及び補助者との距離を3m以上保つか、機体の取扱説明書に推奨距離が記載されている場合はその指示に従う。","飛行中断に備えた緊急着陸地点は、飛行経路から十分に離れた場所に選定する。","離陸地点は操縦者及び補助者との距離を1m以上保つか、機体の取扱説明書に推奨距離が記載されている場合はその指示に従う。","飛行経路での最高飛行高度の設定は、飛行中に状況を判断してから行う。"],a:0,e:"離陸地点は操縦者及び補助者との距離を3m以上保つようにするか、機体の取扱説明書に推奨距離が記載されている場合はその指示に従います。また、飛行中断に備えて飛行経路上又はその近傍に緊急着陸地点を事前に選定することも重要です。飛行経路での最高飛行高度の設定は飛行前に行います。",ref:"教則 第6章 6.3.3 回転翼航空機（マルチローター）（p.77）"},
  {cat:2,lvl:"one",q:"〔一等〕カテゴリーⅢ飛行を行う際に理解が必要な無人航空機の飛行性能や影響を与える要因について、最も適切なものを１つ選べ。",o:["機体認証がされている機体を使用するため、飛行性能の理解は不要である。","機体重量の増減は、離陸性能や上昇性能に影響を与えない。","上昇性能、着陸性能などの飛行性能は、大気状態や機体重量などの要因によって影響を受ける。","無人航空機の飛行性能は、飛行速度や空気密度などの大気状態には影響されない。"],a:2,e:"カテゴリーⅢ飛行を行う際には、無人航空機の飛行性能（離陸性能、上昇性能、加速性能、巡航性能、旋回性能、降下性能、着陸性能等）及びこれに影響を与える要因（機体重量、飛行速度、空気密度や風などの大気状態等）について理解することが必要です。飛行性能はこれらの要因によって大きく影響を受けるため、適切な飛行を行うにはこれらの要素を理解し管理することが求められます。",ref:"教則 第4章 無人航空機の飛行性能〔一等〕"},
  {cat:4,lvl:"one",q:"〔一等〕回転翼航空機（ヘリコプター）の運航計画立案に関する注意点について、適切ではないものを１つ選べ。",o:["離着陸地点は取扱説明書に推奨距離が記載されていない場合は、操縦者及び補助者と20m以上離れることが推奨される。","離陸後はゆっくりと地面効果内に留まり、機体状況を確認する。","離陸及び着陸地点は周囲の物件から30ｍ以上離すことができる場所を選定する。","機体を上昇させる場合は、取扱説明書等で指定された上昇率以内で飛行させる。"],a:1,e:"回転翼航空機（ヘリコプター）の運航計画立案に際しては、離陸及び着陸地点は周囲の物件から30m以上離すことができる場所を選定することが重要です。距離が確保できない場合は、補助者を配置するなどの安全対策を講じます。離着陸地点は取扱説明書に推奨距離が記載されていない場合は、操縦者及び補助者と20m以上離れることが推奨されます。また、離陸後は速やかに地面効果外まで上昇し、機体状況の確認も地面効果外で行うこと、上昇させる場合は取扱説明書等で指定された上昇率以内で飛行させること、オートローテーション機能を装備した機体を運航する場合は、機能が発揮できる条件を運航の計画に考慮することなどにも注意が必要です。",ref:"教則 第6章 6.3.2 回転翼航空機（ヘリコプター）〔一等〕（p.75）"},
  {cat:4,lvl:"one",q:"〔一等〕カテゴリーⅢ飛行の離着陸に関する注意点として、最も適切なものを１つ選べ。",o:["離着陸エリア上空周辺に電線などの障害物がない、又は回避できる空域を選ぶ。","離着陸時ローターから発せられる風の影響を受け、物が飛ばされることは避けられない。","離着陸エリアは、地面効果を抑制するため、壁面や構造物が存在することが望ましい。","カテゴリーⅢ飛行では立入管理措置を講じるため、離着陸エリア周辺の第三者の存在を考慮する必要はない。"],a:0,e:"カテゴリーⅢ飛行の離着陸では、近くに第三者が存在する可能性が高いことから、より第三者の安全が損なわれるおそれがないようにすることが重要です。離着陸時にローターから発せられる風の影響を受けて物が飛ばされることは避けるべきであり、近接する壁面や構造物により機体が不安定になるような環境は離着陸エリアから除外する必要があります。離着陸エリア上空周辺に電線などの障害物がない、又は回避できる空域を選ぶことが推奨されています。",ref:"教則 第6章 カテゴリーⅢ飛行の飛行形態に応じたリスク評価（離着陸）"},
  {cat:4,lvl:"one",q:"〔一等〕回転翼航空機（マルチローター）の使用機体と飛行計画を元にしたリスク軽減策の検討要素について、最も適切なものを１つ選べ。",o:["離着陸時に機体と操縦者、補助者及び周囲の物件との安全距離は確保しなくてもよい。","地面効果範囲内の飛行時間を延ばす。","自動帰還時の高度を着陸地点における必要最低限の高さに設定する。","緊急着陸地点の安全確保の方法を飛行前に検討する。"],a:3,e:"マルチローターのリスク軽減策の検討要素として、離着陸時の機体と操縦者、補助者及び周囲の物件との安全距離の確保や、地面効果範囲内の飛行時間を短くすることが挙げられます。緊急着陸地点の安全確保の方法は飛行前に検討しておくことが重要で、飛行中に検討するといった行為は逆にリスクを増大させる可能性があります。なお、自動帰還時の高度は、障害物等を回避できる安全な高さに設定します。",ref:"教則 第6章 機体の種類に応じた運航リスクの評価（マルチローター）"},
  {cat:4,lvl:"one",q:"〔一等〕回転翼航空機（ヘリコプター）のリスク軽減策について、最も適切なものを１つ選べ。",o:["ボルテックス・リング・ステートを予防できる降下方法として、垂直降下をする。","緊急着陸地点の安全確保方法を飛行前に検討する。","飛行時間を長くするために地面効果範囲内での滞在時間を最大にする。","機体と操縦者、補助者及び周囲の物件との安全距離を確保せずに離着陸を行う。"],a:1,e:"回転翼航空機（ヘリコプター）のリスク軽減策としては、ボルテックス・リング・ステートを予防できる降下方法を選定することが重要で、前進させながら降下することが予防に有効です。そのほか、離陸及び着陸時には機体と操縦者、補助者及び周囲の物件との必要な安全距離を確保すること、地面効果範囲内の飛行時間を短くすることなどが挙げられます。緊急着陸地点の安全確保方法は飛行前に検討します。",ref:"教則 第6章 機体の種類に応じた運航リスクの評価（ヘリコプター）"},
  {cat:4,lvl:"one",q:"〔一等〕カテゴリーⅢ飛行の飛行形態に応じたリスク評価において、適切な機体選定に関する注意点について、適切ではないものを１つ選べ。",o:["地上の第三者への被害を軽減させる対策として、セキュリティに考慮することは関係がない。","落下時にパラシュートが展開する機体を使用することは、地上の第三者への被害を軽減させる対策となる。","必要最低限の数より多くのプロペラ及びモーターを有する機体は、冗長性のある機体と言える。","衝撃エネルギーを軽減できる機能を有する機体を選定することは、地上の第三者への被害の可能性を低減する対策となる。"],a:0,e:"カテゴリーⅢ飛行の飛行形態に応じたリスク評価において、地上の第三者への被害の可能性を低減するためには、冗長性を持つ機体や、衝撃エネルギーを軽減できる機能を持つ機体を選定します。例えば、必要最低限の数より多くのプロペラ及びモーターを有する機体や、パラシュートを展開する機能を有する機体を選ぶことが挙げられます。また、コントロールの奪取や飛行経路設定の書き換え防止など、セキュリティについて考慮することも、地上の第三者への被害を軽減させる対策となります。",ref:"教則 第6章 カテゴリーⅢ飛行の飛行形態に応じたリスク評価（機体選定）"},
  {cat:4,lvl:"one",q:"〔一等〕「無人航空機の飛行に関する許可・承認の審査要領（カテゴリーⅢ飛行）」におけるリスクの分析及び評価において考慮すべき事項として、適切ではないものを１つ選べ。",o:["電波環境","無人航空機を飛行させる者の技能証明及び訓練の内容","使用する無人航空機の価格","飛行経路における人との衝突リスク（地上リスク）及び航空機との衝突リスク（空中リスク）"],a:2,e:"「無人航空機の飛行に関する許可・承認の審査要領（カテゴリーⅢ飛行）」では、国による飛行の許可・承認を受けるための申請を行う場合には、飛行形態に応じてリスクの分析及び評価を行い、その結果を提出することが求められています。リスクの分析及び評価において考慮すべき事項は次のとおりです。①飛行の日時、飛行する空域及びその地域、無人航空機を飛行させる者及び運航体制、使用する無人航空機、飛行の目的、飛行の方法を含む運航計画、②飛行経路における人との衝突リスク（地上リスク）及び航空機との衝突リスク（空中リスク）、③電波環境（無線通信ネットワークを利用して操縦を行う場合に限る）、④使用条件等指定書で指定された使用の条件等、使用する無人航空機の情報、⑤無人航空機を飛行させる者の無人航空機操縦者技能証明及び訓練の内容、⑥無人航空機を飛行させる者を補助する者等を含めた運航体制。使用する無人航空機の価格は含まれません。",ref:"教則 第6章 無人航空機の運航リスクの評価（許可・承認の審査要領 カテゴリーⅢ飛行）"},
  {cat:4,lvl:"one",q:"〔一等〕運航形態：高度２５０mの山の頂上から街の様子を撮影する。そのため、山から離れた際、高度１５０m以上になる可能性がある。\n昼間、目視外、１５０m以上の飛行であり、人口集中地区には該当せず、立入管理措置は講じないものとする。\n上記の運航形態において、最も適切なリスク対応を１つ選べ。",o:["上空は電波が届きにくいため、GNSSをOFFにして飛行させる。","航空機の接近を確認した場合は、上昇して回避することとする。","管制塔と情報を共有し、航空機の飛行情報を考慮して飛行計画を立てる。","CRMを活用し、安全を確保する。"],a:2,e:"CRMはチームとしての安全管理の概念やコミュニケーション・スキル向上の手法であり、150m以上の飛行における事故防止という観点では適切ではありません。GNSSをOFFにすることにも特に意味はありません。航空機の接近を確認した場合は、上昇ではなく下降・着陸等により回避します。150m以上の飛行では、航空機との衝突防止のため管制塔と情報を共有することが事故防止のために重要です。",ref:"教則 第6章 6.1.6 リスク評価手法（空中リスク）（p.69）"},
  {cat:4,lvl:"one",q:"〔一等〕運航形態：高層ビル周辺にて、無人航空機による点検業務のため飛行させることとなった。\n飛行に関する許可申請は行っている。\n昼間、目視外、１５０m以下の飛行とする。\n上記の運航形態において、最も適切なリスク対応を１つ選べ。",o:["自動操縦設定にすることで、精密な飛行経路での飛行が可能となり、安全を確保できる。","ビル風は地上付近のみで発生するため、高度を上げて飛行すれば風の影響は考慮しなくてよい。","立入管理措置を講じ、飛行経路に補助者を配置する。","ビル風による影響を避けるため、風の影響を受けにくい25キロ以上の大型機を使用する。"],a:2,e:"25キロ以上の大型機は小回りが利きにくく、周囲に障害物があるときはかえって安全の確保が難しくなります。高層ビル付近はマルチパスの影響を受けやすく、自動操縦には不向きです。また、ビル風は高所でも発生し、風向・風速が大きく乱れるため注意が必要です。選択肢の中で最も安全な対策は、立入管理措置を講じ、飛行経路に補助者を配置することです。",ref:"教則 第6章 6.1.6 リスク軽減策〔一等〕（p.65）"},
  {cat:4,lvl:"one",q:"〔一等〕運航形態：マラソン大会において、赤外線カメラを搭載した無人航空機で走者を撮影し、熱中症予防に活用することとなった。当日は、昼間、目視外、１５０m以下の飛行とする。\n上記の運航形態において、最も適切なリスク対応を１つ選べ。",o:["ジオフェンス機能を設定しておく。","コース全体を見渡せる補助者を配置する。","観客のスマートフォンの電波干渉を避けるため、GNSSをOFFにして飛行させる。","万が一墜落することを想定し、墜落時のダメージ軽減のために、パラシュートを装備しておく。"],a:3,e:"ジオフェンス機能は仮想のフェンスであり、そのエリアから出ないようにするためのものです。マラソン大会のように広範囲で飛行させる場合には使いにくいものです。補助者の配置も安全対策として必要ですが、人の上空を飛行させる状況が想定されるため不十分です。GNSSをOFFにすることは電波干渉への対策にはなりません。万が一の墜落に備えたパラシュートの装備はダメージ軽減となり、最も適切です。",ref:"教則 第6章 6.3.3 回転翼航空機（マルチローター）（安全装備）（p.77）"},
  {cat:4,lvl:"one",q:"〔一等〕運航形態：無人航空機一等資格を取得している操縦者が、一等機体認証を受けた無人航空機（マルチローター）を使用し、人の住む山（人口集中地区ではない）を越えた町に、荷物を配送する。\nその飛行経路には、国道が走っており、その上空を横切ることは避けられない。\n昼間、目視外、１５０m以下の飛行であり立入管理措置は講じないものとする。\n上記の運航形態において、最も適切なリスク対応を１つ選べ。",o:["オートローテーション機能を理解し、飛行訓練を実施しておく。","山間部は電波が届きにくいため、GNSSをOFFにして飛行させる。","飛行経路内に第三者がいないことを確認する補助者を配置する。","自動帰還時の高度を障害物等が回避できる安全な高さに設定する。"],a:3,e:"今回は立入管理措置を講じないため、飛行経路内を監視する補助者は配置しないという前提でリスクを評価する必要があります。オートローテーション機能はヘリコプターの機能であり、マルチローターにはありません。GNSSをOFFにすることにも特に意味はありません。山間部での飛行となるため、自動帰還時の高度を障害物等が回避できる安全な高さに設定することが、今回のリスク対応としてふさわしいといえます。",ref:"教則 第6章 6.4.2 目視外飛行〔一等〕（p.80）"},
  {cat:4,lvl:"one",q:"〔一等〕運航形態：山林において25キロ以上の大型機のマルチコプターを使用し、資材の運搬を行う。昼間、目視外、１５０m以下の飛行で立入管理措置は講じないものとする。\n上記の運航形態において、最も適切なリスク対応を１つ選べ。",o:["大型機は慣性力が小さいため、障害物の直前で急停止できるよう飛行計画を立てる。","オートローテーションができる機体を選定する。","着陸地点を含む飛行経路近隣エリアへの事前説明、調整を計画する。","ジオフェンス機能を設定しておく。"],a:2,e:"オートローテーション機能はヘリコプターが有している場合があるもので、マルチコプターは有していません。ジオフェンス機能は仮想のフェンスで、そのエリアから出ないようにするためのものであり、資材の運搬のように広範囲で飛行させる場合は使い勝手がよくありません。また、大型機は慣性力が大きく、急な増減速や停止には時間と距離を要します。大型機は騒音が問題となるケースがあるため、着陸地点を含む飛行経路近隣エリアへの事前説明・調整を計画することが必要です。",ref:"教則 第6章 6.3.4 大型機〔一等〕（p.78）"},
  {cat:4,lvl:"one",q:"〔一等〕運航形態：飛行機を使用して農薬散布のための飛行を行う。\n昼間、目視内、１５０m以下で、補助者なしとする。\n上記の運航形態において、最も適切なリスク対応を１つ選べ。",o:["失速速度以下の速度で飛行させ、安全を確保する。","地面効果範囲内の時間は、安全のためなるべく長くする。","旋回させる時、取扱説明書で指定されたバンク角以上で飛行させる。","取扱説明書で指定された上昇角度以内で飛行させる。"],a:3,e:"地面効果は回転翼航空機で起こる現象です。旋回させる時は、取扱説明書で指定されたバンク角以内で飛行させる必要があります。また、飛行機は失速速度以下では飛行を維持できず、失速してしまいます。取扱説明書で指定された上昇角度以内で飛行させることが適切な対応です。",ref:"教則 第6章 6.3.1 飛行機（p.74）"},
  {cat:4,lvl:"one",q:"〔一等〕運航形態：夜間に山の畑の警備のため、無人航空機を飛行させる。飛行エリアは、畑の持ち主の畑のみで、夜間、目視内、１５０m以下、空港の近くでもなく、人口集中地区でもないものとする。\n上記の運航形態において、最も適切なリスク対応を１つ選べ。",o:["不具合が発生した際、フェールセーフ機能が作動するようにしておく。","周囲の明かりを確認しやすくするため、機体の灯火は消灯して飛行させる。","飛行高度の1/2と同じ半径内に第三者が存在しない状況でのみ飛行を実施する。","離着陸地点や、回避すべき障害物がある地点に照明を設置する。"],a:3,e:"フェールセーフ機能は安全対策として有効ではありますが、特に目視外飛行の運航において重要となるものです。第三者が存在してはならない半径は、単純に飛行高度の1/2とはいえません。また、夜間飛行では機体の姿勢や方向を把握するために灯火が必要であり、消灯して飛行させることは危険です。夜間飛行という特徴において、選択肢の中で最も適切なものは照明の設置です。",ref:"教則 第6章 6.4.1 夜間飛行（p.79）"},
  {cat:4,lvl:"one",q:"〔一等〕運航形態：海岸より海に向かって飛行させ、風景の撮影を行う。昼間、目視外、１５０m以下で、補助者なしとする。\n上記の運航形態において、最も適切なリスク対応を１つ選べ。",o:["航空機から視認しやすいよう灯火を装備する。","万が一墜落することを想定し、墜落時のダメージ軽減のために、パラシュートを装備しておく。","海の上空は電波が届きにくいため、GNSSをOFFにして飛行させる。","海上には障害物がないため、フェールセーフ機能の設定は解除して飛行させる。"],a:0,e:"パラシュートは、今回のように海の上空を飛行するケースでは、安全対策という観点からは重要度が低いです。GNSSをOFFにすることもあまり関係がありません。フェールセーフ機能の解除は、電波途絶時などのリスクをかえって高めるため不適切です。補助者を配置しない目視外飛行では、航空機からの視認性を高めるため、灯火の装備が求められています。",ref:"教則 第6章 6.4.2 目視外飛行〔一等〕（p.80）"},
  {cat:4,lvl:"one",q:"〔一等〕運航形態：ある挙式の撮影依頼を受け、屋外チャペルでの挙式撮影を行うことになった。\n当日は、参列者も多く参加予定をしており、その上空飛行も予定している。\n昼間、目視内、１５０m以下の飛行であり、立入管理措置は講じないものとする。\n上記の運航形態において、最も適切なリスク対応を１つ選べ。",o:["長時間撮影ができるようにエンジン駆動の無人航空機を使用する。","参列者の上空を飛行する時間を短くするため、最大速度で飛行させる。","自動飛行の設定を行うことで、より正確な飛行が可能となり、より安全な状況で行うことができる。","万が一墜落することを想定し、墜落時のダメージ軽減のために、パラシュートを装備しておく。"],a:3,e:"エンジンで駆動する機体の使用は、安全の確保という観点では重要ではありません。自動飛行についても、挙式での撮影という飛行目的を考えた場合、特段有効とはいえません。最大速度での飛行は、衝突時の運動エネルギーを増大させるためかえって危険です。第三者上空の飛行が想定されるため、万が一の墜落の際のダメージを軽減するパラシュートの装備が有効といえます。",ref:"教則 第6章 6.1.2 カテゴリーⅢ飛行において追加となる安全確保〔一等〕（p.64）"},
  {cat:4,lvl:"one",q:"〔一等〕運航形態：回転翼航空機（マルチコプター）で屋外イベントの撮影をする。\n目視外、昼間、高度１５０m以下での飛行であり、立入管理措置は講じる。\n上記の運航形態において、最も適切なリスク対応を１つ選べ。",o:["機体を軽量化するため、プロペラガードを外して飛行させる。","イベント参加者のスマホの電波影響を考え、GNSSをOFFにして飛行させる。","イベント中は緊急着陸がしにくいと考えられるので、いつもよりバッテリーを多く用意しておく。","飛行速度と風速の和が７ｍ／ｓ以上の状態では飛行させない。"],a:3,e:"GNSSをOFFにすることは、電波の影響を受けたときのリスク対策としては不十分です。バッテリーを多く用意することも、特段のリスク対応とはなりません。催し場所上空の飛行では、接触時の被害軽減のためプロペラガードの装備が求められており、外すことは不適切です。一方、「飛行速度と風速の和が７ｍ／ｓ以上の状態では飛行させない」ことは飛行マニュアルでも求められています。",ref:"教則 第6章 6.1.5 無人航空機の運航リスクの評価（p.65）"},
];
const Q_CALC2 = [
  {cat:5,lvl:"one",calc:"水平到達距離",q:"最高速度10m/sの無人航空機が、万が一揚力を失い落下することを想定し、地上に落下するまでの水平距離を30mに抑えたい。このとき高度は何mを限度にするべきか。重力加速度は9.8m/s²とし、空気抵抗は無視する。また風速も0とする。",fml:"x = v × √(2h ÷ g)",o:["約14.7m","約88.2m","約44.1m","約29.4m"],a:2,e:"公式 x=v√(2h/g) を用います。30=10×√(2×高度÷9.8)より、3²=2×高度÷9.8、高度=9×9.8÷2=44.1m。高度44.1m以下であれば、水平到達距離を30mに抑えることができます（理論値）。",ref:"公式集 水平到達距離 x=v√(2h/g)"},
  {cat:5,lvl:"one",calc:"フレネルゾーン",q:"送受信アンテナ間の距離が50mで、アンテナ間の中心地点におけるフレネルゾーン半径として適切なものを選べ。使用周波数は2.4GHzである。また光速度は3×10⁸m/sとする。",fml:"r = √((λ × D1 × D2) ÷ D)",o:["約1.25m","約2.5m","約3.95m","約1.56m"],a:0,e:"まず波長λ＝光速÷周波数=(3×10⁸)÷(2.4×10⁹)=0.125mを求めます。次にフレネルゾーン半径 r=√((λ×D1×D2)÷D)=√((0.125×25×25)÷50)=√1.5625=1.25mとなります。中心地点（D1=D2）で半径は最大になります。",ref:"公式集 フレネルゾーン r=√((λ×D1×D2)/D)"},
  {cat:5,lvl:"one",calc:"推力",q:"回転角速度が480rad/sから520rad/sに変わり、空気密度が1.22kg/m³から1.18kg/m³に変わった。\nこのとき、ドローンの推力は何倍になるか。最も適切なものを1つ選べ。",fml:"T ∝ ρ × ω²",o:["約1.14倍","約1.05倍","約0.82倍","約1.21倍"],a:0,e:"推力は空気密度ρに比例し、回転角速度ωの2乗に比例します（T∝ρω²）。空気密度は1.18/1.22倍、回転角速度は520/480倍なので、(1.18÷1.22)×(520÷480)²≒0.967×1.174≒1.14。推力は約1.14倍となります。",ref:"公式集 推力 T∝ρω²"},
  {cat:5,lvl:"one",calc:"揚力",q:"B高度はA高度の1.1倍の空気密度である。A高度において30km/hで水平定常飛行できる飛行機（重量7kg）がある。\nこの飛行機がB高度でプラス1kgの荷物を積んで飛行を行うとき、水平定常飛行できる速度として、最も適切なものを1つ選べ。",fml:"W = L ∝ ρ × V²",o:["約31.2km/h","約26.8km/h","約30.6km/h","約33.6km/h"],a:2,e:"水平定常飛行では機体重量＝揚力であり、揚力は空気密度と速度の2乗に比例します（W=L∝ρV²）。B高度では空気密度が1.1倍、重量が8/7倍なので、8/7=1.1×(V'/V)²より V'/V=√((8/7)÷1.1)≒1.02。30km/h×1.02≒約30.6km/hとなります。※上記の式は簡略化した近似であることに注意してください。",ref:"公式集 揚力 W=L∝ρV²"},
  {cat:5,lvl:"one",calc:"フレネルゾーン",q:"送受信アンテナ間の距離が1000mで、アンテナ間の中心地点におけるフレネルゾーン半径の60%の値として最も適切なものを１つ選べ。使用周波数は5.7GHzである。また光速度は3×10⁸m/sとする。",fml:"r = √(λ × d1 × d2 ÷ (d1 + d2))",o:["約2.18m","約3.63m","約1.54m","約7.89m"],a:0,e:"波長λは光速÷周波数で求められ、(3×10⁸)÷(5.7×10⁹)≒0.0526mです。フレネルゾーン半径はr=√(λ×d1×d2÷(d1+d2))で求められ、中心地点ではd1=d2=500mなので、r=√(0.0526×500×500÷1000)≒3.63mとなります。その60%は3.63×0.6≒2.18mです。",ref:"公式集 フレネルゾーン r=√(λ·d1·d2/(d1+d2))"},
  {cat:5,lvl:"one",calc:"消費パワー",q:"総重量1.3kgのドローンがホバリングするときの消費パワーが110Wである。\nこのドローンの総重量が1.5kgになったとき、ホバリングするときの消費パワーとして、適切なものを１つ選べ。\n空気密度は一定とする。",fml:"P ∝ ρ × ω³",o:["約146W","約127W","約136W","約118W"],a:2,e:"機体重量が1.5/1.3倍になると、ホバリングに必要な推力も1.5/1.3倍になります。推力は回転角速度ωの2乗に比例するため、ωは√(1.5/1.3)倍になります。消費パワーはωの3乗に比例するため、(√(1.5/1.3))³≒1.24倍となり、110W×1.24≒136Wです。",ref:"公式集 消費パワー P∝ρω³"},
  {cat:5,lvl:"one",calc:"滑空距離",q:"飛行機が滑空によって進むことのできる距離として最も長いものを１つ選べ。",fml:"滑空距離 = 揚抗比 × 高度",o:["揚抗比が14で高度が89mの飛行機","揚抗比が9で高度が103mの飛行機","揚抗比が11で高度が95mの飛行機","揚抗比が13で高度が78mの飛行機"],a:0,e:"滑空距離は「揚抗比×高度」で求められます。揚抗比9×高度103m=927m、揚抗比13×高度78m=1014m、揚抗比14×高度89m=1246m、揚抗比11×高度95m=1045mとなり、揚抗比14で高度89mの飛行機が最長です。",ref:"公式集 滑空距離 滑空距離=揚抗比×高度"},
  {cat:5,lvl:"one",calc:"旋回半径",q:"旋回半径が210m、バンク角が11°のときの飛行速度として適切なものを１つ選べ。\nなお重力加速度は9.8m/s²、tan11°は0.19とする。",fml:"r = V² ÷ (g × tanφ)",o:["約45.4m/s","約19.8m/s","約10.6m/s","約104.1m/s"],a:1,e:"旋回半径の公式 r=V²÷(g×tanφ) より、210=V²÷(9.8×0.19)です。V²=210×9.8×0.19=391.02となり、V=√391.02≒19.8m/sです。",ref:"公式集 旋回半径 r=V²/(g·tanφ)"},
  {cat:5,lvl:"one",calc:"旋回半径",q:"飛行速度が15m/s、バンク角が13°の場合の旋回半径として適切なものを１つ選べ。\nなお重力加速度は9.8m/s²、tan13°は0.23とする。",fml:"r = V² ÷ (g × tanφ)",o:["約10.0m","約6.7m","約507.2m","約99.8m"],a:3,e:"旋回半径の公式 r=V²÷(g×tanφ) より、r=15²÷(9.8×0.23)=225÷2.254≒99.8mとなります。",ref:"公式集 旋回半径 r=V²/(g·tanφ)"},
  {cat:5,lvl:"one",calc:"消費パワー",q:"空気密度が0.95倍になったとき、ホバリングをするための消費パワーは何倍となるか。最も適切なものを１つ選べ。",fml:"P ∝ ρ × ω³",o:["約1.08倍","約0.95倍","約1.03倍","約1.05倍"],a:2,e:"ホバリングに必要な推力は一定のため、推力∝空気密度×ω²より、1=0.95×ω²となり、回転角速度ωは√(1/0.95)倍になります。消費パワーは空気密度×ω³に比例するため、0.95×(√(1/0.95))³=√(1/0.95)≒1.03倍となります。",ref:"公式集 消費パワー P∝ρω³"},
  {cat:5,lvl:"one",calc:"定常旋回飛行の揚力",q:"バンク角が15°の定常旋回飛行を行うためには、水平定常飛行の何倍の揚力が必要か。\ntan15°= 0.268、cos15°=0.966とする。",fml:"L = W ÷ cosθ",o:["約1.04倍","約1.27倍","約0.97倍","約1.07倍"],a:0,e:"定常旋回飛行に必要な揚力は「水平定常飛行の揚力÷cosθ」で求められます。水平定常飛行の揚力を1とすると、1÷cos15°=1÷0.966≒1.035となり、約1.04倍の揚力が必要です。tan15°はこの計算では使いません。",ref:"公式集 定常旋回飛行の揚力 L=W/cosθ"},

// ============================================================
//  4択化ヘルパー（4択データを正解1＋誤答3でシャッフル出題。v62で3択→4択に変更）
//  - q.o[q.a] を必ず含め、誤答を最大3つ選び、シャッフル
//  - 返り値: { opts:[最大4つの文章], ans:正解の表示index }
//  - 誤答が3未満（元データが4択未満）の場合はある分だけ使う
// ============================================================
function make4(q){
  const correct = q.o[q.a];
  const wrongs = q.o.filter((_,i)=>i!==q.a);
  const pickW = shuffle(wrongs).slice(0,3);
  const opts = shuffle([correct, ...pickW]);
  return { opts, ans: opts.indexOf(correct) };
}

function saveSession(){
  if(!Q.list||!Q.list.length) return;
  if(Q.mode==="result") return;
  S.session={ ids:Q.list.map(q=>q.id), i:Q.i, correct:Q.correct, wrongIds:Q.wrongIds.slice(),
    mode:Q.mode, mock:Q.mock, learn:Q.learn, timer:Q.timer, n:BANK.length, ts:Date.now() };
  save();
}
function clearSession(){ if(S.session){ delete S.session; save(); } }
function hasResume(){ const s=S.session; return !!(s && s.ids && s.ids.length && (s.i||0) < s.ids.length); }
function discardSession(){ clearSession(); renderHome(); setNavActive("home"); }
function resumeSession(){
  const s=S.session;
  if(!s||!s.ids){ renderHome(); setNavActive("home"); return; }
  const list=s.ids.map(id=>BANK[id]).filter(Boolean);
  if(list.length<s.ids.length*0.5){ clearSession(); toast("再開データを更新できませんでした"); renderHome(); setNavActive("home"); return; }
  const i=Math.min(s.i||0, list.length-1);
  Q={ list, i, sel:null, answered:false, correct:s.correct||0, wrongIds:(s.wrongIds||[]).slice(),
      mode:s.mode||"cat", timer:s.timer||0, tInt:null, mock:!!s.mock, learn:!!s.learn, view4:snap4(list) };
  renderQuiz();
  if(Q.mock && Q.timer>0){ tickTimer(); }
}

// 出題リストに対し、各問の4択スナップショット（opts/ans）を生成して保持。
// これにより「毎回ランダムな選択肢・配置」かつ採点が安定する。
function snap4(list){ return list.map(q=>make4(q)); }

function buildMock(){
  // 国家試験を想定：二等相当(common) 50問 ＋ 一等(非計算) 15問 ＋ 計算 5問 ＝ 70問
  // 本番の計算問題は5問程度のため、計算(cat5)を5問に固定し比率を本番に近づける（v62）。
  const common = shuffle(BANK.filter(q=>q.lvl==="common"));
  const oneNC  = shuffle(BANK.filter(q=>q.lvl==="one" && q.cat!==5));
  const calc   = shuffle(BANK.filter(q=>q.cat===5));
  const pick=(arr,n)=>arr.slice(0,Math.min(n,arr.length));
  return shuffle([...pick(common,50), ...pick(oneNC,15), ...pick(calc,5)]);
}

function startQuiz(mode,cat){
  clearInterval(Q.tInt);   // 前回のタイマー（特に模試）が残って誤作動するのを防ぐ
  let list, learn=false, mock=false;
  if(mode==="mock"){ list=buildMock(); mock=true; }
  else if(mode==="cat"){ list=shuffle(byCat(cat)); }
  else if(mode==="review"){ list=shuffle(BANK.filter(q=>S.wrong[q.id])); }
  else if(mode==="learn"){ list=learnList(cat); learn=true; } // cat=null:全章順次 / 数値:その章（教則の順番どおり・シャッフルしない）
  else { toast("対象の問題がありません"); return; }
  if(!list.length){ toast("対象の問題がありません"); return; }
  Q={list,i:0,sel:null,answered:false,correct:0,wrongIds:[],mode,timer:0,tInt:null,mock,learn,view4:snap4(list)};
  if(Q.mock){ Q.timer=75*60; tickTimer(); }
  renderQuiz();
}

// 学習モード：教則の順番（章順→章内はid順）で並べる。calc=null で全章、数値でその章のみ。
function learnList(cat){
  if(cat){ return BANK.filter(q=>q.cat===cat).slice().sort((a,b)=>a.id-b.id); }
  // 全章：LEARN_ORDER（教則章順）に従い、各章内はid昇順
  let out=[];
  for(const c of LEARN_ORDER){ out=out.concat(BANK.filter(q=>q.cat===c).slice().sort((a,b)=>a.id-b.id)); }
  return out;
}
function fmtTimer(t){ const m=Math.floor(t/60),s=t%60; return `${m}:${String(s).padStart(2,'0')}`; }
// タイマーは startQuiz / resumeSession でのみ起動する。renderQuiz からは呼ばない
// （毎問 interval を張り直すと端数秒が破棄され、模試の実時間が75分を超えて延びるため）。
function tickTimer(){
  clearInterval(Q.tInt);
  Q.tInt=setInterval(()=>{
    Q.timer--; const el=$("#qtimer");
    if(el) el.textContent=fmtTimer(Q.timer);
    if(Q.timer<=0){ clearInterval(Q.tInt); finishQuiz(); }
  },1000);
}

        <button onclick="calcKey('+')">\uff0b</button>
        <button class="calc-eq" style="grid-column:span 4" onclick="calcEqual()">\uff1d</button>
      </div>`;
}
function calcPadHTML(){
  return `<div class="calcwrap">
    <button class="calc-toggle" onclick="toggleCalc()">\ud83d\udda9 \u96fb\u5353\u3092\u958b\u304f\uff0f\u9589\u3058\u308b</button>
    <div class="calc-pad" id="calcPad" style="display:none">${calcKeysHTML()}</div>
  </div>`;
}
function openCalc(){
  if($("#calcModalOv")) return;
  var ov=document.createElement('div');
  ov.id='calcModalOv'; ov.className='calc-modal-ov';
  ov.innerHTML=`<div class="calc-modal" onclick="event.stopPropagation()">
      <div class="calc-modal-head"><span>CBT\u96fb\u5353</span><button class="calc-x" onclick="closeCalc()" aria-label="\u9589\u3058\u308b">\u00d7</button></div>
      ${calcKeysHTML()}
      <div class="calc-note">\u672c\u756a\u306eCBT\u8a66\u9a13\u3082\u3053\u306e\u96fb\u5353\u306e\u307f\u4f7f\u7528\u53ef\uff08\u96fb\u5353\u6301\u8fbc\u4e0d\u53ef\uff09</div>
    </div>`;
  ov.addEventListener('click', closeCalc);
  document.body.appendChild(ov);
}
function closeCalc(){ var m=$("#calcModalOv"); if(m && m.parentNode) m.parentNode.removeChild(m); }
function calcShow(){ var t=calcDispText(); var ds=document.querySelectorAll('.calc-disp'); for(var i=0;i<ds.length;i++) ds[i].textContent=t; }
function toggleCalc(){ const p=$("#calcPad"); if(p) p.style.display = (p.style.display==='none'?'block':'none'); }
function calcKey(k){ if(calcExpr==='エラー') calcExpr=''; calcExpr += (k==='√'?'√(':k); calcShow(); }
function calcClear(){ calcExpr=''; calcShow(); }
function calcDel(){ if(calcExpr==='エラー') calcExpr=''; else calcExpr=calcExpr.slice(0,-1); calcShow(); }
function calcEqual(){
  if(!calcExpr){ calcShow(); return; }   // 空（表示0）で＝は何もしない
  try{
    let e=calcExpr.replace(/√/g,'Math.sqrt').replace(/×/g,'*').replace(/÷/g,'/');
    e=e.replace(/(^|[^\d.])0+(?=\d)/g,'$1');   // 先頭ゼロを正規化（strict mode の8進リテラル禁止で「05」等がエラーになるのを防ぐ）
    if(!/^[0-9+\-*/().\sMathsqrt]*$/.test(e)){ calcExpr='エラー'; calcShow(); return; }
    const r=Function('"use strict";return ('+e+')')();
    calcExpr=(r==null||Number.isNaN(r)||!Number.isFinite(r))?'エラー':String(Math.round(r*1e6)/1e6);
  }catch(_){ calcExpr='エラー'; }
  calcShow();
}
function fmtQ(q){
  let t = q.q.replace(/\n/g,"<br>");
  /* 計算問題の公式表示は撤去（出題で答えを示さない） */
  return t;
}

function choose(idx){
  if(Q.answered) return;
  Q.sel=idx;
  document.querySelectorAll(".opt").forEach(o=>o.classList.toggle("sel",+o.dataset.i===idx));
  const b=$("#nextBtn"); b.disabled=false;
}

function nextQ(){
  const q=Q.list[Q.i];
  const v=Q.view4[Q.i];
  if(!Q.answered){
    // grade（4択：表示上の正解index v.ans と選択 Q.sel を比較）
    Q.answered=true;
    dayTick();
    const correct = Q.sel===v.ans;
    S.seen[q.id]=true;
    if(correct){ Q.correct++; if(!Q.mock){ S.known[q.id]=true; } delete S.wrong[q.id]; }
    else { Q.wrongIds.push(q.id); S.wrong[q.id]=true; }
    S.attempts[q.id]=(S.attempts[q.id]||0)+1;
    save();
    document.querySelectorAll(".opt").forEach(o=>{
      const i=+o.dataset.i; o.classList.add("disabled");
      if(i===v.ans) o.classList.add("correct");
      else if(i===Q.sel) o.classList.add("wrong");
    });
    if(!Q.mock){
      $("#exp").innerHTML=`<div class="explain ${correct?'ok':'ng'}">
        <div class="res">${correct?'✓ 正解':'✗ 不正解'} — 正答は ${"ABCD"[v.ans]}</div>
        <div class="body">${q.e.replace(/\n/g,"<br>")}</div>
        <div class="ref">📖 ${q.ref}</div></div>`;
    }
    const last = Q.i>=Q.list.length-1;
    $("#nextBtn").textContent = last ? "結果を見る" : "次の問題 →";
    $("#nextBtn").disabled=false;
  } else {
    Q.i++; Q.sel=null; Q.answered=false;
    if(Q.i>=Q.list.length){ finishQuiz(); } else renderQuiz();
  }
}

function quitQuiz(){
  clearInterval(Q.tInt);
  if(Q.learn){ renderHome(); setNavActive("home"); return; }
  if(confirm("演習を中断してホームに戻りますか？")){ renderHome(); setNavActive("home"); }
}

function finishQuiz(){
  Tview="result"; clearInterval(Q.tInt); clearSession();
  const total=Q.list.length, correct=Q.correct, wrong=total-correct;
  const pct=Math.round(correct/total*100);
  // 学習モードは合否でなく「一巡完了」として表示
  if(Q.mode==="learn"){
    S.history.push({t:Date.now(),mode:"learn",total,correct,pct,mock:false});
    if(S.history.length>50) S.history=S.history.slice(-50);
    save();
    let h=`<div class="screen result">
      <div class="big ${pct>=80?'pass':'fail'}">${pct}%</div>
      <div class="verdict">📚 学習一巡 完了</div>
      <div class="desc">この範囲を最後まで進めました（正解 ${correct}/${total}）。<br>間違えた問題は復習タブにまとまっています。</div>
      <div class="rstat">
        <div class="box ok"><div class="n">${correct}</div><div class="l">正解</div></div>
        <div class="box ng"><div class="n">${wrong}</div><div class="l">不正解</div></div>
        <div class="box"><div class="n">${total}</div><div class="l">問題数</div></div>
      </div>
      <div class="actions" style="flex-direction:column">
        ${Q.wrongIds.length?`<button class="btn bad" onclick="reviewThese()">✗ 間違えた${Q.wrongIds.length}問を復習</button>`:''}
        <button class="btn primary" onclick="renderHome();setNavActive('home')">ホームへ戻る</button>
      </div></div>`;
    main.innerHTML=h; main.scrollTop=0; refreshHeader(); return;
  }
  const pass = Q.mock ? pct>=90 : pct>=80;
  S.history.push({t:Date.now(),mode:Q.mode,total,correct,pct,mock:Q.mock});
  if(S.history.length>50) S.history=S.history.slice(-50);
  save();
  let note;
  if(Q.mock) note = pass?"合格基準（90%）クリア！この調子で本番に臨みましょう。":"本番は二等相当・一等とも各科目で高い正答率が必要。間違えた問題を復習で潰しましょう。";
  else note = pass?"よくできています。":"復習タブで弱点を重点的に固めましょう。";
  let h=`<div class="screen result">
    <div class="big ${pass?'pass':'fail'}">${pct}%</div>
    <div class="verdict">${pass?'🎉 合格ライン':'もう一歩'}</div>
    <div class="desc">${note}</div>
    <div class="rstat">
      <div class="box ok"><div class="n">${correct}</div><div class="l">正解</div></div>
      <div class="box ng"><div class="n">${wrong}</div><div class="l">不正解</div></div>
      <div class="box"><div class="n">${total}</div><div class="l">問題数</div></div>
    </div>
    <div class="actions" style="flex-direction:column">
      ${Q.wrongIds.length?`<button class="btn bad" onclick="reviewThese()">✗ 間違えた${Q.wrongIds.length}問を復習</button>`:''}
      <button class="btn primary" onclick="renderHome();setNavActive('home')">ホームへ戻る</button>
    </div></div>`;
  main.innerHTML=h; main.scrollTop=0; refreshHeader();
}
let _lastWrong=[];
function reviewThese(){
  _lastWrong=Q.wrongIds.slice();
  const list=shuffle(BANK.filter(q=>_lastWrong.includes(q.id)));
  Q={list,i:0,sel:null,answered:false,correct:0,wrongIds:[],mode:"review",timer:0,tInt:null,mock:false,learn:false,view4:snap4(list)};
  renderQuiz();
}

// ============================================================
//  公式カード / 記号カード（表:名称 → 裏:公式/意味）
// ============================================================
let D={list:[],i:0,flipped:false,kind:""};
function startDeck(kind){
  clearInterval(Q.tInt);
  const src = kind==="formula" ? FORMULA_CARDS : SYMBOL_CARDS;
  D={list:shuffle(src),i:0,flipped:false,kind};
  renderDeck();
}
function renderDeck(){
  Tview="deck";
  const c=D.list[D.i];
  const isF = D.kind==="formula";
  const title = isF ? "公式カード" : "記号・単語カード";
  const front = isF ? c.term : c.sym;
  const frontSize = isF ? "22px" : "44px";
  let backHtml;
  if(isF){
    backHtml = `<div class="dformula">${fmlHTML(c.formula)}</div>${c.note?`<div class="a" style="font-size:13px;text-align:center">${c.note}</div>`:''}`;
  }else{
    const en = (c.en && c.en!=="—") ? `<div class="dunit" style="color:var(--acc2);border:none;padding-top:0">${c.en}</div>` : '';
    const rd = c.read ? `<div style="font-size:13px;color:var(--sub);text-align:center;margin-bottom:10px">読み: ${c.read}</div>` : '';
    backHtml = `${rd}<div class="dmean">${c.mean}</div>${en}`;
  }
  // 表面のタグに読みを併記（記号カードのみ）
  const frontTag = isF ? title : (c.read ? `${title}（${c.read}）` : title);
  let h=`<div class="screen deck-screen">
    <div class="qhead"><div class="qcount">${D.i+1}<small> / ${D.list.length}</small></div>
      <button class="btn ghost" style="flex:none;padding:9px 14px;font-size:12px" onclick="renderHome();setNavActive('home')">終了</button></div>
    <div class="qmini-bar"><i style="width:${(D.i+1)/D.list.length*100}%"></i></div>
    <div class="flash deck-flash ${D.flipped?'flipped':''}" id="flash" onclick="flipDeck()">
      <div class="flash-inner">
        <div class="flash-face flash-front" style="justify-content:center;text-align:center">
          <div class="tag">${frontTag}</div>
          <div style="font-size:${frontSize};font-weight:900;line-height:1.3">${front}</div>
          <div class="hint">タップで${isF?'公式':'意味'}を表示</div>
        </div>
        <div class="flash-face flash-back" style="justify-content:center">
          <div class="tag" style="color:var(--acc2);text-align:center">${front}</div>
          ${backHtml}
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="btn ghost" onclick="prevDeck()" ${D.i===0?'disabled':''}>← 前</button>
      <button class="btn primary" onclick="nextDeck()">${D.i>=D.list.length-1?'最初に戻る ↻':'次へ →'}</button>
    </div></div>`;
  main.innerHTML=h; main.scrollTop=0; fitFH(main);
}
function flipDeck(){ D.flipped=!D.flipped; $("#flash").classList.toggle("flipped",D.flipped); }
function nextDeck(){
  if(D.i+1 >= D.list.length){
    // 一周したら再シャッフル（直前のカードが先頭に来ないように）
    const last = D.list[D.i];
    let next = shuffle(D.list);
    if(next.length>1 && next[0]===last){ [next[0],next[next.length-1]]=[next[next.length-1],next[0]]; }
    D.list = next; D.i = 0;
  } else {
    D.i++;
  }
  D.flipped=false; renderDeck();
}
function prevDeck(){ if(D.i>0){ D.i--; D.flipped=false; renderDeck(); } }

function renderSymbolTable(){
  Tview="symbols";
  let rows = SYMBOL_CARDS.map(c=>{
    const en = (c.en && c.en!=="—") ? c.en : "";

    <div class="explain" style="margin-bottom:14px">計算問題に出る記号と読み・意味の一覧です。1枚ずつ覚えたいときは「公式カード/記号カード」（ホーム下部）を使ってください。</div>
    <div class="symtable-wrap"><table class="symtable">

      <tbody>${rows}</tbody>

    </div>`;

// ============================================================
//  CALC FORMULA SHEET
// ============================================================
function bindSup(str){ return str.replace(/(.)([²³⁸⁹]+)/g,'<span style="white-space:nowrap">$1$2</span>'); }
function fmlHTML(str){
  return String(str).split("<br>").map(function(ln){
    var depth=0, t0=ln;
    while(t0.charAt(0)==="　"){ depth++; t0=t0.slice(1); }
    var d="d"+(depth>3?3:depth);
    var t=t0.trim();
    if(t==="") return '<div style="height:10px"></div>';
    if(t.charAt(0)==="※") return '<div class="fn '+d+'">'+t0+'</div>';
    if(t.indexOf("【公式】")===0) return '<div class="fh '+d+'">'+bindSup(t0)+'</div>';
    var ix=t0.indexOf("例：");
    if(ix>=0) return '<div class="fl '+d+'">'+bindSup(t0.slice(0,ix))+'<span class="fex">'+t0.slice(ix)+'</span></div>';
    return '<div class="fl '+d+'">'+bindSup(t0)+'</div>';
  }).join("");
}
function fitFH(root){
  if(!root||!root.querySelectorAll) return;
  var els=root.querySelectorAll(".fh"); if(!els||!els.length) return;
  for(var i=0;i<els.length;i++){
    var el=els[i]; if(!el||!el.style) continue;
    el.style.whiteSpace="nowrap"; el.style.fontSize="";
    var cs=(typeof getComputedStyle==="function"?getComputedStyle(el):null);
    var size=parseFloat(cs?cs.fontSize:"12.5")||12.5;
    var g=80;
    while(el.clientWidth>0 && el.scrollWidth>el.clientWidth+0.5 && size>9 && (g--)>0){ size-=0.5; el.style.fontSize=size+"px"; }
  }
}
function renderCalc(){
  Tview="calc";
  let h=`<div class="screen"><div class="sec-title">計算公式シート（一等の核心）</div>
    <div class="explain" style="margin-bottom:16px">本番は計算5問。<b>2問以上の失点は致命的</b>です。試験画面の電卓は使用可、持込不可。各公式の逆算も併記。</div>`;
  for(const s of FORMULA_CARDS){
    h+=`<div class="ref-card"><h3>${s.term}</h3>
      <div class="formula">${fmlHTML(s.formula)}</div>${s.note?`<div class="note" style="margin-top:8px;color:var(--acc2)">${s.note}</div>`:''}</div>`;
  }
  h+=`<button class="btn primary" style="margin-top:6px" onclick="startQuiz('cat',5)">計算問題を解く →</button></div>`;
  main.innerHTML=h; main.scrollTop=0; fitFH(main);
}

// ============================================================
//  REVIEW (wrong answers)
// ============================================================
function renderReview(){
  Tview="review";
  const wrongList=BANK.filter(q=>S.wrong[q.id]);
  let h=`<div class="screen"><div class="sec-title">🔁 復習リスト（要再確認）</div>`;
  if(!wrongList.length){
    h+=`<div class="empty">🎉<br>復習が必要な問題はありません。<br>クイズや暗記カードで間違えた問題が<br>ここに集まります。</div>
    <button class="btn ghost" onclick="renderHome();setNavActive('home')">ホームへ</button></div>`;
    main.innerHTML=h; main.scrollTop=0; return;
  }
  h+=`<div class="explain ng" style="margin-bottom:14px"><b>${wrongList.length}問</b>が要復習です。まとめて演習して正解すると、自動でリストから外れます。</div>
    <button class="btn bad" style="margin-bottom:14px" onclick="startQuiz('review')">▶ ${wrongList.length}問をまとめて復習</button>`;
  // group by cat
  for(const c of [1,2,3,4,5]){
    const sub=wrongList.filter(q=>q.cat===c);
    if(!sub.length) continue;
    h+=`<div style="margin:8px 2px 8px;font-size:12px;font-weight:700;color:var(--sub)">${CATS[c].icon} ${CATS[c].short}（${sub.length}）</div>`;
    sub.forEach(q=>{
      h+=`<div class="ref-card" style="padding:13px 14px"><div style="font-size:13px;line-height:1.5;font-weight:500">${q.q.split("\n")[0]}</div>
        <div style="font-size:11px;color:var(--good);margin-top:7px">正答: ${q.o[q.a]}</div>
        <div style="font-size:10.5px;color:var(--sub);margin-top:5px;line-height:1.5">${q.e.split("\n")[0]}</div></div>`;
    });
  }
  h+=`</div>`;
  main.innerHTML=h; main.scrollTop=0;
}

// ============================================================
//  STATS
// ============================================================
function renderStats(){
  Tview="stats";
  const tot=BANK.length, kn=BANK.filter(q=>S.known[q.id]).length, seen=BANK.filter(q=>S.seen[q.id]).length;
  const wrong=BANK.filter(q=>S.wrong[q.id]).length;
  const mocks=S.history.filter(h=>h.mock);
  const lastMock=mocks[mocks.length-1];
  let h=`<div class="screen"><div class="sec-title">📊 学習成績</div>
    <div class="rstat" style="margin-bottom:14px">
      <div class="box ok"><div class="n">${kn}</div><div class="l">習得</div></div>
      <div class="box ng"><div class="n">${wrong}</div><div class="l">要復習</div></div>
      <div class="box"><div class="n">${Math.round(kn/tot*100)}<span style="font-size:14px">%</span></div><div class="l">全体習得率</div></div>
    </div>`;
  // per-category bars
  h+=`<div class="ref-card"><h3 style="color:var(--ink);font-size:13px">分野別 習得率</h3><div style="margin-top:6px">`;
  for(const c of [1,2,3,4,5]){
    const list=byCat(c), k=knownCount(list), p=list.length?Math.round(k/list.length*100):0;
    h+=`<div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:4px">
      <span>${CATS[c].icon} ${CATS[c].short}</span><span style="color:var(--sub)">${k}/${list.length}・${p}%</span></div>
      <div style="height:7px;background:var(--panel2);border-radius:4px;overflow:hidden"><i style="display:block;height:100%;width:${p}%;background:var(--acc);border-radius:4px"></i></div></div>`;
  }
  h+=`</div></div>`;
  // mock history
  h+=`<div class="ref-card"><h3 style="color:var(--ink);font-size:13px">模試の記録</h3>`;
  if(lastMock){
    h+=`<div class="note" style="margin-top:4px">直近: <b style="color:${lastMock.pct>=90?'var(--good)':'var(--bad)'}">${lastMock.pct}%</b>（${lastMock.correct}/${lastMock.total}）・${lastMock.pct>=90?'合格基準達成':'基準未達'}</div>`;
    const recent=mocks.slice(-6);
    h+=`<div style="display:flex;gap:6px;align-items:flex-end;height:70px;margin-top:14px">`;
    recent.forEach(m=>{ h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="width:100%;height:${Math.max(8,m.pct*0.55)}px;background:${m.pct>=90?'var(--good)':'var(--bad)'};border-radius:4px 4px 0 0"></div>
      <span style="font-size:9px;color:var(--sub)">${m.pct}</span></div>`; });
    h+=`</div>`;
  } else {
    h+=`<div class="note" style="margin-top:4px">まだ模試の記録がありません。「本番模試」に挑戦してみましょう。</div>`;
  }
  h+=`</div>`;
  h+=`<button class="btn ghost" style="margin-top:6px" onclick="resetAll()">学習データをリセット</button></div>`;
  main.innerHTML=h; main.scrollTop=0; refreshHeader();
}
async function resetAll(){
  if(!confirm("習得状況・復習リスト・成績をすべて消去します。よろしいですか？")) return;
  S={ known:{}, wrong:{}, seen:{}, streak:S.streak, lastDay:S.lastDay, history:[], attempts:{} };
  await save(); toast("リセットしました"); renderStats(); refreshHeader();
}

// ============================================================
//  NAV
// ============================================================
function setNavActive(name){
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("on",b.dataset.nav===name));
}
function setNav(name){
  clearInterval(Q.tInt);   // クイズ/模試から他タブへ移動したらタイマー停止
  setNavActive(name);
  if(name==="home") renderHome();
  else if(name==="symbols") renderSymbolTable();
  else if(name==="calc") renderCalc();
  else if(name==="review") renderReview();
  else if(name==="stats") renderStats();
}
document.querySelectorAll("nav button").forEach(b=>{
  b.addEventListener("click",()=>setNav(b.dataset.nav));
});

(async()=>{ await load(); renderHome(); refreshHeader(); })();
