<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>一等学科試験 暗記マスター</title>
<meta name="description" content="一等無人航空機操縦士 学科試験の暗記アプリ（教則第4版準拠・必勝計算5公式）">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0e1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="一等学科">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Bebas+Neue&display=swap');

  :root{
    --bg:#0a0e1a;
    --panel:#121829;
    --panel2:#1a2238;
    --line:#26304d;
    --ink:#e8ecf6;
    --sub:#8b97b8;
    --acc:#3dd6c4;
    --acc2:#ffb627;
    --bad:#ff5d6c;
    --good:#3ddc84;
    --hot:#ff7a45;
    --shadow:0 10px 40px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  /* PWAでホームバー領域(下部セーフエリア)がナビ色で埋まるようにする */
  html{background:#121829}
  body{
    font-family:'Zen Kaku Gothic New',sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(61,214,196,.10), transparent 60%),
      radial-gradient(1000px 500px at -10% 110%, rgba(255,182,39,.07), transparent 55%),
      var(--bg);
    color:var(--ink);
    overflow:hidden;
    height:100dvh;
    display:flex;flex-direction:column;
  }
  #app{position:fixed;top:0;bottom:0;left:0;right:0;height:100%;display:flex;flex-direction:column;max-width:480px;width:100%;margin:0 auto;overflow:hidden}

  /* ---------- Header ---------- */
  header{
    padding:calc(16px + env(safe-area-inset-top)) 18px 16px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,rgba(18,24,41,.9),rgba(18,24,41,.4));
    backdrop-filter:blur(8px);
    position:relative;z-index:5;
  }
  .h-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .logo{display:flex;align-items:center;gap:10px}
  .logo .mark{
    width:36px;height:36px;border-radius:9px;
    object-fit:cover;
    box-shadow:0 4px 14px rgba(0,0,0,.5);
  }
  .logo h1{font-size:15px;font-weight:900;letter-spacing:.02em;line-height:1.15}
  .logo .sub{font-size:10.5px;color:var(--sub);font-weight:500;margin-top:1px}
  .streak{
    font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--acc2);
    border:1px solid rgba(255,182,39,.35);border-radius:20px;padding:4px 11px;
    display:flex;align-items:center;gap:5px;letter-spacing:.06em;
  }
  .progbar{height:5px;background:var(--panel2);border-radius:4px;margin-top:12px;overflow:hidden}
  .progbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:4px;width:0;transition:width .5s cubic-bezier(.4,0,.2,1)}
  .prog-label{display:flex;justify-content:space-between;font-size:10.5px;color:var(--sub);margin-top:6px;font-weight:500}

  /* ---------- Scroll body ---------- */
  main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:30px 16px calc(128px + env(safe-area-inset-bottom))} /* 下パディングは電卓FAB(66+52px)より深く取り、最下部コンテンツが隠れないようにする */
  main::-webkit-scrollbar{width:0}

  .screen{animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* ---------- Home cat cards ---------- */
  .sec-title{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.08em;margin:6px 2px 12px;text-transform:uppercase}
  .cat{
    background:linear-gradient(135deg,var(--panel),var(--panel2));
    border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px;
    position:relative;overflow:hidden;cursor:pointer;transition:transform .15s, border-color .15s;
  }
  .cat:active{transform:scale(.985)}
  .cat .row{display:flex;align-items:center;gap:13px}
  .cat .ic{
    width:46px;height:46px;border-radius:13px;flex:none;display:grid;place-items:center;font-size:22px;
    background:rgba(61,214,196,.12);border:1px solid rgba(61,214,196,.25);
  }
  .cat.c1 .ic{background:rgba(255,93,108,.12);border-color:rgba(255,93,108,.3)}
  .cat.c2 .ic{background:rgba(61,214,196,.12);border-color:rgba(61,214,196,.3)}
  .cat.c3 .ic{background:rgba(255,182,39,.12);border-color:rgba(255,182,39,.3)}
  .cat.c4 .ic{background:rgba(124,140,255,.12);border-color:rgba(124,140,255,.3)}
  .cat.c5 .ic{background:rgba(255,122,69,.14);border-color:rgba(255,122,69,.35)}
  .cat .meta{flex:1;min-width:0}
  .cat .meta b{font-size:14.5px;font-weight:700;display:block;line-height:1.3}
  .cat .meta span{font-size:11.5px;color:var(--sub);font-weight:500}
  .cat .cprog{margin-top:12px}
  .cat .cprog .bar{height:4px;background:rgba(0,0,0,.3);border-radius:3px;overflow:hidden}
  .cat .cprog .bar i{display:block;height:100%;border-radius:3px;width:0;transition:width .5s}
  .cat.c1 .cprog .bar i{background:var(--bad)}
  .cat.c2 .cprog .bar i{background:var(--acc)}
  .cat.c3 .cprog .bar i{background:var(--acc2)}
  .cat.c4 .cprog .bar i{background:#7c8cff}
  .cat.c5 .cprog .bar i{background:var(--hot)}
  .cat .cprog .t{font-size:10px;color:var(--sub);margin-top:5px;display:flex;justify-content:space-between}
  .badge1{position:absolute;top:11px;right:11px;font-size:9px;font-weight:900;letter-spacing:.05em;
    background:var(--bad);color:#fff;padding:3px 7px;border-radius:6px}

  /* ---------- Mode buttons ---------- */
  .modes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
  .mode-btn{
    border:1px solid var(--line);background:var(--panel);border-radius:14px;padding:14px 12px;text-align:left;
    cursor:pointer;transition:transform .12s,border-color .15s;color:var(--ink);
  }
  .mode-btn:active{transform:scale(.97)}
  .mode-btn .e{font-size:20px;display:block;margin-bottom:7px}
  .mode-btn b{font-size:13px;font-weight:700;display:block}
  .mode-btn span{font-size:10.5px;color:var(--sub)}
  .mode-btn.full{grid-column:1/3;border-color:rgba(255,93,108,.4);background:linear-gradient(135deg,rgba(255,93,108,.1),var(--panel))}

  /* ---------- Quiz ---------- */
  .qhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px}
  .qcount{font-family:'Bebas Neue';font-size:20px;letter-spacing:.05em;color:var(--ink)}
  .qcount small{color:var(--sub);font-size:13px}
  .qtag{font-size:10px;font-weight:700;padding:4px 9px;border-radius:7px;background:var(--panel2);color:var(--sub);border:1px solid var(--line)}
  .qtag.one{background:rgba(255,93,108,.15);color:#ff8a95;border-color:rgba(255,93,108,.3)}
  .qtimer{font-family:'Bebas Neue';font-size:17px;color:var(--acc);letter-spacing:.05em}
  .qmini-bar{height:4px;background:var(--panel2);border-radius:3px;overflow:hidden;margin-bottom:16px}
  .qmini-bar i{display:block;height:100%;background:var(--acc);transition:width .3s}

  .qcard{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:20px 18px;box-shadow:var(--shadow);margin-bottom:16px}
  .qnum{font-size:11px;color:var(--acc);font-weight:700;margin-bottom:9px;letter-spacing:.05em}
  .qtext{font-size:15.5px;font-weight:500;line-height:1.65;white-space:pre-wrap}
  .qtext .fml{display:block;background:var(--panel2);border:1px dashed var(--line);border-radius:9px;padding:10px 12px;margin:11px 0;font-size:13.5px;color:var(--acc2);font-family:'SF Mono','Menlo','Consolas','Courier New',monospace;letter-spacing:.02em;font-weight:600}

  .opts{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
  .opt{
    border:1.5px solid var(--line);background:var(--panel);border-radius:13px;padding:14px 15px;
    display:flex;align-items:flex-start;gap:11px;cursor:pointer;transition:all .15s;color:var(--ink);text-align:left;
    font-size:14px;line-height:1.5;font-weight:500;
  }
  .opt:active{transform:scale(.99)}
  .opt .k{width:22px;height:22px;border-radius:7px;background:var(--panel2);border:1px solid var(--line);
    display:grid;place-items:center;font-size:12px;font-weight:700;flex:none;color:var(--sub);margin-top:1px}
  .opt.sel{border-color:var(--acc);background:rgba(61,214,196,.08)}
  .opt.sel .k{background:var(--acc);color:#04141a;border-color:var(--acc)}
  .opt.correct{border-color:var(--good);background:rgba(61,220,132,.12)}
  .opt.correct .k{background:var(--good);color:#04140a;border-color:var(--good)}
  .opt.wrong{border-color:var(--bad);background:rgba(255,93,108,.1)}
  .opt.wrong .k{background:var(--bad);color:#fff;border-color:var(--bad)}
  .opt.disabled{pointer-events:none;opacity:.65}
  .opt.disabled.correct,.opt.disabled.wrong{opacity:1}

  .explain{border-radius:13px;padding:15px 16px;margin-bottom:14px;font-size:13px;line-height:1.65;animation:fade .3s;border:1px solid var(--line);background:var(--panel2)}
  .explain.ok{border-color:rgba(61,220,132,.4);background:rgba(61,220,132,.07)}
  .explain.ng{border-color:rgba(255,93,108,.4);background:rgba(255,93,108,.07)}
  .explain .res{font-weight:900;font-size:14px;margin-bottom:7px;display:flex;align-items:center;gap:7px}
  .explain.ok .res{color:var(--good)}
  .explain.ng .res{color:var(--bad)}
  .explain .body{color:var(--ink)}
  .explain .ref{margin-top:9px;font-size:10.5px;color:var(--sub);border-top:1px dashed var(--line);padding-top:8px}

  /* ---------- Flashcard ---------- */
  .flash{perspective:1600px;margin-bottom:16px}
  .flash-inner{position:relative;width:100%;min-height:420px;transition:transform .55s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
  .flash.flipped .flash-inner{transform:rotateY(180deg)}
  .flash-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border:1px solid var(--line);border-radius:18px;padding:20px 18px 44px;display:flex;flex-direction:column;
    justify-content:flex-start;box-shadow:var(--shadow);overflow-y:auto;-webkit-overflow-scrolling:touch}
  .flash-face::-webkit-scrollbar{width:0}
  .flash-front{background:linear-gradient(150deg,var(--panel),var(--panel2))}
  .flash-back{background:linear-gradient(150deg,#15263a,var(--panel2));transform:rotateY(180deg)}
  .flash .tag{font-size:10px;font-weight:700;color:var(--acc);letter-spacing:.06em;margin-bottom:12px;text-align:center;flex:none}
  .flash .fq{font-size:15px;font-weight:700;line-height:1.55;margin-bottom:14px}
  .flash .a{font-size:13px;line-height:1.65;font-weight:500;color:var(--ink)}
  .flash .fopts{display:flex;flex-direction:column;gap:8px}
  .flash .fopt{display:flex;align-items:flex-start;gap:9px;font-size:12.5px;line-height:1.45;font-weight:500;
    border:1px solid var(--line);border-radius:10px;padding:9px 10px;background:rgba(0,0,0,.15)}
  .flash .fk{width:19px;height:19px;border-radius:6px;background:var(--panel2);border:1px solid var(--line);
    display:grid;place-items:center;font-size:11px;font-weight:700;flex:none;color:var(--sub);margin-top:1px}
  .flash .fopt.fok{border-color:var(--good);background:rgba(61,220,132,.14)}
  .flash .fk.fkok{background:var(--good);color:#04140a;border-color:var(--good)}
  .flash .hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:10px;color:var(--sub)}
  .flash .dformula{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--acc2);
    border-radius:10px;padding:14px 14px;font-family:'SF Mono','Menlo','Consolas','Courier New',monospace;font-size:14px;letter-spacing:0;font-weight:600;
    color:var(--acc2);margin-bottom:14px;line-height:1.9;text-align:left;overflow-wrap:anywhere}
  .flash .dmean{font-size:18px;font-weight:700;line-height:1.5;text-align:center;color:var(--ink);margin-bottom:12px}
  .flash .dunit{font-size:13px;color:var(--acc);text-align:center;font-weight:600;
    border-top:1px dashed var(--line);padding-top:11px}
  /* デッキ（公式/記号カード） */
  .deck-screen{display:flex;flex-direction:column;height:100%}
  .deck-flash{flex:1 1 auto;min-height:200px;max-height:420px;margin-bottom:12px}
  .deck-flash .flash-inner{height:100%;min-height:0}
  .deck-flash .flash-face{padding:18px}
  /* 記号一覧テーブル */
  .symtable-wrap{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--panel)}
  .symtable{width:100%;border-collapse:collapse;font-size:12.5px;background:var(--panel)}
  .symtable th{background:var(--panel2);color:var(--sub);font-weight:700;font-size:11px;
    padding:9px 8px;text-align:left;border-bottom:1px solid var(--line)}
  .symtable td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:top;line-height:1.45}
  .symtable tr:last-child td{border-bottom:none}
  .symtable tr:nth-child(even){background:var(--panel2)}
  .symtable .st-sym{font-weight:900;color:var(--acc2);font-size:17px;white-space:nowrap;width:50px;text-align:center}
  .symtable .st-read{color:var(--sub);font-size:11px;white-space:nowrap;width:72px}
  .symtable .st-mean{color:#eef2fb;font-size:13px;font-weight:500}
  .symtable .st-en{display:inline-block;margin-top:6px;font-size:10.5px;color:var(--acc);font-weight:700;
    border:1px solid rgba(61,214,196,.35);border-radius:5px;padding:1px 7px;letter-spacing:.02em}
  /* 記号一覧ここまで */

  /* ---------- Buttons ---------- */
  .actions{display:flex;gap:10px}
  .btn{flex:1;border:none;border-radius:13px;padding:15px;font-size:14px;font-weight:700;cursor:pointer;
    font-family:inherit;transition:transform .12s,opacity .15s;display:flex;align-items:center;justify-content:center;gap:7px}
  .btn:active{transform:scale(.97)}
  .btn.primary{background:linear-gradient(135deg,var(--acc),#2a9d8f);color:#04141a}
  .btn.ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
  .btn.bad{background:rgba(255,93,108,.16);color:#ff8a95;border:1px solid rgba(255,93,108,.3)}
  .btn.good{background:rgba(61,220,132,.16);color:var(--good);border:1px solid rgba(61,220,132,.3)}
  .btn:disabled{opacity:.4;pointer-events:none}

  /* ---------- Result ---------- */
  .result{text-align:center;padding:20px 6px}
  .result .big{font-family:'Bebas Neue';font-size:72px;line-height:1;letter-spacing:.02em}
  .result .big.pass{color:var(--good)}
  .result .big.fail{color:var(--bad)}
  .result .verdict{font-size:18px;font-weight:900;margin:6px 0 4px}
  .result .desc{font-size:12.5px;color:var(--sub);margin-bottom:22px;line-height:1.6}
  .rstat{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:22px}
  .rstat .box{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px 8px}
  .rstat .box .n{font-family:'Bebas Neue';font-size:28px;line-height:1}
  .rstat .box .l{font-size:10px;color:var(--sub);margin-top:4px}
  .rstat .box.ok .n{color:var(--good)}
  .rstat .box.ng .n{color:var(--bad)}

  /* ---------- Calc reference ---------- */
  .ref-card{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:16px;margin-bottom:12px}
  .ref-card h3{font-size:14px;font-weight:900;color:var(--acc2);margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .ref-card .when{font-size:10.5px;color:var(--sub);margin-bottom:11px}
  .ref-card .formula{background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--acc2);
    border-radius:9px;padding:13px 14px;font-family:'SF Mono','Menlo','Consolas','Courier New',monospace;font-size:14px;letter-spacing:0;
    color:var(--acc2);margin-bottom:10px;line-height:2;font-weight:600;white-space:normal;overflow-wrap:anywhere;word-break:normal}
  .ref-card .note{font-size:12px;color:var(--sub);line-height:1.6}
  .ref-card .note b{color:var(--ink)}

  /* ---------- Bottom nav ---------- */
  nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
    height:calc(54px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);
    background:#121829;backdrop-filter:blur(14px);
    border-top:1px solid var(--line);display:flex;z-index:10}
  nav button{flex:1;background:none;border:none;color:var(--sub);display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:3px;cursor:pointer;font-family:inherit;transition:color .15s;padding:0 2px}
  nav button .ni{font-size:18px;line-height:1}
  nav button .nl{font-size:9px;font-weight:700;white-space:nowrap}
  nav button.on{color:var(--acc)}

  .empty{text-align:center;color:var(--sub);font-size:13px;padding:50px 20px;line-height:1.7}
  .pill{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;
    background:var(--panel2);border:1px solid var(--line);color:var(--sub);margin:0 4px 8px 0}
  .pill.on{background:var(--acc);color:#04141a;border-color:var(--acc)}

  .toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:11px 18px;border-radius:12px;
    font-size:12.5px;font-weight:600;opacity:0;transition:all .3s;z-index:50;box-shadow:var(--shadow);pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .filter-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
  .filter-row::-webkit-scrollbar{height:0}
  .chip{flex:none;font-size:11.5px;font-weight:700;padding:8px 13px;border-radius:20px;border:1px solid var(--line);
    background:var(--panel);color:var(--sub);cursor:pointer;white-space:nowrap;transition:all .15s}
  .chip.on{background:var(--acc);color:#04141a;border-color:var(--acc)}
/* CBT電卓 */
.calcwrap{margin-top:12px}
.calc-toggle{width:100%;padding:11px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);border-radius:10px;font-weight:700;font-size:14px}
.calc-pad{margin-top:8px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px}
.calc-disp{background:var(--bg);color:var(--ink);font-family:'SF Mono','Menlo','Consolas','Courier New',monospace;font-size:20px;text-align:right;padding:10px 12px;border-radius:8px;margin-bottom:8px;min-height:24px;word-break:break-all}
.calc-keys{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.calc-keys button{padding:14px 0;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:8px;font-size:17px;font-weight:700;cursor:pointer}
.calc-keys button:active{background:var(--acc);color:#04201c}
.calc-keys .calc-eq{background:var(--acc);color:#04201c;border-color:var(--acc)}
.formula .fl,.dformula .fl{overflow-wrap:anywhere;word-break:normal;line-height:1.95}
.formula .fn,.dformula .fn{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif;font-size:11px;font-weight:500;color:var(--sub);line-height:1.5;letter-spacing:0;overflow-wrap:anywhere;word-break:normal;margin-top:1px}
.formula .fg,.dformula .fg{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif;font-size:12.5px;font-weight:700;color:var(--acc2);line-height:1.5;overflow-wrap:anywhere;word-break:normal;margin-top:8px}
.fex{color:var(--ink);font-size:11px;font-weight:500;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif;letter-spacing:0}
.formula .fh,.dformula .fh{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;font-size:12.5px;font-weight:700;color:var(--acc2);line-height:1.65;word-break:normal;overflow-wrap:anywhere;margin-bottom:1px}
.formula .fl,.dformula .fl{font-size:13px;line-height:1.8;word-break:keep-all;overflow-wrap:anywhere}
.formula .fn,.dformula .fn{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Noto Sans JP',sans-serif;font-size:11px;font-weight:500;color:var(--sub);line-height:1.55;word-break:normal;overflow-wrap:anywhere;margin-top:2px}

.formula .d0,.dformula .d0{padding-left:0}

.puz-slot{min-width:38px;padding:9px 10px;border:1.5px dashed var(--line);border-radius:9px;text-align:center;font-size:13.5px;font-weight:700;font-family:'Courier New',ui-monospace,monospace;color:var(--ink)}
.puz-slot.filled{border-style:solid;background:var(--panel2)}
.puz-slots.ok .puz-slot{border-color:var(--good);color:var(--good)}
.puz-slots.ng .puz-slot{border-color:var(--bad);color:var(--bad)}
.puz-pool{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.puz-pool button{padding:11px 13px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);border-radius:10px;font-size:14px;font-weight:700;font-family:'Courier New',ui-monospace,monospace;cursor:pointer}
.puz-pool button:disabled{opacity:.22}
.puz-pool button:active{transform:scale(.95)}
</style>

<script>
// ============================================================
//  QUESTION BANK  — 一等無人航空機操縦士 学科試験（教則第4版準拠）
//  cat: 1=規則 2=システム 3=操縦者/運航体制 4=リスク管理 5=計算[一等]
//  lvl: "common"=二等相当 / "one"=一等のみ
// ============================================================
const BANK = [];
// ============ v63: 実出題準拠の再構築バンク（Excel210問＋教則補完41問・全問4択） ============
// ---- 第3章 規則（91問） ----
const Q_RULES = [
  {cat:1,lvl:"common",q:"航空法における無人航空機の定義について、適切なものを１つ選べ。",o:["航空法において、無人航空機は航空の用に供することができる飛行機、回転翼航空機、滑空機及び飛行船であり、構造上人が乗ることができず、遠隔操作または自動操縦により飛行でき、カメラ等の装備品も含めた重量が100グラム以上のものを指す。","航空法において、無人航空機は航空の用に供することができる飛行機、回転翼航空機、滑空機及び飛行船であり、構造上人が乗ることができず、遠隔操作または自動操縦により飛行でき、重量が100グラム以上のものを指す。","航空法において、無人航空機は航空の用に供することができる飛行機、回転翼航空機、滑空機及び飛行船であり、構造上人が乗ることができず、遠隔操作または自動操縦により飛行でき、重量が100グラム以上のものを指すが、もっぱら個人的な趣味利用の場合は除かれる。","航空法において、無人航空機は航空の用に供することができる飛行機、回転翼航空機、滑空機及び飛行船であり、構造上人が乗ることができず、遠隔操作により飛行でき、重量が100グラム以上のものを指し、自動操縦のみにより飛行するものは含まれない。"],a:1,e:"航空法において無人航空機は、構造上人が乗ることができない飛行機、回転翼航空機、滑空機及び飛行船であり、これらを遠隔操作又は自動操縦（プログラムにより自動的に操縦を行うことをいいます。）により飛行させることができるもので、かつ重量が100グラム以上のものを対象としています。「構造上人が乗ることができないもの」とは、単に人が乗ることができる座席の有無を意味するわけではありません。また、事業用か個人的趣味かは航空法上の無人航空機の定義には関係がありません。ここでいう重量は、無人航空機本体の重量及びバッテリーの重量の合計を指しており、バッテリー以外の取り外し可能な付属品の重量は含まれません。",ref:"教則 第3章 3.1.1 無人航空機の定義"},
  {cat:1,lvl:"common",q:"航空法における無人航空機の定義について、機体重量が何グラム以上のものが対象とされているか。",o:["200 グラム以上","250 グラム以上","150 グラム以上","100 グラム以上"],a:3,e:"航空法では、無人航空機とは重量が100グラム以上のものを対象としています。100グラム未満のマルチローター等は、無人航空機ではなく「模型航空機」に分類されます。",ref:"教則 第3章 航空法における無人航空機の定義"},
  {cat:1,lvl:"common",q:"航空法における無人航空機の定義の一部である「重量が 100 グラム以上のもの」について、正しいものを１つ選べ。",o:["航空法では、無人航空機の重量は、無人航空機本体の重量及びバッテリーの重量の合計を指している。","航空法では、無人航空機の重量は、無人航空機本体、バッテリー及び取り外し可能な付属品の全ての重量を含む。","航空法では、無人航空機の重量は、無人航空機本体の重量を指している。","航空法では、無人航空機の重量は、バッテリーを除いた無人航空機本体とカメラ等の装備品の合計の重量を指している。"],a:0,e:"航空法において、無人航空機の「重量」は、無人航空機本体の重量及びバッテリーの重量の合計を指しています。取り外し可能なカメラ等の付属品の重量は含まれません。",ref:"教則 第3章 3.1.1 無人航空機の定義（重量）"},
  {cat:1,lvl:"common",q:"航空法における無人航空機の定義の一部である「遠隔操作又は自動操縦により飛行させることができるもの」について、不適切なものを１つ選べ。",o:["航空法では、自動操縦により飛行させることができるものだけが無人航空機に該当する。","航空法における「自動操縦」には、プログラムにより自動的に操縦を行うことが含まれる。","航空法では、紙飛行機など遠隔操作又は自動操縦により制御できないものは無人航空機には該当しない。","航空法上、遠隔操作又は自動操縦により飛行させることができるものが全て無人航空機に該当するとは言えない。"],a:0,e:"航空法において、無人航空機は遠隔操作又は自動操縦（プログラムにより自動的に操縦を行うことをいいます。）により飛行させることができるものと定義されており、自動操縦によるものだけに限られません。そのため「自動操縦により飛行させることができるものだけが該当する」という記述は不適切です。紙飛行機のように遠隔操作や自動操縦により制御できないものは無人航空機には該当しません。また、遠隔操作又は自動操縦により飛行できるものであっても、重量が100グラム未満のものや構造上人が乗ることができるものは無人航空機に該当しません。",ref:"教則 第3章 3.1.1 無人航空機の定義（遠隔操作・自動操縦）"},
  {cat:1,lvl:"common",q:"模型航空機について、もっとも正しいものを１つ選べ。",o:["重量110グラムのゴム動力模型機(遠隔・自動操縦不可)は無人航空機に含まれ、模型航空機には該当しない。","重量99グラムのマルチローターは模型航空機に含まれ、無人航空機には該当しない。","重量110グラムのゴム動力模型機(遠隔・自動操縦不可)は模型航空機に該当し、無人航空機にも該当する。","重量99グラムのマルチローターは、遠隔操作により飛行させることができるため無人航空機に該当し、模型航空機には該当しない。"],a:1,e:"模型航空機とは、ゴム動力模型機や重量100グラム未満のマルチローター等を指します。重量100グラム未満のマルチローターは無人航空機には該当せず、模型航空機に分類されます。また、ゴム動力模型機は、遠隔操作又は自動操縦により飛行させることができるという無人航空機の要件を満たさないため、重量が100グラム以上であっても無人航空機には該当せず、基本的には模型航空機に該当します。",ref:"教則 第3章 3.1.1 無人航空機の定義（模型航空機）"},
  {cat:1,lvl:"common",q:"模型航空機に対する規制について、適切ではないものを１つ選べ。",o:["国土交通省が災害等の発生時に緊急用務空域を設定した場合、無人航空機は当該空域における飛行が禁止されるが、模型航空機については飛行が禁止されない。","空港等の周辺、航空路内の空域（高度１５０メートル以上）、高度２５０メートル以上の空域において、模型航空機を飛行させる場合には、国土交通省への事前の届出が必要となる。","重量１００グラム未満の模型航空機であっても、航空機の飛行に影響を及ぼすおそれのある行為は航空法により規制されている。","航空交通管制圏、航空交通情報圏、航空交通管制区内の特別管制空域等における模型航空機の飛行は禁止されている。"],a:0,e:"重量100グラム未満の模型航空機でも、航空機の飛行に影響を及ぼすおそれのある行為は航空法により規制されています。航空交通管制圏、航空交通情報圏、航空交通管制区内の特別管制空域等では模型航空機の飛行が禁止されており、空港等の周辺、航空路内の空域（高度150メートル以上）、高度250メートル以上の空域で飛行させる場合には国土交通省への事前の届出が必要です。また、国土交通省が緊急用務空域を指定した場合には、無人航空機だけでなく模型航空機の飛行も禁止されます。",ref:"教則 第3章 3.1.1 模型航空機に対する規制"},
  {cat:1,lvl:"common",q:"航空法により規制される無人航空機の飛行空域について、正しいものを１つ選べ。",o:["人口集中地区の上空であっても、高度150メートル未満の飛行であれば許可なく飛行させることができる。","空港周辺、緊急用務空域、150メートル以上の高度、人口集中地区上空は無人航空機の飛行が禁止されている。","自分の土地であれば、空港周辺、人口集中地区上空に限っては、飛行は禁止されていない。","緊急用務空域は、ドクターヘリなど空港ではないが有人機が頻繁に離着陸する周辺の空域で、原則飛行が禁止されている。"],a:1,e:"航空法により無人航空機の飛行が原則禁止されている空域は、空港等の周辺の空域、緊急用務空域、地表又は水面から150メートル以上の高さの空域、人口集中地区の上空です。自身の土地の上空であってもこれらの空域では飛行が禁止されます。緊急用務空域は、捜索、救助その他の緊急用務を行う航空機の飛行の安全を確保するため、国土交通省が指定する空域です。",ref:"教則 第3章 3.1.1 飛行禁止空域"},
  {cat:1,lvl:"common",q:"無人航空機の飛行に関する空域の制限について、適切ではないものを１つ選べ。",o:["無人航空機は高度150メートル以上(地表からの高度)または空港周辺の空域の飛行は原則禁止されている。","高度150メートルの「高度」とは地表からの高度であるため、標高1,000ｍの山頂から垂直に100ｍ上昇させる場合は許可が不要である。","飛行禁止空域を飛行する場合には、当該空域を管轄する航空交通管制機関等と調整し、支障の有無を確認したうえで飛行の許可を受ける必要がある。","空港周辺の空域で飛行を行う場合は、当該空港の制限高より低い高度で飛行させる場合でも、必ず許可を取得する必要がある。"],a:3,e:"無人航空機の飛行は、高度150メートル以上（地表又は水面からの高度）の空域や空港等の周辺の空域では原則として禁止されています。これは無人航空機と有人航空機の空域を分離し、安全を確保するための措置です。これらの空域を飛行する場合には、当該空域を管轄する航空交通管制機関等と調整し、支障の有無を確認したうえで飛行の許可を受ける必要があります。ただし、各空港に設定されている制限高以下での飛行の場合は、許可なく飛行させることができる可能性があります。なお、地理院地図で示される紫色の範囲内については制限高以下であっても許可が必要です。",ref:"教則 第3章 3.1.1 飛行禁止空域（空港等の周辺・高度150m以上）"},
  {cat:1,lvl:"common",q:"「高度150メートル以上の飛行禁止空域」について、正しいものを１つ選べ。",o:["山岳部等、地形が起伏している場合でも、海抜飛行高度が一定であれば高度について心配する必要はない。","「高度１５０メートル以上の飛行禁止空域」とは、海抜高度が１５０メートル以上の空域を指す。","離陸した地点からの高度差が150メートル以上となる空域を指す。","無人航空機が飛行している直下の地表または水面からの高度差が150メートル以上の空域を指す。"],a:3,e:"「高度150メートル以上の飛行禁止空域」は、無人航空機が飛行している直下の地表又は水面からの高度差が150メートル以上の空域を指します。海抜高度や離陸地点からの高度差ではありません。このため、山岳部などの起伏の激しい地形の上空で無人航空機を飛行させる場合には、意図せず直下の地表から150メートル以上の高度差になる可能性があるので注意が必要です。",ref:"教則 第3章 3.1.1 飛行禁止空域（高度150m以上）"},
  {cat:1,lvl:"common",q:"緊急用務空域について、最も適切なものを１つ選べ。",o:["緊急用務空域は航空法で予め指定されている場所である。","無人航空機の操縦者は、飛行開始前に飛行させる空域が緊急用務空域に該当するか否かを確認する必要はない。","国土交通省は、緊急用務を行う航空機の飛行が想定される場合、その都度「緊急用務空域」を指定する。","重量が１００グラム未満であれば緊急用務空域でも許可なく飛行できる。"],a:2,e:"「緊急用務空域」は、災害等の規模に応じて、緊急用務を行う航空機の飛行が想定される場合に国土交通省がその都度指定する空域であり、あらかじめ定められている場所ではありません。この空域では無人航空機の飛行が原則として禁止され、重量100グラム未満の模型航空機も飛行禁止の対象となります。操縦者は、飛行を開始する前に当該空域が緊急用務空域に該当するか否かを確認することが義務付けられています。",ref:"教則 第3章 3.1.1 緊急用務空域"},
  {cat:1,lvl:"common",q:"「人口集中地区（DID：Densely Inhabited District）」について、最も適切なものを１つ選べ。",o:["総務省が毎月公表する人口推計に基づき、随時更新される地域である。","５年毎に実施される国勢調査の結果から一定の基準により設定される地域である。","国土交通省が毎年、人口密度を調査し、新たに人口集中地区を指定する。","人口集中地区は、5年ごとに開かれる市町村議会の報告結果から一定の基準により設定される地域である。"],a:1,e:"「人口集中地区（DID：Densely Inhabited District）」は、5年毎に実施される国勢調査の結果から一定の基準により設定される地域です。人口密度が特に高い地域を指します。国土交通省や市町村議会が指定するものではなく、人口推計により随時更新されるものでもありません。",ref:"教則 第3章 3.1.2 無人航空機の飛行禁止空域（人口集中地区）"},
  {cat:1,lvl:"common",q:"人口集中地区での飛行について、最も適切なものを１つ選べ。",o:["人口集中地区の上空であっても、補助者を配置すれば許可なく飛行できる。","人口集中地区かどうかは、平成27年度の国勢調査の結果に基づき判断される。","高度150ｍ以上の空域は、人口集中地区には該当しない。","人が住んでいないと判断できる場合は人口集中地区ではない。"],a:2,e:"人口集中地区かどうかは国勢調査の結果に基づき判断されますが、5年毎に更新されるため、平成27年度の国勢調査の結果に固定されるものではありません。実際に人が住んでいないように見える場所でも、国勢調査の結果により設定されていれば人口集中地区に該当します。また、補助者を配置しても人口集中地区上空の飛行に係る許可は不要になりません。航空法上、高度150ｍ以上の空域は人口集中地区には該当しません（高度150ｍ以上の空域は別の飛行禁止空域として許可が必要です）。なお、実際には両方の許可を取得して飛行するケースが多くあります。",ref:"教則 第3章 3.1.2 無人航空機の飛行禁止空域（人口集中地区）"},
  {cat:1,lvl:"common",q:"規制対象となる無人航空機の飛行方法として、もっとも適切なものを一つ選べ。",o:["夜間飛行（日没後から日出まで）","速度40km/hを超える飛行","雨天時における飛行","スピーカー等から音を出す飛行"],a:0,e:"無人航空機の飛行に関する規制対象となる飛行方法には、「夜間飛行（日没後から日出まで）」「操縦者の目視外での飛行（目視外飛行）」「第三者又はその物件との間の距離が30メートル未満での飛行」「祭礼、縁日、展示会など多数の者の集合する催しが行われている場所の上空での飛行」「爆発物など危険物の輸送」「無人航空機からの物件の投下」等が含まれます。これらは航空機の航行の安全や地上又は水上の人又は物件の安全を確保するための規制です。飛行速度や音の発生、雨天時の飛行は、航空法上の承認を要する飛行方法には含まれません。",ref:"教則 第3章 3.1.1 規制対象となる飛行の空域及び方法（特定飛行）"},
  {cat:1,lvl:"common",q:"目視外飛行について、最も適切なものを１つ選べ。",o:["操縦者がコンタクトをして双眼鏡でドローンを確認しながら飛行を行う場合は目視外飛行に該当する。","航空局から目視外飛行の承認を得ている補助者がドローンを目視している場合、操縦者は特例で航空局の承認なく目視外飛行ができる。","操縦者が眼鏡を使用してドローンを視認しながら行う飛行は、目視外飛行に該当する。","目視外飛行を行う場合は、航空局の承認を取得し、必ず補助者を配置しなければいけない。"],a:0,e:"目視内飛行とは、操縦者が肉眼で無人航空機を視認しながら飛行させることをいいます。眼鏡やコンタクトレンズの使用は目視に含まれますが、双眼鏡を使用する場合は肉眼とはいえず、目視外飛行に該当します。FPVゴーグルを装着した飛行も目視外飛行に該当します。補助者が目視している場合であっても、操縦者本人が目視していなければ目視外飛行となり、航空局の承認が必要です。なお、目視外飛行を行う場合、承認を取得したうえで一定の条件を満たせば、補助者の配置が不要となるケースがあります。",ref:"教則 第3章 3.1.2 無人航空機の飛行の方法（目視外飛行）"},
  {cat:1,lvl:"common",q:"無人航空機の「目視による常時監視」について不適切なものを１つ選べ。",o:["操縦者がモニターにより監視しているとき、補助者が肉眼で監視していれば「目視による常時監視」と言える。","操縦者が双眼鏡やモニター(FPVを含む)で行う監視は「目視による常時監視」に含まれない。","「目視による常時監視」とは、操縦者自身が自分の目で無人航空機及びその周囲の状況を常に監視することをいう。","操縦者が眼鏡やコンタクトレンズを使用して行う監視は「目視による常時監視」に含まれる。"],a:0,e:"「目視による常時監視」とは、操縦者が自分の目で無人航空機及びその周囲の状況を常に見て飛行させることを指します。双眼鏡やモニター（FPVを含む）による監視や、補助者による監視は含まれません。一方、眼鏡やコンタクトレンズの使用は「目視」に含まれます。",ref:"教則 第3章 3.1.2 無人航空機の飛行の方法（目視による常時監視）"},
  {cat:1,lvl:"common",q:"無人航空機の昼間（日中）における飛行について、最も適切なものを１つ選べ。",o:["無人航空機の飛行範囲が照明等で十分照らされている場合は、昼間（日中）の飛行と言える。","昼間（日中）とは、現地において太陽の光が目視できる時間から目視できなくなる時間までを指す。","昼間（日中）とは、国立天文台が発表する日の出から日の入りの時刻までの間を指す。","昼間（日中）とは、午前6時から午後6時までの時間帯を指す。"],a:2,e:"昼間（日中）とは、国立天文台が発表する日の出から日の入りの時刻までの間とされています。現地で操縦者が太陽光の見え方から判断する時間帯や、特定の時刻で一律に区切られた時間帯ではありません。また、飛行範囲が照明等で十分照らされている場合であっても、昼間（日中）の飛行とは言えません。飛行範囲が照明等で十分照らされていることは、無人航空機の姿勢及び方向が正確に視認できる灯火を有していないときの、夜間飛行の承認における代替的措置として位置づけられています。日の入りから日の出までの飛行（夜間飛行）は、航空法に基づく承認が必要です。",ref:"教則 第3章 3.1.2 無人航空機の飛行の方法（夜間飛行）"},
  {cat:1,lvl:"common",q:"無人航空機による「物件の投下」について最も適切なものを１つ選べ。",o:["輸送した物件を地上の人員に受け渡す行為は、物件の投下に含まれる。","物件の投下には、危険物に該当しない水の噴射も含まれる。","物件の投下には、無人航空機を使って物件を設置する（置く）行為も含まれる。","自身の土地かつ周囲に第三者がいないことが明白である場合は、無人航空機からの物件投下を行う場合であっても航空局の承認は不要である。"],a:1,e:"物件の投下には、水や農薬等の液体や霧状のものの散布も含まれます。一方、無人航空機を使って物件を設置する（置く）行為や、対象物件を地表等に落下させることなく地上の人員に受け渡す行為は、物件の投下には含まれません。無人航空機から物件を投下させることは原則禁止されており、自身の土地であることや操縦者の裁量によって承認なく行えるものではありません。",ref:"教則 第3章 3.1.2 無人航空機の飛行の方法（物件投下）"},
  {cat:1,lvl:"common",q:"無人航空機から物件を投下させることについて、もっとも正しいものを１つ選べ。",o:["農薬等の液体を散布することは物件投下に含まれるが、水等の無害なものであれば物件投下とはならない。","水面に物件を置く行為は物件投下に含まれない。","液体を散布することは危害を加える恐れが少ないため、物件投下からは除かれる。","輸送した物件を地表に置く行為は、物件の投下に含まれる。"],a:1,e:"物件の投下には、水や農薬等の液体や霧状のものの散布も含まれます。無害なものであっても同様です。一方、無人航空機を使って対象物件を地表等に落下させることなく地上の人員に受け渡す行為や、輸送した物件を地表に置く行為は、物件の投下には含まれません。この地表には水面も含まれます。",ref:"教則 第3章 3.1.2 無人航空機の飛行の方法（物件投下）"},
  {cat:1,lvl:"common",q:"無人航空機による「危険物の輸送」について不適切なものを１つ選べ。",o:["危険物には、業務用機器(カメラ等)に用いられる電池は含まれない。","危険物には、無人航空機の飛行のために必要な燃料や電池、安全装置としてのパラシュートを開傘するために必要な火薬類や高圧ガスを含む。","危険物の輸送は規制対象となる飛行の方法に該当し、行う場合には国土交通大臣の承認が必要である。","危険物には、火薬類、高圧ガス、引火性液体、可燃性物質、酸化性物質類、毒物類、放射性物質、腐食性物質が含まれる。"],a:1,e:"「危険物」には、火薬類、高圧ガス、引火性液体、可燃性物質、酸化性物質類、毒物類、放射性物質、腐食性物質などが該当します。ただし、無人航空機の飛行のために当該無人航空機で輸送する物件は「危険物」の対象とはなりません。例えば、無人航空機の飛行のために必要な燃料や電池、安全装置としてのパラシュートを開傘するために必要な火薬類や高圧ガス、業務用機器（カメラ等）に用いられる電池は「危険物」の対象外です。なお、危険物の輸送は規制対象となる飛行の方法に該当し、行う場合には国土交通大臣の承認が必要です。",ref:"教則 第3章 規制対象となる飛行の方法（危険物の輸送）"},
  {cat:1,lvl:"common",q:"無人航空機の「催し場所上空」についての飛行規制について正しいものを１つ選べ。",o:["プロスポーツの試合や屋外コンサートは、主催者が安全管理を行っているため「多数の者の集合する催し」には該当しない。","「多数の者の集合する催し」には、集合する者の人数が一番の判断基準となる。","信号待ちや混雑により生じる人混み等は「多数の者の集合する催し」に該当する可能性が高い。","運動会、盆踊り大会、デモは「多数の者の集合する催し」に該当する可能性が高い。"],a:3,e:"「多数の者の集合する催し」とは、特定の場所や日時に開催される多数の者が集まるものを指し、該当の有無は集合する者の人数や規模だけでなく、特定の場所や日時に開催されるかどうかにより総合的に判断されます。該当例として、祭礼、縁日、展示会のほか、プロスポーツの試合、スポーツ大会、運動会、屋外で開催されるコンサート等のイベント、花火大会、盆踊り大会、マラソン、街頭パレード、屋外演説会、デモ（示威行為）等が挙げられます。一方、信号待ちや混雑により生じる人混み等の自然発生的なものは該当しません。",ref:"教則 第3章 3.1.2 無人航空機の飛行の方法（催し場所上空の飛行）"},
  {cat:1,lvl:"common",q:"航空法上の催し場所上空に該当する例として、もっとも正しいものを１つ選べ。",o:["第三者の立入管理措置が行われていることが明白である場所でのドローンショーの事前練習","信号待ちや混雑により自然発生的に生じた人混み","選挙等における屋外演説会","関係者のみが参加する屋外の結婚式会場"],a:2,e:"催し場所に該当する例として、祭礼、縁日、展示会のほか、プロスポーツの試合、スポーツ大会、運動会、屋外で開催されるコンサート等のイベント、ドローンショー、花火大会、盆踊り大会、マラソン、街頭パレード、選挙等における屋外演説会、デモ等が挙げられます。ただし、ドローンショーのうち自社敷地内や無人の競技場内等、第三者の立入管理措置が行われていることが明白である場所での事前練習や企業向けの配信用撮影等は該当しません。また、関係者のみが参加する催し場所上空の飛行や、信号待ちや混雑により生じる人混み等の自然発生的なものも該当しません。",ref:"教則 第3章 3.1.1 催し場所上空の飛行（p.7）"},
  {cat:1,lvl:"common",q:"「十分な強度を有する紐等で係留した場合の例外」について正しいものを１つ選べ。",o:["30ｍのワイヤーで無人航空機を係留し、飛行可能な範囲内への立入管理等の措置を講じた場合であっても、催し場所上空の飛行承認は不要とはならない。","40ｍのワイヤーで無人航空機を係留し、飛行可能な範囲内への立入管理等の措置を講じた場合、人口集中地区に係る許可が不要となる。","人が紐等を持って移動しながら無人航空機を飛行させる場合も係留に該当し、立入管理等の措置を講じれば夜間飛行に係る承認が不要となる。","走行する自動車に10ｍ以下のワイヤーで無人航空機を係留し、飛行可能な範囲内への立入管理等の措置を講じた場合、目視外飛行に係る承認が不要となる。"],a:0,e:"十分な強度を有する紐等（30ｍ以下）で無人航空機を係留し、飛行可能な範囲内への第三者の立入管理等の措置を講じた場合は、人口集中地区、夜間飛行、目視外飛行、第三者から30メートル以内の飛行、物件投下に係る許可・承認が不要となります。催し場所上空の飛行はこの例外の対象ではありません。また、自動車、航空機等の移動する物件に紐等を固定して、又は人が紐等を持って移動しながら無人航空機を飛行させる行為（えい航）は係留には該当しないため注意が必要です。",ref:"教則 第3章 3.1.2 係留の例外（p.13）"},
  {cat:1,lvl:"common",q:"捜索又は救助のための特例における「捜索又は救助」の考え方として、もっとも適切なものを１つ選べ。",o:["被災地の孤立地域への生活必需品の輸送も含まれる可能性がある。","危険を伴う箇所での調査・点検のための防災訓練も含まれる可能性がある。","住民避難後の住宅の防犯対策のための飛行は含まれない。","人命や財産に急迫した危難のおそれの有無にかかわらず、災害に関連する飛行であれば全て特例の対象となる。"],a:0,e:"「捜索又は救助」とは、事故や災害の発生等に際して人命や財産に急迫した危難のおそれがある場合において、人命の危機又は財産の損傷を回避するための措置を指し、当該措置をとることについて緊急性がある飛行に特例が適用されます。具体的には、被災者の捜索又は救助に加え、被災地の孤立地域等への医薬品、衛生用品、食料品、飲料水等の生活必需品の輸送、危険を伴う箇所での調査・点検のほか、住民避難後の住宅やその地域の防犯対策のための飛行も特例の対象となり得ます。ただし、防災訓練については緊急性があるとはいえず、特例の対象とはなりません。",ref:"教則 第3章 3.1.2 捜索又は救助等のための特例（p.13）"},
  {cat:1,lvl:"common",q:"「捜索、救助等のための特例」に関連する無人航空機の運用について、正しいものを１つ選べ。",o:["国や地方公共団体から依頼を受けた者が、事故、災害等で無人航空機を飛行させる場合、特例として飛行の許可・承認などの手続きは不要となるため、周囲の安全への配慮も不要となる。","事故、災害等に際し、国や地方公共団体から依頼を受けた者が無人航空機を飛行させる場合、特定飛行を行う場合であっても許可承認等の手続きが不要となる可能性がある。","この特例の対象は国や地方公共団体が自ら無人航空機を飛行させる場合に限られており、依頼を受けた民間の者による飛行は特例の対象とならない。","災害時の対応であって緊急性を有する場合は、国や地方公共団体にかかわらない独自の活動であっても、特定飛行に係る手続きが不要となる可能性がある。"],a:1,e:"事故、災害等に際し、人命や財産に急迫した危難のおそれがある場合において、国や地方公共団体、又はこれらの依頼を受けた者が、危難を回避するための措置として無人航空機を飛行させる場合には、特例として飛行の空域及び方法の規制が適用されず、許可承認等の手続きが不要となります。ただし、国や地方公共団体に関わらない独自の活動は特例の対象とはならず、国の飛行の許可・承認などの手続きが必要です。また、特例により許可承認が不要となった場合でも、周囲の安全に配慮して飛行する必要があります。",ref:"教則 第3章 捜索、救助等のための特例"},
  {cat:1,lvl:"common",q:"無人航空機の飛行自粛要請について、正しいものを１つ選べ。",o:["飛行自粛要請空域にて飛行を行ったものは、10万円以下の罰金に処される可能性がある。","飛行自粛要請空域が設定された場合は、国土交通省から各操縦者に対して書面で個別に通知される。","無人航空機の飛行自粛要請は、各省庁が法令等に基づき自粛要請をし、それを国交省が取りまとめてホームページやTwitter(X)にて公示した規制である。","国土交通省は無人航空機の飛行自粛を要請することがあり、操縦者は飛行を開始する前に飛行自粛要請空域の確認と要請内容に基づく適切な対応が求められる。"],a:3,e:"飛行自粛要請は法令等に基づく規制ではありませんが、警備上の観点等から警察などの関係省庁等の要請に基づき、国土交通省が無人航空機の飛行自粛を要請することがあります。飛行自粛要請空域が設定される場合には国土交通省のホームページ・Twitter（X）にて公示されるため、無人航空機の操縦者は、飛行を開始する前に、当該空域が飛行自粛要請空域に該当するか否かを確認し、その要請内容に基づき適切に対応することが必要です。",ref:"教則 第3章 無人航空機の飛行自粛要請"},
  {cat:1,lvl:"common",q:"「第三者」の定義について、最も適切なものを１つ選べ。",o:["無人航空機が計画外の挙動を示した場合に従うべき明確な指示と安全上の注意を受けていることは、間接関与者の要件の１つである。","無人航空機の飛行の目的に関与するかどうかを自ら決定していない者は、直接関与者ではなく間接関与者となる。","操縦者が無人航空機の飛行の目的の全部又は一部に関与していると判断した者は、直ちに間接関与者となる。","現に操縦はしていないが操縦する可能性のある者は、無人航空機の飛行に直接関与している者には含まれない。"],a:0,e:"「第三者」とは、無人航空機の飛行に直接又は間接的に関与していない者を指します。直接関与している者とは、操縦者、現に操縦はしていないが操縦する可能性のある者、補助者等、無人航空機の飛行の安全確保に必要な要員を指します。間接的に関与している者とは、飛行目的について無人航空機を飛行させる者と共通の認識を持ち、計画外の挙動に対する明確な指示と安全上の注意を理解し、自ら飛行目的の一部に関与するかどうかを決定できる者を指します。飛行の目的に関与するかどうかを自ら決定していない者は、間接関与者ではなく第三者となります。",ref:"教則 第3章 3.1.2 第三者及び第三者上空の定義（p.18）"},
  {cat:1,lvl:"common",q:"「第三者上空」について、適切なものを１つ選べ。",o:["飛行の安全確保に必要な補助者の上空は、第三者上空に含まれる。","間接関与者の上空は第三者上空となる。","無人航空機の落下距離の範囲内に第三者がいる場合は第三者上空とみなされる。","移動車両の上空は、衝突から保護される状況であれば第三者の上空とはみなされない。"],a:2,e:"「第三者上空」とは、関与者以外の者（第三者）の上空をいい、当該第三者が乗り込んでいる移動中の車両等の上空も含みます。この場合の「上空」とは第三者の直上だけを指すのではなく、飛行させる無人航空機の落下距離（飛行範囲の外周から製造者等が保証した落下距離）を踏まえ、無人航空機が落下する可能性のある領域に第三者が存在する場合は、当該無人航空機はその第三者の上空にあるものとみなされます。",ref:"教則 第3章 3.1.2 第三者及び第三者上空の定義（p.18）"},
  {cat:1,lvl:"common",q:"「立入管理措置」について、不適切なものを１つ選べ。",o:["「立入管理措置」には、補助者による監視及び口頭警告が含まれる。","「立入管理措置」を講じることができるか否かにより、特定飛行はカテゴリーⅡ飛行とカテゴリーⅢ飛行に区分される。","「立入管理措置」には、関係者以外の立入りを制限する旨の看板とコーン等による表示は含まれない。","無人航空機の飛行経路下において第三者の立入りを管理する措置を「立入管理措置」という。"],a:2,e:"「立入管理措置」は、無人航空機の飛行経路下において第三者の立入りを管理する措置です。例えば、関係者以外の立入りを制限する旨の看板、コーン等による表示、補助者による監視及び口頭警告などが該当します。この措置ができるかどうかにより、特定飛行はカテゴリーⅡ飛行とカテゴリーⅢ飛行に区分され、必要となる手続き等が異なります。",ref:"教則 第3章 立入管理措置"},
  {cat:1,lvl:"common",q:"航空交通管制区域について、正しいものを１つ選べ。",o:["航空交通管制区は、地表又は水面から200メートル以上の高さの空域で国が指定したもので、航空機は航空交通管制機関と連絡を取りながら飛行する。","航空交通管制区は、空港から周囲150メートルの範囲の地上から200メートル以内の空域で国が指定したもので、航空機は航空交通管制機関と連絡を取りながら飛行する。","航空交通管制区は、地表又は水面から150メートル以上の高さの空域で国が指定したもので、航空機は航空交通管制機関と連絡を取りながら飛行する。","航空交通管制区は、地表又は水面から300メートル以上の高さの空域で国が指定したもので、航空機は航空交通管制機関と連絡を取りながら飛行する。"],a:0,e:"航空交通管制区は、地表又は水面から200メートル以上の高さの空域のうち、国が指定した空域を指します。この区域では、計器飛行方式により飛行する航空機は航空交通管制機関と常時連絡を取り、飛行の方法等についての指示に従って飛行を行わなければなりません。一方、航空交通管制圏は、航空機の離着陸が頻繁に実施される空港等及びその周辺の空域を指し、全ての航空機が航空交通管制機関と連絡を取り、飛行の方法や離着陸の順序等の指示に従って飛行を行わなければなりません。",ref:"教則 第3章 航空機の運航ルール等（航空交通管制区・航空交通管制圏）"},
  {cat:1,lvl:"common",q:"空港の制限表面について、正しいものを１つ選べ。",o:["全ての空港に設定されている制限表面は、進入表面、水平表面、外側水平表面である。","全ての空港に設定されている制限表面は、進入表面、水平表面、転移表面、円錐表面である。","全ての空港に設定されている制限表面は、進入表面、水平表面、転移表面である。","全ての空港に制限表面が設定されているわけではない。"],a:2,e:"空港の制限表面とは、航空機が安全に離着陸するために、空港周辺の一定の空間を障害物が無い状態にするためのものです。全ての空港では、「進入表面」「水平表面」「転移表面」の3つの制限表面が設定されています。「進入表面」は進入の最終段階及び離陸時における航空機の安全を、「水平表面」は旋回飛行等低空飛行の安全を、「転移表面」は進入をやり直す場合等の側面方向への飛行の安全を確保するために必要な表面です。円錐表面、延長進入表面、外側水平表面は、東京・成田・中部・関西国際空港及び政令で定める空港だけで設定されています。",ref:"教則 第3章 航空機の運航ルール等（制限表面）"},
  {cat:1,lvl:"common",q:"航空機が飛行する方式について、正しいものを１つ選べ。",o:["計器飛行方式（IFR）は航空交通管制機関が与える指示等に常時従う飛行の方式であり、高速で高高度を移動する旅客機は通常は計器飛行方式（IFR）で飛行する。","有視界飛行方式（VFR）は、航空交通管制機関が与える指示等に常時従って行う飛行の方式であり、高速で高高度を移動する旅客機は通常は有視界飛行方式（VFR）で飛行する。","有視界飛行方式（VFR）は、航空機の操縦者の判断に基づき飛行する方式であり、気象状態により有視界飛行方式（VFR）が出来なくなった場合は、有視界飛行方式（VFR）の航空機は必ず着陸をすることが求められる。","有視界飛行方式（VFR）は、航空機の操縦者の判断に基づき飛行する方式であり、小型機や回転翼航空機は有視界飛行方式（VFR）で飛行することが多いため、航空交通管制機関から指示を受けて飛行することはない。"],a:0,e:"航空機が飛行する方式には、「計器飛行方式（IFR）」と「有視界飛行方式（VFR）」の2つがあります。計器飛行方式（IFR）は航空交通管制機関が与える指示等に常時従って行う飛行の方式であり、通常、高速で高高度を移動する旅客機はこの方式で飛行します。一方、有視界飛行方式（VFR）は、航空機の操縦者の判断に基づく飛行方式ですが、空港及びその周辺においては、航空交通管制機関が与える指示等に従う必要があります。小型機や回転翼航空機は有視界飛行方式（VFR）で飛行することが多く、有視界飛行方式（VFR）ができない気象状態となった場合には、計器飛行方式（IFR）で飛行する場合もあります。",ref:"教則 第3章 航空機の運航ルール等（飛行の方式）"},
  {cat:1,lvl:"common",q:"航空機の機長の出発前の義務について、正しいものを１つ選べ。",o:["機長は出発前に、国土交通大臣から提供される航空情報を確認する義務がある。","国土交通大臣から提供される航空情報は、機長だけでなく乗客にも確認義務がある。","機長は出発前に航空情報を確認する義務はなく、飛行開始後に必要に応じて確認すれば足りる。","機長は出発前に、無人航空機の操縦者から提供される航空情報を確認する義務がある。"],a:0,e:"航空機の機長は、出発前に運航に必要な準備が整っていることを確認することが義務付けられています。これには国土交通大臣から提供される航空情報の確認も含まれます。航空情報には、航空路の安全に関する情報や気象情報など、飛行に重要な情報が含まれています。",ref:"教則 第3章 3.1.1 航空機の運航ルール（p.7）"},
  {cat:1,lvl:"common",q:"無人航空機の操縦者が理解するべき航空機の運航ルールについて、正しいものを１つ選べ。",o:["航空機の操縦者は無人航空機を容易に視認して回避できるため、航空機側が回避することとされている。","無人航空機は航空機と比較して一般的には機動性が高いため、進路権は航空機が有する。","航空機と無人航空機が接近した場合、航空機の方が計器の性能が高いため、航空機側が避けることが望ましい。","航空機は無人航空機に対して一般的に機動性が高いため、進路権は無人航空機が有する。"],a:1,e:"航空機の航行の安全は最優先されるべきものであり、航空機から無人航空機を視認して回避することは困難です。一方、無人航空機は一般的に機動性が高いと考えられるため、無人航空機側が航空機との接近を事前に回避することが妥当です。したがって、航空機が無人航空機に対して進路権を有するとされています。",ref:"教則 第3章 航空法全般（航空機の運航ルール等）"},
  {cat:1,lvl:"common",q:"無人航空機登録制度の目的について、最も適切なものを１つ選べ。",o:["DIPSとの連携による飛行許可申請の手続きの負担軽減、迅速な許可承認書の発行。","無人航空機の操縦者の操縦技能の証明、技能証明の取得促進による操縦者の育成。","事故発生時の所有者把握、事故原因の究明、安全問題のある機体登録の拒否を通じての安全確保。","無人航空機の生産促進、競争力強化、無人航空機産業の国内市場拡大。"],a:2,e:"無人航空機登録制度の主な目的は、事故発生時などにおける所有者の把握、事故原因の究明などの安全確保上の措置の実施、さらには安全上問題のある機体の登録の拒否を通じて、航空全体の安全を確保することです。これにより、無人航空機による不適切な飛行事案への対応が可能となり、無人航空機の利活用の増加を安全に促進できます。",ref:"教則 第3章 3.1.2 無人航空機登録制度（p.13）"},
  {cat:1,lvl:"common",q:"無人航空機の登録について、適切ではないものを１つ選べ。",o:["無人航空機はリモートID機能を備えなくてもいい場合がある。","登録を受けた無人航空機には、登録記号を機体の見やすい箇所に表示しなければならない。","無人航空機の登録の有効期間は3年であり、所有者の氏名や住所に変更があった場合は変更の届出が必要である。","100グラム以上の無人航空機は必ず機体登録をしなければいけない。"],a:3,e:"無人航空機の登録に関する規定では、登録の有効期間は3年であり、所有者情報等に変更があった場合は変更の届出が必要です。また、機体登録が不要なケースとリモートIDが不要なケースがあるため、混同しないよう注意が必要です。\n【機体登録が不要なケース】\n①100g未満\n②試験飛行の届出済み\n③屋内のみの飛行\n【リモートIDが不要なケース】\n①2022年6月19日までに手続きしたもの\n②リモートID特区の届出\n③係留しているもの（30m以内）\n④警察の秘匿業務",ref:"教則 第3章 3.1.2 無人航空機の登録（p.13）"},
  {cat:1,lvl:"common",q:"無人航空機の登録が受けられない条件について、最も適切なものを１つ選べ。",o:["製造者が安全性に問題があるとして回収を呼びかけている機体や、事故が多発していることが明らかな機体など、あらかじめ国土交通大臣が登録できないものとして指定した無人航空機。","遠隔操作機能だけで自動操縦機能がない無人航空機。","衝突した際に安全を著しく損なうおそれはないが、表面に不要な装飾がされており奇抜なデザインの無人航空機。","日本国外の製造者が製造した無人航空機。"],a:0,e:"製造者が安全性に懸念を示し回収を呼びかけている機体や、事故が頻繁に発生している機体など、国土交通大臣が登録できないものと指定した機体は登録を受けることができません。また、表面に不要な突起物があるなどして地上の人などに衝突した際に安全を著しく損なうおそれがある無人航空機や、遠隔操作又は自動操縦による飛行の制御が著しく困難である無人航空機も登録を受けることができません。",ref:"教則 第3章 3.1.2 登録を受けることができない無人航空機（p.13）"},
  {cat:1,lvl:"common",q:"次のうち、登録を受けた無人航空機の使用者の義務について最も適切なものを１つ選べ。",o:["当該無人航空機が安全上の問題から登録を受けることができない無人航空機とならないように整備や改造を行うことは、製造者のみの義務である。","使用者は、整備や改造をし、当該無人航空機が安全上の問題から登録を受けることができない無人航空機とならないようにしなければいけない。","当該無人航空機が安全上の問題から登録を受けることができない無人航空機とならないように整備や改造を行うことは、所有者のみの義務である。","使用者(所有者も含む)が、当該無人航空機が安全上の問題から登録を受けることができない無人航空機とならないように整備や改造を行うことは認められない。"],a:1,e:"登録を受けた無人航空機の使用者は、整備及び必要に応じて改造をし、当該無人航空機が安全上の問題から登録を受けることができない無人航空機とならないように維持しなければなりません。また、登録記号の機体への表示も維持しなければなりません。",ref:"教則 第3章 3.1.2 無人航空機の登録（使用者の義務）（p.13）"},
  {cat:1,lvl:"common",q:"無人航空機のリモートID機能について、正しいものを１つ選べ。",o:["リモートID機能により発信される情報は、1分に1回発信される。","リモートID機能により発信される情報には、操縦者の技能証明番号が含まれている。","リモートID機能により発信される情報には、プライバシーの観点より、無人航空機の製造番号と登録記号のみが含まれている。","リモートID機能により発信される情報には、無人航空機の所有者や使用者の情報は含まれていない。"],a:3,e:"リモートID機能は、無人航空機の識別情報を電波で遠隔発信するものです。発信される情報には、無人航空機の製造番号及び登録記号という静的情報と、位置、速度、高度、時刻といった動的情報が含まれますが、所有者や使用者の情報は含まれません。また、この情報は1秒に1回以上発信されることが求められています。",ref:"教則 第3章 無人航空機の登録制度（リモートID機能）"},
  {cat:1,lvl:"common",q:"無人航空機の機体認証及び無人航空機操縦者技能証明について、正しいものを１つ選べ。",o:["機体認証は第一種と第二種ともに3年で、技能証明の有効期間は一等が1年、二等は3年である。","第一種機体認証の有効期間は1年、第二種は3年、技能証明は一等及び二等ともに3年である。","技能証明の有効期間は一等及び二等ともに3年で、機体認証は第一種と第二種ともに1年である。","第一種機体認証の有効期間は3年、第二種は1年で、技能証明は一等及び二等ともに3年である。"],a:1,e:"無人航空機の飛行の安全を確保するためには、使用する機体の適格性と操縦者の技能の確認が必要です。これらは機体認証と技能証明という制度により確認され、国があらかじめ基準に適合していることを証明します。機体認証の有効期間は、第一種（カテゴリーⅢ飛行に対応）が1年、第二種（カテゴリーⅡ飛行に対応）が3年であり、技能証明（一等及び二等無人航空機操縦士）の有効期間はともに3年です。機体認証の検査は国又は国が登録した民間の検査機関が、技能証明の試験は国が指定した民間の試験機関が実施します。",ref:"教則 第3章 3.1.1 機体認証及び技能証明（p.7）"},
  {cat:1,lvl:"common",q:"機体認証を受けた無人航空機の運航ルールについて、以下の記述のうち不適切なものを1つ選べ。",o:["技能証明を受けた者が機体認証を受けた機体で、航空局の許可を取得せずに人口集中地区で飛行を行う場合は、当該機体の使用の条件の範囲内で飛行を行う必要がある。","使用の条件の範囲内であれば、機体認証を受けなくても、二等技能証明以上を所有している操縦者は、航空局の許可承認なしに、カテゴリーⅡBの特定飛行が認められる。","機体認証を受けた無人航空機は、特定飛行外であれば「使用条件等指定書」に従う必要はない。","機体認証の際には、最大離陸重量や飛行可能高度、飛行可能速度などの安全確保のための条件が「使用の条件」として指定され、使用条件等指定書が交付される。"],a:1,e:"無人航空機の機体認証を行う際、安全性を確保するための条件（最大離陸重量、飛行可能高度、飛行可能速度等）が「使用の条件」として指定され、使用条件等指定書として交付されます。技能証明を受けた者が機体認証を受けた無人航空機にて特定飛行を行う場合は、使用の条件の範囲内で飛行しなければなりません（特定飛行外、係留飛行、許可承認を受けた飛行を除きます）。なお、第二種以上の機体認証がされていない機体の場合は、二等技能証明以上を所有している操縦者でもカテゴリーⅡBの特定飛行は認められません。",ref:"教則 第3章 3.1.2 機体認証（使用の条件）"},
  {cat:1,lvl:"common",q:"無人航空機操縦者技能証明（技能証明）制度に関する以下の記述のうち、正しいものを１つ選べ。",o:["パワードリフト機（Powered-lift）の飛行にあたっては、回転翼航空機（マルチローター）及び回転翼航空機（ヘリコプター）の両方の種類の限定に係る資格が必要となる。","国が指定した民間試験機関（指定試験機関）による学科試験、実地試験及び身体検査により知識及び能力を判定し、これらの試験等に合格した場合には、国が技能証明を行う。","技能証明の有効期間は５年間であり、更新の手続きは設けられていない。","技能証明は、一等無人航空機操縦士と二等無人航空機操縦士の２つの資格に区分され、それぞれの資格において、無人航空機の種類（３種類）及び飛行の方法（３種類）について限定をすることとしている。"],a:1,e:"無人航空機操縦者技能証明（技能証明）制度は、無人航空機の操縦に必要な技能（知識及び能力）を有することを国が証明する資格制度です。国が指定した民間試験機関（指定試験機関）による学科試験、実地試験及び身体検査に合格した場合に、国が技能証明を行います。技能証明は一等と二等の2つの資格に区分され、無人航空機の種類（6種類）及び飛行の方法（3種類）について限定をすることとされています。パワードリフト機（Powered-lift）の飛行にあたっては、回転翼航空機（マルチローター）及び飛行機の両方の種類の限定に係る資格が必要となります。なお、技能証明の有効期間は3年で、更新の手続きが設けられています。",ref:"教則 第3章 3.1.2 技能証明制度（p.13）"},
  {cat:1,lvl:"common",q:"技能証明の交付手続きについて、以下の選択肢の中から最も適切なものを１つ選べ。",o:["技能証明を受けようとする者は「登録講習機関」が実施する学科試験、実地試験及び身体検査に合格した上で、国土交通大臣に技能証明書の交付の申請を行う。","技能証明試験に合格した者は、住所地を管轄する都道府県知事に対して技能証明書の交付の申請を行う。","学科試験が未受験または不合格の場合、「指定試験機関」が実施する実地試験を受けることはできない。","「登録講習機関」にて無人航空機講習（学科講習・実地講習）を修了した者は、技能証明試験の学科試験と実地試験が免除される。"],a:2,e:"技能証明を受けようとする者は、「指定試験機関」が実施する学科試験、実地試験及び身体検査に合格した上で、国土交通大臣に技能証明書の交付の申請を行います。学科試験に合格しなければ、指定試験機関が実施する実地試験を受けることはできません。なお、「登録講習機関」の無人航空機講習を修了した者は、指定試験機関が実施する実地試験が免除されます（学科試験は免除されません）。",ref:"教則 第3章 3.1.2 技能証明制度（p.13）"},
  {cat:1,lvl:"common",q:"技能証明の資格要件について、以下の選択肢の中から最も適切なものを１つ選べ。",o:["認知症を患っている場合でも、技能証明試験に合格した場合は、国は技能証明を拒否することができない。","１８歳に満たない者は、技能証明の申請をすることができない。","技能証明の申請は、１６歳未満や、技能証明が拒否された日から１年以内の者や、技能証明が取り消された日から２年以内の者はできない。","技能証明の申請は、技能証明を保留されている者や技能証明の効力を停止されている者は一律でできない。"],a:2,e:"次のいずれかに該当する場合には、技能証明の申請をすることができません。(1)16歳に満たない者、(2)技能証明を拒否された日から1年以内の者又は技能証明を保留されている者、(3)技能証明を取り消された日から2年以内の者又は技能証明の効力を停止されている者（(2)(3)は航空法等に違反する行為をした場合や無人航空機の飛行に当たり非行又は重大な過失があった場合に係るものに限ります）。また、てんかんや認知症等の無人航空機の飛行に支障を及ぼすおそれがある病気にかかっている者、アルコールや大麻、覚せい剤等の中毒者、航空法等に違反する行為をした者、無人航空機の飛行に当たり非行又は重大な過失があった者は、技能証明試験に合格しても技能証明を拒否又は保留されることがあります。",ref:"教則 第3章 3.1.2 技能証明の資格要件（p.13）"},
  {cat:1,lvl:"common",q:"技能証明の取消し等について、以下の選択肢の中から正しいものを１つ選べ。",o:["航空法等に違反する行為をした場合、技能証明の取消し又は２年以内の技能証明の効力の停止を受けることがある。","技能証明を受けた者が無人航空機の飛行に支障を及ぼすおそれがある病気にかかったことが判明した場合であっても、技能証明を受けてから1年間は、技能証明の取消し又は効力停止を受けることはない。","アルコールや大麻、覚せい剤等の中毒者であることが判明した場合、技能証明の取消し又は１年以内の技能証明の効力の停止を受けることがある。","無人航空機の飛行に当たり非行があっただけでは、技能証明の取消しや効力停止を受けることはない。"],a:2,e:"技能証明を受けた者が、無人航空機の飛行に支障を及ぼすおそれがある病気にかかったとき、アルコールや大麻、覚せい剤等の中毒者であることが判明したとき、航空法等に違反する行為をしたとき、又は無人航空機の飛行に当たり非行若しくは重大な過失があったときは、技能証明の取消し又は1年以内の技能証明の効力の停止を受けることがあります。",ref:"教則 第3章 3.1.2 技能証明の取消し等（p.13）"},
  {cat:1,lvl:"common",q:"技能証明を有する者への行政処分として、以下の記述のうち最も適切なものを1つ選べ。",o:["今回、口頭注意に相当する点数を受けた者が、過去に口頭注意を受けていた場合、今回の点数に２点が加算され、最終的な処分内容が決定される。","点数が１５点以上となった場合の処分内容は、技能証明の効力の停止１年である。","常習的に違反行為等を行っている場合は１～３点の加重が行われる可能性がある。","処分等区分表において、技能証明の効力の停止が３ヶ月となるのは点数が９～11のときである。"],a:0,e:"過去に処分等を受けている者に対しては「過去に処分等を受けている場合の取扱表」に従って点数が加重され、今回・過去がいずれも口頭注意（又は文書警告）相当の場合の加重は２点です（組合せにより加重は２～６点、過去に取消しを受けている場合は取消し）。常習的に違反行為等を行っている場合は３点の加重が行われます。また、処分等区分表において、技能証明の効力の停止が３ヶ月となるのは点数が６～８点のとき（９～11点は停止６ヶ月）であり、１５点以上のときは技能証明の取消しとなります。",ref:"教則 第3章 3.1.2 処分等区分表（p.13）"},
  {cat:1,lvl:"common",q:"無人航空機操縦者技能証明に係る行政処分に関する基準に定める「点数表」として、以下の記述のうち最も適切なものを1つ選べ。いずれもカテゴリーⅡにおける特定飛行を行っているものとする。",o:["飛行計画を通報せずに飛行させた場合の点数は3点である。","飛行日誌を携帯せずに飛行させた場合の点数は3点である。","技能証明書を携帯せずに飛行させた場合の点数は1点である。","第三者の飛行経路下への立入を確認したにも関わらず飛行を中止しなかった場合の点数は6点である。"],a:2,e:"カテゴリーⅡにおける特定飛行の場合、技能証明書を携帯せずに飛行させた場合の点数は1点です。飛行日誌を携帯せずに飛行させた場合の点数は6点、第三者の飛行経路下への立入を確認したにも関わらず飛行を中止しなかった場合の点数は3点、飛行計画を通報せずに飛行させた場合の点数は10点です。",ref:"教則 第3章 3.1.2 行政処分（点数表）（p.13）"},
  {cat:1,lvl:"common",q:"無人航空機操縦者技能証明に係る行政処分に関する基準に定める「点数表」として、以下の記述のうち最も適切なものを1つ選べ。いずれも機体認証を受けていない無人航空機の飛行とする。",o:["承認を受けずに屋内で目視外飛行を行った場合の点数は14点である。","機体登録を受けていない機体を屋外で飛行させた場合の点数は8点である。","承認を受けずに屋内で夜間飛行を行った場合の点数は10点である。","飲酒飛行をした場合の点数は16点である。"],a:1,e:"機体登録を受けていない機体を屋外で飛行させた場合の点数は8点、飲酒飛行をした場合の点数は15点です。屋内での飛行は航空法の飛行規制の対象外であり、夜間飛行や目視外飛行の承認は不要のため、承認がなくても違反にはならず点数は付されません。",ref:"教則 第3章 3.1.2 行政処分（点数表）（p.13）"},
  {cat:1,lvl:"common",q:"無人航空機の特定飛行について、以下の選択肢から最も適切なものを1つ選べ。",o:["飛行日誌の記載事項は、無人航空機の情報(登録記号、種類、型式、製造者・製造番号)のみに限られる。","飛行日誌の作成、携帯は、特定飛行を行わない者にも推奨される。","特定飛行を行う場合であっても、飛行日誌の携帯は法的義務ではなく推奨にとどまる。","飛行日誌は電子データでの保持が義務付けられており、特定飛行を行う際に速やかに参照、提示できるようにする。"],a:1,e:"特定飛行を行う者は飛行日誌を携帯することが義務付けられています。飛行日誌は紙又は電子データで保持し、速やかに参照、提示できるようにする必要があります。飛行日誌には、無人航空機に関する情報（登録記号、種類、型式、製造者・製造番号等）のほか、飛行記録（飛行の年月日、離着陸場所・時刻、飛行時間、飛行させた者の氏名等）、日常点検記録、点検整備記録を遅滞なく記載しなければなりません。特定飛行に該当しない飛行についても飛行日誌への記載が推奨されていますが、法的義務はありません。",ref:"教則 第3章 飛行日誌（p.23）"},
  {cat:1,lvl:"common",q:"無人航空機の飛行形態について、適切ではないものを１つ選べ。",o:["立入管理措置を講じないで、人口集中地区で飛行を行うことは、カテゴリーⅢ飛行に該当する。","立入管理措置を講じたうえで、空港周辺の空域で無人航空機を飛行させることは、カテゴリーⅡA飛行に該当する。","立入管理措置を講じたうえで、１,０００gの無人航空機を目視外飛行させることは、カテゴリーⅡB飛行に該当する。","立入管理措置を講じたうえで、最大離陸重量２５ｋｇ以上の機体を人口集中地区で飛行させることは、カテゴリーⅡB飛行に該当する。"],a:3,e:"無人航空機の飛行形態には、カテゴリーⅠ飛行、カテゴリーⅡ飛行、カテゴリーⅢ飛行があります。カテゴリーⅡ飛行のうち、空港周辺、高度１５０ｍ以上、催し場所上空、危険物輸送及び物件投下並びに最大離陸重量２５ｋｇ以上の無人航空機の特定飛行は、リスクの高いものとしてカテゴリーⅡＡ飛行、その他をカテゴリーⅡＢ飛行といいます。したがって、最大離陸重量２５ｋｇ以上の機体を人口集中地区で飛行させることはカテゴリーⅡＢ飛行ではなくカテゴリーⅡＡ飛行に該当します。また、立入管理措置を講じない特定飛行はカテゴリーⅢ飛行に該当します。",ref:"教則 第3章 カテゴリー区分（p.14）"},
  {cat:1,lvl:"common",q:"カテゴリーⅡ飛行の取り扱いについて、以下の記述のうち最も適切なものを１つ選べ。",o:["カテゴリーⅡB飛行では、技能証明を受けた操縦者が機体認証を受けた無人航空機を、飛行マニュアルを作成し遵守して飛行を行えば、許可承認なしで飛行させることが可能である。","カテゴリーⅡA飛行では、技能証明を受けた操縦者であって、かつ機体認証を受けた無人航空機でなければ飛行を行うことができない。","カテゴリーⅡB飛行では、機体認証を受けた無人航空機であれば、技能証明を受けていない操縦者であっても許可承認なしで飛行させることが可能である。","カテゴリーⅡA飛行では、技能証明を受けた操縦者が機体認証を受けた無人航空機を、飛行マニュアルを作成し遵守して飛行を行えば、許可承認なしで飛行させることが可能である。"],a:0,e:"カテゴリーⅡ飛行にはⅡＡとⅡＢがあり、それぞれ異なる要件と手続きが必要です。カテゴリーⅡＢ飛行では、技能証明を受けた操縦者が機体認証を受けた無人航空機を飛行させる場合、許可承認なしで飛行が可能です。ただし、安全確保措置として各種の事項を含む飛行マニュアルの作成とその遵守が必要です。一方、カテゴリーⅡＡ飛行では、技能証明を有する操縦者が機体認証を受けた機体を飛行させる場合であっても、「運航管理の方法」について国土交通大臣の審査を受け、飛行の許可・承認を得る必要があります。なお、いずれの場合も、技能証明を有する操縦者と機体認証を受けた機体でなければ飛行できないわけではなく、許可・承認を得れば飛行が可能です。",ref:"教則 第3章 カテゴリーⅡA/ⅡB（p.15）"},
  {cat:1,lvl:"common",q:"特定飛行のカテゴリーⅢ飛行について、最も正しいものを１つ選べ。",o:["カテゴリーⅢ飛行では、一等無人航空機操縦士の技能証明と第一種機体認証を受けた機体がない場合でも、国土交通大臣の許可承認を受けることで飛行が可能となる。","カテゴリーⅢ飛行では、一等無人航空機操縦士の技能証明と第一種機体認証を受けた機体を用い、国土交通大臣の許可承認を受ける必要がある。","カテゴリーⅢ飛行では、一等無人航空機操縦士の技能証明と第一種機体認証を受けた機体を用いることで、国交省の許可承認が不要となる。","カテゴリーⅢ飛行では、二等無人航空機操縦士の技能証明と第二種機体認証を受けた機体を用いることで、国土交通大臣の許可承認を受けて飛行することができる。"],a:1,e:"カテゴリーⅢ飛行は最もリスクの高い飛行とされ、一等無人航空機操縦士の技能証明を受けた者が第一種機体認証を受けた無人航空機を飛行させることが求められます。また、運航管理の方法について国土交通大臣の審査を受け、飛行の許可・承認を受けることにより飛行が可能となります。これらの手続きはリスクを管理し、飛行の安全性を確保するためのものです。",ref:"教則 第3章 3.1.1 カテゴリーⅢ飛行"},
  {cat:1,lvl:"common",q:"カテゴリーⅢ飛行を行う際の運航管理体制について、以下の記述のうち正しいものを１つ選べ。",o:["カテゴリーⅢ飛行を行う場合には、一等無人航空機操縦士資格を有する操縦者が第一種機体認証を有する無人航空機を飛行させる必要はあるが、「運航管理の方法」についてマニュアルを作成し順守することで、飛行の許可・承認が不要となる。","カテゴリーⅢ飛行において、一等無人航空機操縦士資格を有していない操縦者が第一種機体認証を有していない無人航空機を飛行させる場合は「運航管理の方法」についてだけでなく、「操縦する者の技能」「使用する機体」についても国土交通大臣の審査を受け、飛行の許可・承認を得る必要がある。","カテゴリーⅢ飛行を行う場合には、一等無人航空機操縦士資格を有する操縦者が第一種機体認証を有する無人航空機を飛行させることが条件となり、あらかじめ「運航管理の方法」について国土交通大臣の審査を受け、飛行の許可・承認を得なければ飛行をさせることはできない。","カテゴリーⅢ飛行を行う場合には、第一種機体認証を有する無人航空機を使用していれば、二等無人航空機操縦士資格を有する操縦者であっても「運航管理の方法」の審査を受けることで飛行の許可・承認を得ることができる。"],a:2,e:"カテゴリーⅢ飛行では、一等無人航空機操縦士資格を有する操縦者が第一種機体認証を有する無人航空機を飛行させることが必要で、事前に「運航管理の方法」について国土交通大臣の審査を受け、飛行の許可・承認を得る必要があります。この審査では、リスクの分析と評価、非常時の対処方針や緊急着陸場所の設定などのリスク軽減策、飛行マニュアルの作成と遵守、そして賠償能力（適切な保険の加入等）の確認などが行われます。\nカテゴリーⅢ飛行については、一等無人航空機操縦士資格を有する操縦者で、かつ第一種機体認証を有する無人航空機を使用しなければ、そもそも飛行の許可・承認を得ることはできません。",ref:"教則 第3章 3.1.1 カテゴリーⅢ飛行（運航管理の方法）"},
  {cat:1,lvl:"common",q:"「レベル3.5飛行の位置づけ」について、適切なものを１つ選べ。",o:["レベル3.5飛行は万が一のために第三者賠償責任保険への加入が必須であるため、移動中の第三者の上空も一時的であれば飛行できる。","レベル3.5飛行は補助者の配置や看板の設置は不要であるが、カメラでの立入管理措置は必要である。","レベル3.5飛行は一時的ではあるが移動車両上空の飛行ができるため、カテゴリーⅢに分類される。","レベル3.5飛行は、一定の要件を満たすことで立入管理措置そのものが不要となる飛行である。"],a:1,e:"レベル3.5飛行は、あくまでもカテゴリーⅡ飛行であるため、以下の点に注意する必要があります。\n・一定の要件を満たすことにより、一時的な道路等の横断に限って移動中の車両等の上空を飛行することを可能とするものであり、カテゴリーⅢ（レベル4）飛行と同様に歩行者等の第三者の上空の飛行を認めるものではありません。\n・一定の要件を満たすことにより、従来求められていた立入管理措置のうち補助者の配置や看板の設置等を機上カメラでの確認に代替するものであり、立入管理措置そのものが不要となるわけではありません。",ref:"教則 第3章 3.1.2 レベル3.5飛行"},
  {cat:1,lvl:"common",q:"「レベル3.5飛行で作成すべき資料」について、もっとも適切なものを１つ選べ。",o:["作成した各種資料は、飛行の許可・承認の申請時に必ず国土交通省航空局へ提出しなければならない。","飛行範囲と落下距離の範囲内を立入管理区画として地図上に示した資料が必要である。","各種資料は航空局から提出を求められた際に直ちに作成する必要がある。","十分な飛行実績または機体の初期故障期間を超えたことを示す資料が必要である。"],a:1,e:"レベル3.5飛行の実施に際しては、レベル3飛行に必要な要件へ適合していることを示す以下の資料の作成が必要です。また、飛行の安全を確保するための運航条件等を事前に定める必要もあります。\n・飛行に際し想定されるリスクを十分に考慮の上、安全な飛行が可能となる運航条件等を設定した資料\n・無人航空機の機能・性能及び飛行形態に応じた追加基準に関する基準適合状況を示せる資料\n・操縦者にかかる飛行形態に応じた追加基準への適合性について、過去の飛行実績又は訓練実績等を記載した資料\n・飛行範囲及びその外周から製造者等が保証した落下距離の範囲内を立入管理区画として地図上に示した資料\n・想定される運用により、十分な飛行実績（機体の初期故障期間を超えたもの）を有することを示せる資料\nなお、上記資料は基本的に申請時の提出は不要ですが、別途、国土交通省航空局から求めがあった場合には提出が必要となります。",ref:"教則 第3章 3.1.2 レベル3.5飛行"},
  {cat:1,lvl:"common",q:"「レベル3.5飛行の実施に求められる安全確保体制」について、もっとも適切なものを１つ選べ。",o:["レベル3.5飛行は、目視内飛行の限定解除を受けていなくても、技能証明を有していれば承認を受けることができる。","レベル3.5飛行では、万が一のために補償金額が1億円以上の第三者賠償責任保険への加入が必須である。","レベル3.5飛行では、飛行経路直下への第三者の立入りを防ぐため、補助者の配置と看板の設置が必須である。","レベル3.5飛行では、機体のカメラ映像を地上モニターで確認し、飛行経路下に第三者の立ち入りがないことを確認できることを事前に確認する必要がある。"],a:3,e:"レベル3.5飛行の実施に当たっては、特に下記3つの要件への適合が必要です。\n・機上カメラと地上に設置するモニター等の設備により、進行方向の飛行経路の直下及びその周辺に第三者の立入りが無いことを確認できることを事前に確認していること\n・操縦者が無人航空機操縦者技能証明（飛行させる無人航空機の種類、重量に対応したものであって、目視内飛行の限定解除を受けたもの）を保有していること\n・移動中の車両等との接触や交通障害等の不測の事態に備え、十分な補償が可能な第三者賠償責任保険に加入していること（補償限度額については事業者にて設定）",ref:"教則 第3章 3.1.2 レベル3.5飛行"},
  {cat:1,lvl:"common",q:"無人航空機の特定飛行を行う際の飛行計画通報に関する記述のうち、最も適切なものを1つ選べ。",o:["航空法の改正により、飛行計画通報は、特定飛行以外の飛行も義務付けられている。","飛行計画には無人航空機の登録記号、種類、飛行させる者の氏名と住所を記載する。","国土交通大臣から特定飛行の日時や経路の変更を指示された場合、操縦者はそれに従う必要がある。","飛行計画の通報は、特定飛行を行った後に遅滞なく行えばよい。"],a:2,e:"無人航空機を特定飛行させる場合には、あらかじめ飛行計画を国土交通大臣に通報しなければなりません。通報には無人航空機の登録記号、種類、飛行させる者の氏名、技能証明書番号、飛行の許可・承認の番号、飛行の目的、高度、速度等の詳細な情報が含まれます。しかし、飛行させる者の「住所」までは求められません。特定飛行に該当しない場合でも、飛行計画を通報することが推奨されています。また、国土交通大臣から特定飛行の日時や経路の変更等の指示を受けた場合には、その指示に従わなければなりません。",ref:"教則 第3章 3.1.2 飛行計画の通報等"},
  {cat:1,lvl:"common",q:"無人航空機の飛行中における禁止事項について、最も適切なものを１つ選べ。",o:["航空機が上空を飛んでいないことが明らかな場合、機体の性能の範囲内であれば、飛行高度に法的な制限はない。","アルコールを摂取した場合でも、少量であれば無人航空機を飛行させることができる。","第三者に向かって無人航空機を急接近させる飛行は、航空法で禁止されている。","飛行中は、無線操作が可能な範囲であれば目視外飛行も許可なく可能である。"],a:2,e:"人に向かって無人航空機を急接近させるなど、他人に迷惑を及ぼすような飛行は航空法で禁止されています。また、無人航空機の飛行は一定の高さや目視内で行う必要があり、目視外飛行や高度150m以上の飛行には原則として航空局の許可・承認が必要です。なお、アルコール又は薬物の影響下での飛行は一切禁止されています。",ref:"教則 第3章 遵守事項（迷惑飛行の禁止等）"},
  {cat:1,lvl:"common",q:"無人航空機の飛行前に行うべき確認について、最も適切ではないものを１つ選べ。",o:["緊急用務空域の該当の有無","飛行に必要な気象情報","今日の運勢","バッテリーの残量"],a:2,e:"無人航空機の飛行前には、機体の損傷や歪み、通信系統、プロペラ等の動力源、リモートID機能、飛行に必要な気象情報、燃料の搭載量又はバッテリーの残量、飛行空域や周囲の状況（他の航空機や無人航空機の飛行状況を含む）等を確認することが必要です。今日の運勢は飛行前に確認すべき事項ではありません。",ref:"教則 第3章 遵守事項（飛行前確認）"},
  {cat:1,lvl:"common",q:"無人航空機の飛行についての罰則について、最も適切なものを１つ選べ。",o:["航空法令の規定に違反した場合の罰則は、罰金のみである。","航空法令の規定に違反した場合でも、初回の違反であれば罰則が科されることはない。","航空法令の規定に違反した場合、懲役刑となる可能性がある。","航空法令の規定に違反した場合でも、行政処分の対象になることはない。"],a:2,e:"航空法令の規定に違反した場合には、懲役または罰金になる可能性があります。初回の違反であっても罰則の対象となります。また、技能証明を有する者は、罰則に加えて、技能証明の取消し等の行政処分の対象にもなる可能性があります。",ref:"教則 第3章 3.1.2 罰則"},
  {cat:1,lvl:"common",q:"航空法令に違反した場合の罰則について、以下の記述のうち最も適切なものを1つ選べ。",o:["事故が発生した場合に飛行を中止し負傷者を救護するなどの危険を防止するための措置を講じなかった場合、２年以下の懲役又は１００万円以下の罰金となる可能性がある。","規制対象となる飛行の区域又は方法に違反して飛行させた場合は、１年以下の懲役又は５０万円以下の罰金となる可能性がある。","航空機又は他の無人航空機との衝突防止をしなかった場合は、２年以下の懲役又は１００万円以下の罰金となる可能性がある。","アルコール又は薬物の影響下で無人航空機を飛行させた場合は、５０万円以下の罰金となる可能性がある。"],a:0,e:"罰則の主な区分は次のとおりです。\n【２年以下の懲役又は１００万円以下の罰金】事故が発生した場合に飛行を中止し負傷者を救護するなどの危険を防止するための措置を講じなかったとき。\n【１年以下の懲役又は５０万円以下の罰金】登録を受けていない無人航空機を飛行させたとき。\n【１年以下の懲役又は３０万円以下の罰金】アルコール又は薬物の影響下で無人航空機を飛行させたとき。\n【５０万円以下の罰金】登録記号の表示又はリモートIDの搭載をせずに飛行させたとき、規制対象となる飛行の区域又は方法に違反して飛行させたとき、飛行前の確認をせずに飛行させたとき、航空機又は他の無人航空機との衝突防止をしなかったとき、他人に迷惑を及ぼす飛行を行ったとき等。\n【３０万円以下の罰金】飛行計画を通報せずに特定飛行を行ったとき、事故が発生した場合に報告をせず又は虚偽の報告をしたとき等。\n【１０万円以下の罰金】技能証明を携帯せずに特定飛行を行ったとき、飛行日誌を備えずに特定飛行を行ったとき、飛行日誌に記載せず又は虚偽の記載をしたとき等。",ref:"教則 第3章 罰則"},
  {cat:1,lvl:"common",q:"航空法令に違反した場合の罰則について、以下の記述のうち正しいものを1つ選べ。",o:["登録記号の表示又はリモートIDの搭載をせずに飛行させた場合は、50万円以下の罰金が科せられる可能性がある。","技能証明を携帯せずに特定飛行を行った場合、30万円以下の罰金が科せられる可能性がある。","飛行計画を通報せずに特定飛行を行った場合、50万円以下の罰金が科せられる可能性がある。","アルコールまたは薬物の影響下で無人航空機を飛行させた場合、1年以下の懲役又は50万円以下の罰金が科せられる可能性がある。"],a:0,e:"罰則の額は違反の内容ごとに定められています。登録記号の表示又はリモートIDの搭載をせずに飛行させた場合は、50万円以下の罰金の対象となります。一方、アルコール又は薬物の影響下で飛行させた場合は1年以下の懲役又は30万円以下の罰金、技能証明書を携帯せずに特定飛行を行った場合は10万円以下の罰金、飛行計画を通報せずに特定飛行を行った場合は30万円以下の罰金となります。",ref:"教則 第3章 3.1.2 罰則（p.13）"},
  {cat:1,lvl:"common",q:"小型無人機等飛行禁止法により飛行が禁止される対象について、適切ではないものを１つ選べ。",o:["小型無人機等飛行禁止法において、重要施設の敷地・区域の上空をレッド・ゾーン、その周囲おおむね300mの上空をイエロー・ゾーンという。","飛行禁止の対象となる重要施設には、国の重要な施設、外国公館、防衛関係施設、原子力事業所などが含まれる。","空港は、航空法で規制されているため、小型無人機等飛行禁止法では対象施設とされていない。","小型無人機等飛行禁止法において、対象施設は一時的に追加される場合がある。"],a:2,e:"小型無人機等飛行禁止法において、重要施設の敷地・区域の上空をレッド・ゾーン、その周囲おおむね300mの上空をイエロー・ゾーンといいます。また、外国要人の来日等に伴い、一時的に対象施設が追加されることがあります。飛行禁止の対象となる重要施設には、国の重要な施設、外国公館、防衛関係施設、原子力事業所のほか、国土交通大臣が指定する空港も含まれます。",ref:"教則 第3章 3.2.1 小型無人機等飛行禁止法（p.29）"},
  {cat:1,lvl:"common",q:"小型無人機等飛行禁止法について、以下の選択肢の中から最も適切なものを１つ選べ。",o:["小型無人機等飛行禁止法の規制対象には、遠隔操作や自動操縦ができない気球、ハンググライダー、パラグライダーは該当しない。","小型無人機等飛行禁止法では、重要施設の敷地・区域の上空のみが飛行禁止区域であり、その周囲の上空では飛行は禁止されていない。","小型無人機等飛行禁止法の規制対象には、100g未満のマルチローターも含まれる。","航空法で規制がされているため、小型無人機等飛行禁止法の対象施設には空港は含まれていない。"],a:2,e:"小型無人機等飛行禁止法は、国会議事堂などの重要施設に対する危険を未然に防止するため、重要施設及びその周囲おおむね300mの上空における小型無人機等の飛行を禁止しています。航空法の「無人航空機」と異なり、「小型無人機」は大きさや重さにかかわらず対象となり、100グラム未満のものも含まれます。特定航空用機器（気球、ハンググライダー及びパラグライダー等、機器を用いて人が飛行することができるもの）も規制対象です。飛行禁止の対象となる重要施設には、国の重要な施設、外国公館等（外務大臣指定）、防衛関係施設（防衛大臣指定）、空港（国土交通大臣指定）、原子力事業所（国家公安委員会指定）があります。",ref:"教則 第3章 3.2.1 小型無人機等飛行禁止法（p.29）"},
  {cat:1,lvl:"common",q:"小型無人機等飛行禁止法により飛行が禁止される施設について、適切ではないものを１つ選べ。",o:["国会議事堂","原子力事業所","外国公館","病院"],a:3,e:"小型無人機等飛行禁止法では、重要施設の上空及びその周囲おおむね300mの上空は飛行禁止区域となります。その対象となる施設は具体的に定められており、国の重要な施設や外国公館、防衛関係施設、空港、原子力事業所等が該当します。また、外国要人の来日等に伴い、一時的に対象施設が追加されることもあります。病院は対象施設に含まれていません。",ref:"教則 第3章 3.2.1 小型無人機等飛行禁止法（p.29）"},
  {cat:1,lvl:"common",q:"小型無人機等飛行禁止法について、最も適切なものを１つ選べ。",o:["対象施設の敷地・区域の上空(レッドゾーン)で飛行を行った者は、1年以下の懲役または50万円以下の罰金に処される可能性がある。","飛行禁止の例外に当たる場合、都道府県公安委員会等への通報は不要となる。","小型無人機等飛行禁止法は、重量100g以上の無人航空機のみを対象としている。","対象施設の敷地・区域の周辺おおむね150ｍの範囲の上空をイエローゾーンといい、飛行が禁止されている。"],a:0,e:"対象施設の敷地・区域の上空（レッドゾーン）で飛行を行った者及び警察官等の命令に違反した者には、1年以下の懲役または50万円以下の罰金が科される可能性があります。対象施設の敷地・区域の周辺おおむね300ｍの範囲の上空はイエローゾーンといい、飛行が禁止されています。また、飛行禁止の例外に当たる場合でも、都道府県公安委員会等への通報は必要です。なお、小型無人機等飛行禁止法は機体の重量にかかわらず適用されます。",ref:"教則 第3章 小型無人機等飛行禁止法"},
  {cat:1,lvl:"common",q:"小型無人機等の飛行禁止の例外に該当する者について、最も適切ではないものを１つ選べ。",o:["土地の所有者から同意を得た者が当該土地の上空において行う飛行","対象施設の管理者から同意を得た者による飛行","災害等で緊急性を要する飛行","地方公共団体の業務を実施するために行う飛行"],a:2,e:"小型無人機等の飛行禁止の例外は、対象施設の管理者又はその同意を得た者による飛行、土地の所有者等又はその同意を得た者が当該土地の上空において行う飛行、国又は地方公共団体の業務を実施するために行う飛行に限られており、航空局の許可承認や機体認証・技能証明を取得した場合であっても、小型無人機等を飛行させることは原則としてできません。また、例外的な飛行が認められた場合でも、都道府県公安委員会等への通報が必要となります。災害などで緊急性が求められる場合であっても、飛行禁止の例外にはなりません。",ref:"教則 第3章 3.2.1 小型無人機等飛行禁止法（p.29）"},
  {cat:1,lvl:"common",q:"無人航空機の無線設備利用に関するルールについて、適切なものを１つ選べ。",o:["日本国内で無人航空機の無線設備を使用する場合、国内の技術基準に合致した無線設備を用い、無線局を開設すれば、総務大臣の免許や登録を受ける必要はない。","日本国内で無人航空機の無線設備を使用する場合、海外の技術基準に合致した無線設備であれば、総務大臣の免許や登録を受けずに使用することができる。","日本国内で無人航空機の無線設備を使用する場合、国内の技術基準に合致した無線設備を用い、例外なく総務大臣の免許や登録を受け、無線局を開設する必要がある。","日本国内で無人航空機の無線設備を使用する場合、国内の技術基準に合致した無線設備を用い、微弱な無線局や一部の小電力の無線局を除き、原則、総務大臣の免許を受け、無線局を開設する必要がある。"],a:3,e:"日本国内で無人航空機の無線設備を使用する場合には、電波法令に基づき、国内の技術基準に合致した無線設備を使用し、原則として総務大臣の免許を受け、無線局を開設する必要があります。ただし、微弱な無線局や一部の小電力の無線局はこの限りではありません。また、小電力の無線局であっても技適マークの表示された適合表示無線設備である必要があります。",ref:"教則 第3章 3.2.2 電波法（p.30）"},
  {cat:1,lvl:"common",q:"無人航空機における微弱無線局と小電力の無線局について、不適切なものを１つ選べ。",o:["微弱無線局は、無線設備から500メートルの距離での電界強度が200μＶ／ｍ以下のものであり、周波数等が総務省告示で定められている。","微弱無線局や一部の小電力の無線局については、無線局の免許や登録を受けずに使用することができる。","小電力の無線局とは、空中線電力が1W以下で特定の用途に使用される一定の技術基準が定められた無線局で、Wi-FiやBluetooth等が該当する。","小電力の無線局は、技術基準適合証明等を受けた適合表示無線設備でなくても使用することができる。"],a:3,e:"微弱無線局や一部の小電力の無線局は、無線局の免許や登録を受けずに使用することができます。ただし、小電力の無線局は技術基準適合証明等（技適マーク）を受けた適合表示無線設備を使用する必要があるため、適合表示無線設備でなくても使用できるという記述は誤りです。微弱無線局は、無線設備から500メートルの距離での電界強度が200μＶ／ｍ以下のもので、周波数などは総務省告示で定められています。空中線電力が1W以下で、特定の用途に使用される小電力の無線局には、Wi-FiやBluetooth等が該当します。",ref:"教則 第3章 3.2.2 電波法（無線局の種類）（p.31）"},
  {cat:1,lvl:"common",q:"無人航空機におけるアマチュア無線とFPVの使用について、適切ではないものを１つ選べ。",o:["アマチュア無線は金銭上の利益のためでなく、専ら個人的な興味により行う自己訓練、通信及び技術研究のための無線通信であり、無人航空機での使用にはアマチュア無線技士の資格及びアマチュア無線局免許が必要である。","アマチュア無線を使用した無人航空機を、金銭上の利益を目的とした業務に利用することはできない。","5GHz帯のアマチュア無線は、周波数割当計画上、二次業務に割り当てられているため、一次業務の無線局(高速道路のETCシステム等)の付近での使用は避けるべきである。","金銭上の利益のためではなく、専ら個人的な興味により行う自己訓練、通信及び技術研究のためにアマチュア無線を使用する場合は、アマチュア無線技士の資格及びアマチュア無線局免許は不要となる。"],a:3,e:"アマチュア無線は、金銭上の利益のためでなく、専ら個人的な興味により行う自己訓練、通信及び技術研究のための無線通信です。そのため、アマチュア無線を使用した無人航空機を、利益を目的とした業務に利用することはできません。また、アマチュア無線の利用にはアマチュア無線技士の資格及びアマチュア無線局免許が必要です。アマチュア無線によるFPV無人航空機では、操縦に2.4GHz帯の免許不要局、画像伝送に5GHz帯のアマチュア無線局を使用することが多くあります。5GHz帯のアマチュア無線は周波数割当計画上、二次業務に割り当てられているため、一次業務の無線局の運用に妨害を与えないよう運用する必要があります。",ref:"教則 第3章 電波法（アマチュア無線・FPV）"},
  {cat:1,lvl:"common",q:"無人航空機における携帯電話等の移動通信システムの利用について、最も適切なものを１つ選べ。",o:["無人航空機に通信可能な携帯電話を乗せることについては、特に制限がなく、どこでも自由に使用することが可能である。","携帯電話等の移動通信システムは、上空での利用を前提に設計されているため、無人航空機に搭載して利用しても地上の利用者への影響を考慮する必要はない。","無人航空機にSIMカードを挿入して利用する場合は、携帯電話事業者が提供する条件に対応した上空用プラン等の利用手続を行うことが必要である。","通信品質の安定性や地上の携帯電話等の利用への影響が懸念されるため、いかなる条件下でも無人航空機に携帯電話を乗せることは、認められない。"],a:2,e:"携帯電話等の移動通信システムは、地上での利用を前提に設計されているため、上空での利用については通信品質の安定性や地上の携帯電話等の利用への影響が懸念されています。こうした状況を踏まえ、一定の条件下で利用することで、既設の無線局の運用等に支障を与えずに上空で利用できるよう、制度整備がなされています。携帯電話を無人航空機に搭載して利用する場合（無人航空機にSIMカードを挿入して利用する場合を含む）には、携帯電話事業者が提供する条件に対応した上空用プラン等の利用手続を行うことが必要です。",ref:"教則 第3章 3.2.2 電波法（p.30）"},
  {cat:1,lvl:"common",q:"飛行マニュアルに基づき、第三者から確保すべき水平距離（人又は物件との距離）は原則何m以上か。",o:["10m","20m","30m","50m"],a:2,e:"航空法では、人又は物件との間に30m以上の距離を保って飛行させることが原則として求められる（距離未満は特定飛行）。",ref:"教則 第3章 飛行の方法（p.14）"},
  {cat:1,lvl:"common",q:"飛行日誌について、正しい記載が義務付けられる3種の記録の組合せはどれか。",o:["飛行記録・日常点検記録・点検整備記録","飛行記録・気象記録・通信記録","点検記録・整備記録・廃棄記録","飛行記録・事故記録・訓練記録"],a:0,e:"飛行日誌は「飛行記録」「日常点検記録」「点検整備記録」で構成され、特定飛行を行う際は備付け・記載が義務。",ref:"教則 第3章 飛行日誌（p.23）"},
  {cat:1,lvl:"common",q:"無人航空機の登録に関する記述として正しいものはどれか。",o:["登録の有効期間は5年である","登録の有効期間は3年で、更新を受けなければ効力を失う","一度登録すれば更新は不要","重量に関係なく登録は任意"],a:1,e:"登録の有効期間は3年。3年ごとに更新を受けなければ効力を失う。所有者・使用者の氏名や住所の変更があれば変更の届出も必要。",ref:"教則 第3章 3.1.2 無人航空機の登録（p.13）"},
  {cat:1,lvl:"common",q:"アルコール又は薬物の影響下で無人航空機を飛行させた場合の罰則として正しいものはどれか。",o:["1年以下の懲役又は30万円以下の罰金","2年以下の懲役又は100万円以下の罰金","50万円以下の罰金","10万円以下の罰金"],a:0,e:"アルコール・薬物の影響下での飛行は1年以下の懲役又は30万円以下の罰金。",ref:"教則 第3章 3.1.2 罰則（p.13）"},
  {cat:1,lvl:"common",q:"登録を受けていない無人航空機を飛行させた場合の罰則として正しいものはどれか。",o:["1年以下の懲役又は50万円以下の罰金","2年以下の懲役又は100万円以下の罰金","30万円以下の罰金","10万円以下の罰金"],a:0,e:"無登録機の飛行は1年以下の懲役又は50万円以下の罰金。",ref:"教則 第3章 3.1.2 罰則（p.13）"},
  {cat:1,lvl:"common",q:"飛行計画を通報せずに特定飛行を行った場合の罰則として正しいものはどれか。",o:["30万円以下の罰金","50万円以下の罰金","1年以下の懲役又は50万円以下の罰金","10万円以下の罰金"],a:0,e:"飛行計画を通報せず特定飛行を行った場合は30万円以下の罰金。事故報告をしない場合も同様。",ref:"教則 第3章 3.1.2 罰則（p.13）"},
  {cat:1,lvl:"common",q:"技能証明書を携帯せずに特定飛行を行った場合の罰則として正しいものはどれか。",o:["10万円以下の罰金","30万円以下の罰金","50万円以下の罰金","1年以下の懲役"],a:0,e:"技能証明書不携帯や飛行日誌を備えずに特定飛行を行った場合は10万円以下の罰金。",ref:"教則 第3章 3.1.2 罰則（p.13）"},
  {cat:1,lvl:"common",q:"行政処分の点数が15点以上となった場合の処分内容として正しいものはどれか。",o:["技能証明の効力の取消","効力の停止1年","文書警告","口頭注意"],a:0,e:"処分等区分表で15点以上は効力の取消。12〜14点は効力停止1年、6〜8点は3月、3〜5点は文書警告、1〜2点は口頭注意。",ref:"教則 第3章 3.1.2 処分等区分表（p.13）"},
  {cat:1,lvl:"common",q:"国土交通大臣への報告義務がある無人航空機の事故について、人の死傷の対象範囲として正しいものはどれか。",o:["重傷以上","軽傷以上","かすり傷を含む全て","死亡のみ"],a:0,e:"事故のうち人の死傷は重傷以上が対象。物件の損壊は第三者の所有物で規模や損害額を問わず全てが対象。",ref:"教則 第3章 3.1.2 事故の定義（p.13）"},
  {cat:1,lvl:"common",q:"重大インシデントに該当するものとして正しいものはどれか。",o:["無人航空機の制御が不能となった事態","第三者に重傷を負わせる事故が発生したこと","飛行前点検で不具合を見つけ飛行を中止したこと","バッテリー残量が想定より早く減ったこと"],a:0,e:"重大インシデントは、航空機との衝突・接触のおそれ、重傷に至らない負傷、制御不能、飛行中の発火等で、報告義務がある。",ref:"教則 第3章 3.1.2 重大インシデント（p.13）"},
  {cat:1,lvl:"common",q:"無線局の免許又は登録が不要となる小電力無線局の周波数帯の組合せとして正しいものはどれか。",o:["73MHz帯・920MHz帯・2.4GHz帯（小電力）","5.7GHz帯（携帯局）","169MHz帯（携帯局）","800MHz帯（携帯電話）"],a:0,e:"免許・登録不要は技適を受けた微弱・小電力局で73MHz・920MHz・2.4GHz帯等。169MHz/5.7GHz帯の携帯局は免許が必要。",ref:"教則 第3章 3.2.2 電波法（p.30）"},
  {cat:1,lvl:"common",q:"169MHz帯・2.4GHz帯・5.7GHz帯の無人移動体画像伝送システム（携帯局）の運用に必要な無線従事者資格はどれか。",o:["第三級陸上特殊無線技士以上","資格不要","アマチュア無線技士のみ","第一級総合無線通信士のみ"],a:0,e:"これらの携帯局は無線局免許に加え第三級陸上特殊無線技士以上の資格が必要。",ref:"教則 第3章 3.2.2 電波法（p.30）"},
  {cat:1,lvl:"common",q:"高度150m以上でも飛行禁止空域から除外される例として正しいものはどれか。",o:["煙突・鉄塔等の構造物から30m以内の空域","全ての山岳地帯","市街地上空の全て","空港周辺の全て"],a:0,e:"高層構造物の周辺は航空機の飛行が想定されないため、構造物から30m以内は150m以上でも禁止空域から除外される。",ref:"教則 第3章 3.1.2 150m以上の例外（p.13）"},
  {cat:1,lvl:"common",q:"緊急用務空域における無人航空機の飛行について正しいものはどれか。",o:["許可・承認を受けていても飛行させてはならない","国土交通大臣の許可を受ければ飛行できる","高度50m以下に限り飛行できる","リモートIDを備えれば飛行できる"],a:0,e:"緊急用務空域（消防・救助等の緊急用務航空機が活動する空域）は、たとえ許可・承認を受けていても飛行禁止。当該空域では飛行を中止する。",ref:"教則 第3章 3.1.1 緊急用務空域（p.7）"},
  {cat:1,lvl:"common",q:"型式認証と機体認証の関係として正しいものはどれか。",o:["型式認証は設計・製造過程の基準適合を認証し、量産機の機体認証手続きの一部が省略できる","型式認証は個々の機体ごとに受ける","機体認証を受ければ型式認証は不要になる","両制度は名称が違うだけで同一である"],a:0,e:"型式認証（第一種・第二種）は設計・製造過程が基準に適合することを認証する制度。型式認証機は個々の機体認証手続きの一部を省略できる。",ref:"教則 第3章 3.1.1 型式認証（p.7）"},
  {cat:1,lvl:"common",q:"無人航空機操縦者技能証明に付される限定として正しいものはどれか。",o:["機体の種類や昼間・目視内などの飛行の方法について限定が付され、限定変更で解除できる","限定は付されず全ての飛行ができる","年齢の限定のみが付される","居住する都道府県の限定が付される"],a:0,e:"技能証明には機体の種類（回転翼・飛行機等）や飛行の方法（昼間限定・目視内限定、25kg未満限定等）の限定が付され、限定変更により解除できる。",ref:"教則 第3章 3.1.1 技能証明の限定（p.7）"},
  {cat:1,lvl:"common",q:"機体への登録記号の表示について正しいものはどれか。",o:["最大離陸重量25kg以上は25mm以上、25kg未満は3mm以上の文字高さで表示する","重量に関わらず文字高さ10mm以上とする","25kg以上は3mm・未満は25mm以上とする","表示は任意で大きさの規定はない"],a:0,e:"登録記号は鮮明に表示し、最大離陸重量25kg以上の機体は文字高さ25mm以上、25kg未満は3mm以上とされる。",ref:"教則 第3章 3.1.2 登録記号の表示（p.13）"},
  {cat:1,lvl:"common",q:"空域に関する「許可」と飛行の方法に関する「承認」の区別として正しいものはどれか。",o:["飛行禁止空域での飛行は許可、夜間や目視外などの飛行の方法は承認が必要","空域は承認・方法は許可である","両方とも『許可』と呼ぶ","両方とも『承認』と呼ぶ"],a:0,e:"飛行禁止空域での飛行には『許可』、夜間・目視外・距離・催し上空等の飛行の方法には『承認』が必要。両方に該当すれば両方を得る。",ref:"教則 第3章 3.1.1 許可と承認（p.7）"},
  {cat:1,lvl:"common",q:"小型無人機等飛行禁止法における飛行禁止の範囲として正しいものはどれか。",o:["重要施設の敷地・区域上空（レッドゾーン）と、その周囲おおむね300mの上空（イエローゾーン）","重要施設の真上のみが禁止される","施設から半径10m以内のみ禁止される","全国一律で上空が禁止される"],a:0,e:"小型無人機等飛行禁止法は、国会議事堂等の重要施設の敷地・区域上空（レッドゾーン）及びその周囲おおむね300mの周辺地域上空（イエローゾーン）での飛行を禁止する。",ref:"教則 第3章 3.2.1 小型無人機等飛行禁止法（レッド・イエローゾーン）（p.29）"},
  {cat:1,lvl:"common",q:"リモートID機能の搭載が免除される場合の組合せとして正しいものはどれか。",o:["事前登録機体・30m以内の係留・届出済み特定区域・警察等の秘匿業務","事前登録機体・30m以内の係留・屋内飛行・趣味飛行","100g未満の機体・夜間飛行・補助者配置","届出済み特定区域・目視内飛行・DID外飛行"],a:0,e:"リモートID搭載免除は、事前登録（2022年6月19日まで）機体、30m以内の係留飛行、届出済みの特定区域、警察・海保等の秘匿業務の4類型に限られる。屋内・趣味・目視内などは免除事由ではない。",ref:"教則 第3章 3.1.2 リモートID機能の搭載の義務（p.13）"},
  {cat:1,lvl:"one",q:"〔一等〕カテゴリーⅢ飛行の適切な管理と申請について、最も適切なものを１つ選べ。",o:["二等無人航空機操縦士の技能証明と第二種機体認証があれば、カテゴリーⅢ飛行を行うことができる。","カテゴリーⅢ飛行の申請は、飛行開始予定日の10開庁日前までに国土交通省航空局に提出する必要がある。","一等技能証明、第一種機体認証があれば、カテゴリーⅢ飛行では許可申請は不要である。","カテゴリーⅢ飛行の申請は、飛行開始予定日の20開庁日前までに国土交通省航空局に提出する必要がある。"],a:3,e:"カテゴリーⅢ飛行を行う場合には、一等無人航空機操縦士の技能証明を受けた者が第一種機体認証を受けた無人航空機を飛行させることに加え、運航の管理が適切に行われることについて国土交通大臣の許可・承認を受ける必要があります。また、リスク分析と評価に基づいた非常時の対処方針や緊急着陸場所の設定などのリスク軽減策を含めた飛行マニュアルの提出も必要です。申請は、飛行開始予定日の20開庁日前までに提出しなければなりません。",ref:"教則 第3章 航空法全般（カテゴリーⅢ飛行の許可・承認手続）"},
];
// ---- 第4章 システム（53問） ----
const Q_SYSTEM = [
  {cat:2,lvl:"common",q:"無人航空機の種類と特性について、最も適切なものを１つ選べ。",o:["飛行機は回転翼航空機に比べ、飛行速度が速く、エネルギー効率が高いため、長距離・長時間の飛行が可能である。パワードリフト機は最大離陸重量25kg以上のペイロードの大きい飛行機のことを指す。","回転翼航空機（マルチローター、ヘリコプター）は飛行機に比べ、長距離・長時間の飛行が可能で、飛行機は垂直離着陸やホバリングが可能、パワードリフト機は両者の特性を組み合わせたものである。","回転翼航空機（マルチローター、ヘリコプター）は垂直離着陸やホバリングが可能で、飛行機は速度とエネルギー効率に優れ長距離・長時間の飛行が可能、パワードリフト機は両者の特性を組み合わせたものである。","パワードリフト機は垂直離着陸やホバリングが可能で、回転翼航空機（マルチローター、ヘリコプター）は長距離・長時間の飛行に優れ、飛行機は両者の特性を組み合わせたものである。"],a:2,e:"無人航空機には回転翼航空機（マルチローター、ヘリコプター）、飛行機、パワードリフト機などがあります。回転翼航空機は垂直離着陸やホバリングが可能という特徴があります。飛行機は垂直離着陸やホバリングはできませんが、回転翼航空機に比べて飛行速度が速く、エネルギー効率が高いため、長距離・長時間の飛行が可能です。パワードリフト機は、回転翼航空機のように垂直離着陸が可能で、巡航中は飛行機のように前進飛行が可能な、両方の特徴を組み合わせた機体です。",ref:"教則 第4章 4.1.1 無人航空機の種類と特徴"},
  {cat:2,lvl:"common",q:"飛行機の飛行特性について、正しいものを１つ選べ。",o:["飛行機は回転翼航空機に比べてエネルギー効率が低く、長距離・長時間の飛行には適さない。","安全に飛行できる最低速度が決められており、それ未満での低速飛行ができない。","飛行中に故障等により推力を失った場合、すぐに墜落してしまうため、高い操縦技術が必要となる。","横方向の移動はバンクターン（旋回）で行うが、姿勢安定装置を使用しない場合はバンクターンの操作はラダーのみで行う。"],a:1,e:"飛行機は高速飛行、長時間飛行、長距離飛行が可能であり、エネルギー効率が高いという特性があります。一方、低速飛行や垂直離着陸はできず、離着陸に広い範囲を必要とします。また、飛行機は滑空できるため、突然のエンジン停止などで推力を失ってもすぐには墜落しません。一般に、安全に飛行できる最低速度が決められており、それ未満での低速飛行はできません。横方向の移動はバンクターン（旋回）で行いますが、姿勢安定装置を使用しない場合、バンクターンの操作はエルロンとエレベーターの複合操作となります。",ref:"教則 第4章 4.1.2 飛行機"},
  {cat:2,lvl:"common",q:"大型機(飛行機)の特性について、適切ではないものを１つ選べ。",o:["大型機は慣性力が大きいことから、増速・減速・上昇・降下などに要する時間と距離が長くなる。","大型機は一般に小型の機体よりも騒音が大きいため、飛行ルート周囲への配慮が必要となる。","大型機はペイロードが大きいが、機体が大きい分、風の影響をより受けやすくなる。","大型機（最大離陸重量 25kg 以上）はペイロードを大きくすることができ、ガソリンエンジンなど推進動力の選択肢も広がるのでより長距離・長時間飛行も可能となる。"],a:2,e:"大型機はその大きさからペイロードが大きく、長距離・長時間飛行が可能であり、また風の影響を受けにくいという特性を持っています。その反面、事故発生時の影響が大きいため、操縦者の習熟度及び安全意識が十分に高くなければなりません。さらに、大型機は機体の慣性力が大きいため、増速・減速・上昇・降下に要する時間と距離が長くなり、障害物回避や緊急着陸地点の選定には特に注意が必要です。また、大型機は一般に小型の機体よりも騒音が大きいため、飛行ルート周囲への配慮も必要とされています。",ref:"教則 第4章 4.1.2 飛行機（大型機）"},
  {cat:2,lvl:"common",q:"回転翼航空機（ヘリコプター）の特性について、適切ではないものを１つ選べ。",o:["回転翼航空機（ヘリコプター）は垂直離着陸やホバリングが可能であるが、これには大きなエネルギー消費がともなう。","回転翼航空機(マルチローター)と比較して、回転翼航空機(ヘリコプター)は１組のローターで揚力を発生させるため、ローターの直径が大きく、空力的に効率良く揚力を発生させることができない。","ローターピッチ角を変えるために必要な機構として、スワッシュプレートがある。","ローターの反トルクを打ち消したり、向き（ヨー方向）を変える操縦に用いるのは、テールローターである。"],a:1,e:"回転翼航空機（ヘリコプター）は垂直離着陸やホバリングが可能である一方で、これには大きなエネルギー消費がともない、また風の影響を受けやすいという特性があります。ヘリコプター型の回転翼航空機は1組のローターで揚力を発生させるため、ローターの直径が大きくなり、空力的に効率良く揚力を得ることができます。さらに、ヘリコプターにはローターの回転面を傾けたり、ローターピッチ角を変えたりするための機構（スワッシュプレート等）や、ローターの反トルクを打ち消したり、向き（ヨー方向）を変える操縦に用いるテールローターが必要となります。これらの要素から、回転翼航空機（ヘリコプター）の構造は複雑と言えます。",ref:"教則 第4章 4.1.3 回転翼航空機（ヘリコプター）（p.35）"},
  {cat:2,lvl:"common",q:"回転翼航空機（ヘリコプター）の大型機に関する特性について、適切ではないものを１つ選べ。",o:["小型の機体と比較してエンジン騒音やローター騒音が大きくなる。","慣性力が大きいため、操縦時の機体挙動は早い。","大型機は事故発生時の影響が大きいことから、操縦者の習熟度及び安全意識が十分に高くなければならない。","ホバリングでは早めに操舵することが必要である。"],a:1,e:"回転翼航空機（ヘリコプター）では、最大離陸重量が25kg以上の大型機の場合、慣性力が大きくなるため、操舵時の機体挙動が遅れ気味になります。そのため、特に定点で位置を維持するホバリング時には早めに操舵する必要があります。また、一般的に大型の機体は小型の機体よりもエンジン騒音やローター騒音が大きくなるとされています。",ref:"教則 第4章 4.1.3 回転翼航空機（ヘリコプター）（大型機）（p.35）"},
  {cat:2,lvl:"common",q:"回転翼航空機（マルチローター）について、最も適切なものを１つ選べ。",o:["ローターピッチ角を変えるためのスワッシュプレートが付いている。","機体外周に配置された各ローターの回転数を調整することで、上昇・降下や前後左右移動、ホバリングや水平回転をさせることが出来る。","ローターの反トルクを打ち消すため、テールローターを装備している。","ローターの数が多いほどペイロードは増えるが、故障に対する耐性は低くなる。"],a:1,e:"回転翼航空機（マルチローター）は、機体外周に配置された複数のローターを高速回転させて飛行します。機体の姿勢や位置を安定させるためにフライトコントロールシステムを用いてローターの回転数を制御し、上昇・降下や前後左右移動、ホバリングや水平回転を行います。また、ローターの数が多いほど故障に対する耐性が向上し、積載可能重量（ペイロード）が増えるという特性もあります。なお、スワッシュプレートやテールローターは回転翼航空機（ヘリコプター）に必要な機構であり、マルチローターには不要です。",ref:"教則 第4章 4.1.4 回転翼航空機（マルチローター）（p.35）"},
  {cat:2,lvl:"common",q:"回転翼航空機（マルチローター）の最大離陸重量 25kg 以上の大型機の特徴について、不適切なものを１つ選べ。",o:["機体の対角寸法やローターのサイズやモーターパワーも大きくなり、飛行時の慣性力も増加し、上昇・降下や加減速などに要する時間と距離が長くなる。","小型機と比べ、飛行時機体から発せられる騒音が大きくなり周囲への影響範囲も広がる。","機体が大きくなることで、小型機と比べてペイロードを大きくすることができる。","機体の対角寸法やローターのサイズやモーターパワーが大きくなることで、揚力が大きくなり、上昇・降下や加減速などに要する時間と距離が短くなる。"],a:3,e:"回転翼航空機（マルチローター）の最大離陸重量25kg以上の大型機では、機体の対角寸法やローターのサイズ、モーターパワーも大きくなり、飛行時の慣性力も増加するため、上昇・降下や加減速などに要する時間と距離が長くなります。また、飛行時に機体から発せられる騒音も大きくなり、周囲への影響範囲も広がります。これらの特性を理解することは、大型機を適切に操縦するために必要です。",ref:"教則 第4章 4.1.4 回転翼航空機（マルチローター）（大型機）（p.35）"},
  {cat:2,lvl:"common",q:"無人航空機の夜間飛行における装備について、最も適切なものを１つ選べ。",o:["夜間飛行のため、無人航空機には姿勢と方向が正確に視認できる灯火を有することが求められるが、当該灯火を有していれば航空法に基づく夜間飛行の承認は不要である。","無人航空機の飛行範囲が照明等で十分照らされている場合であっても、機体には姿勢と方向が正確に視認できる灯火を有する必要がある。","無人航空機の夜間飛行においては、無人航空機の飛行範囲が照明等で十分照らされている場合は航空法に基づく夜間飛行の承認は不要である。","夜間飛行においては、ビジョンセンサーが正常に機能せず、姿勢が安定しにくくなる可能性がある。"],a:3,e:"夜間飛行のための装備として、無人航空機の姿勢及び方向が正確に視認できる灯火を有することが求められますが、無人航空機の飛行範囲が照明等で十分照らされている場合は、この限りではありません。ただし、いずれの場合も航空法に基づく夜間飛行の承認は必要です。また、ビジョンセンサーはカメラで撮影した画像を基にデータ処理するのが一般的で、夜間に対応していない場合は、衝突回避・姿勢安定などの安全機能が使用できない可能性があることに注意が必要です。",ref:"教則 第4章 4.2.1 夜間飛行の装備（p.36）"},
  {cat:2,lvl:"common",q:"無人航空機の夜間飛行について、最も適切なものを１つ選べ。",o:["夜間飛行のため、無人航空機は姿勢や方向が正確に視認できる灯火を有する必要があるが、無人航空機の飛行範囲が照明で十分照らされている場合は、この限りではない。","姿勢と方向が正確に視認できる灯火を有する無人航空機を用いた場合、離着陸地点、緊急着陸地点、飛行経路中の回避すべき障害物について視認するための地上照明は不要である。","夜間飛行の承認を受けていれば、無人航空機に姿勢や方向が視認できる灯火を装備する必要はない。","機体に搭載されたビジョンセンサーは、画像情報が不要なため、夜間時でも衝突回避・姿勢安定などの安全機能が動作する。"],a:0,e:"夜間飛行では機体の姿勢や進行方向が視認できないため、灯火を搭載した機体が必要です。ただし、無人航空機の飛行範囲が照明等で十分照らされている場合は、この限りではありません。その場合も、屋外で飛行させる場合は航空法に基づく夜間飛行の承認が必要であることに注意しましょう。また、操縦者の手元で位置、高度、速度等の情報が把握できる送信機を使用することが望ましいです。地形や人工物等の障害物も視認できないため、離着陸地点や計画的に用意する緊急着陸地点、飛行経路中の回避すべき障害物も視認できるように地上照明を当てる必要があります。さらに、機体に搭載されたビジョンセンサーはカメラで撮影した画像を基にデータ処理するのが一般的で、夜間に対応していない場合は、衝突回避・姿勢安定などの安全機能が使用できない可能性があることに注意が必要です。",ref:"教則 第4章 4.2.1 夜間飛行の装備（p.36）"},
  {cat:2,lvl:"common",q:"目視外飛行のために必要な装備について、最も適切なものを１つ選べ。",o:["目視外飛行において、自動操縦システムを装備していれば、機体の不具合状況を地上で把握できる操縦装置は不要である。","目視外飛行において、補助者を配置しない場合でも、機体の針路、姿勢、高度、速度及び周辺の気象状況等を把握できる操縦装置までは求められない。","目視外飛行において、補助者を配置していれば、機体カメラの装備は不要となる。","目視外飛行において、補助者を配置していても、不具合発生時に対応する危機回避機能（フェールセーフ機能）は必要である。"],a:3,e:"目視外飛行では、補助者の有無に関わらず、自動操縦システム、機体に搭載したカメラ、不具合状況を地上で監視できる操縦装置、不具合発生時に対応する危機回避機能（フェールセーフ機能）が必要です。これらは飛行中の安全性を確保するために必須の装備です。また、補助者を配置しない場合に追加で必要となる装備として、機体の針路、姿勢、高度、速度及び周辺の気象状況等を把握できる操縦装置等が挙げられます。",ref:"教則 第4章 4.2.2 目視外飛行の装備（p.37）"},
  {cat:2,lvl:"common",q:"以下の選択肢のうち、無人航空機の物件投下装置について、最も適切なものを１つ選べ。",o:["物件投下装置は、搭載位置や対象物が定められているため、投下装置の特性と機能を理解する必要性がある。","物件投下装置には搭載位置や対象とする物件の定めはないため、機体の任意の位置に取り付けて使用できる。","物件投下装置は、物件が揺れない構造となっているため、正しい取り付け位置であれば、飛行中の重心移動について考える必要性は低い。","物件投下用のウインチ機構で吊り下げることは、物件の揺れ、投下前後の重心の変化が著しいため行うべきではない。"],a:0,e:"無人航空機の物件投下装置は、搭載位置や対象とする物件が定められているため、装置の特性と機能を理解する必要があります。物件が揺れない構造となっているわけではなく、飛行中の重心移動を考慮した飛行が必要です。特に物件投下用のウインチ機構で吊り下げる場合は、物件の揺れや投下前後の重心の変化に注意が必要ですが、行うべきではないとは言えません。",ref:"教則 第4章 4.4.5 物件投下のために装備される機器"},
  {cat:2,lvl:"common",q:"揚力発生の特徴についての記述として、適切ではないものを1つ選べ。",o:["迎角を大きくすると揚力も大きくなるが、大きくしすぎると、空気の流れは翼の表面から剥離し、揚力は減じ、抗力が増大し、失速を招く。","上面の湾曲が下面より大きな翼型は、効率よく揚力を発生できる。","流れと垂直方向に作用する力を揚力といい、流れの方向に働く力を抗力という。","飛行機は失速状態になっても、急降下はしない。"],a:3,e:"流れと垂直方向に作用する力を揚力、流れの方向に働く力を抗力といいます。翼やプロペラが大きな迎角をもつと、流れは翼の表面から剥離し、揚力は減じ、抗力が増大し、失速を招くことがあります。飛行中の飛行機が失速状態に陥ると、機体は急降下を始めます。故障などによって飛行中に推力を失ってもすぐには墜落しないのは滑空飛行状態になった場合であり、失速状態では急降下します。上面の湾曲が下面より大きな翼型は、効率よく揚力を発生できるため、翼型やローター断面に利用されます。",ref:"教則 第4章 4.3.1 無人航空機の飛行原理"},
  {cat:2,lvl:"common",q:"無人航空機の飛行に関する記述の中から、最も適切なものを１つ選べ。",o:["飛行機は基本的に、ピッチを変化させるための舵が「水平尾翼にあるエレベーター」、ロールを変化させるための舵が「主翼にあるエルロン」、ヨーを変化させる舵が「垂直尾翼にあるラダー」である。","機体の前後・上下を含む面に空気流入の向きを投影したときに、前後軸とのなす角を迎角といい、上方から空気が流入するときに迎角は正である。","飛行機は基本的に、ロールを変化させるための舵が「垂直尾翼にあるラダー」、ヨーを変化させるための舵が「主翼にあるエルロン」である。","機体の前後・上下を含む面と空気流入の向きの面のなす角を横滑り角といい、機体左側から空気流入するときに横滑り角は正である。"],a:0,e:"飛行機の姿勢は、機首を上げ下げするピッチ、機体を左右に傾けるロール、機体の左右の回転を示すヨーの角度で表現され、これらの角度を変化させることで飛行速度の向きを制御できます。飛行機は基本的に、ピッチを変化させるための舵が「水平尾翼にあるエレベーター」、ロールを変化させるための舵が「主翼にあるエルロン」、ヨーを変化させる舵が「垂直尾翼にあるラダー」です。機体の前後・上下を含む面に空気流入の向きを投影したときに前後軸とのなす角を迎角といい、「下方」から空気が流入するときに迎角は正です。機体の前後・上下を含む面と空気流入の向きのなす角を横滑り角といい、機体「右」側から空気が流入するときに横滑り角は正です。",ref:"教則 第4章 4.3.1 無人航空機の飛行原理"},
  {cat:2,lvl:"common",q:"回転翼航空機のローターの特徴について、もっとも適切なものを1つ選べ。",o:["マルチローターのブレードのピッチ角は固定であるため、各プロペラの回転数を変化させ、ピッチ、ロール、ヨーの運動を行う。","プロペラの回転により機体には反トルクが作用するが、マルチローターは１つのプロペラを異なる向きに回転させることで、反トルクを相殺する。","ヘリコプターはブレードのピッチ角を固定し、プロペラの回転数を変化させてピッチ、ロールの制御を行い、テールローターの回転数を変化させてヨーの制御を行う。","マルチローターはブレードのピッチ角を周期的に変化させる可変ピッチ機構を持ち、プロペラの回転数を一定に保ったままピッチ、ロール、ヨーの運動を行う。"],a:0,e:"プロペラの回転により機体には反トルクが作用しますが、マルチローターは偶数個のプロペラを半数ずつ異なる向きに回転させることで反トルクを相殺します。マルチローターのブレードのピッチ角は固定であるため、各プロペラの回転数を変化させてピッチ、ロール、ヨーの運動を行います。ヘリコプターのメインローターは1回転する間にブレードのピッチ角を周期的に変化させる可変ピッチ機構を持ち、ピッチ角を変化させることでピッチ、ロールの制御を行い、テールローターの回転数を変化させてヨーの制御を行います。",ref:"教則 第4章 4.3.1 無人航空機の飛行原理"},
  {cat:2,lvl:"common",q:"回転翼航空機（マルチローター）について、その動きと関連する用語について、最も適切なものを１つ選べ。",o:["機体の前後左右移動は、指示した側のローターの回転数を上げ、反対側のローター回転数を下げることで機体が指示した方向に傾き、指示した方向に機体が移動する。","ホバリング状態からローターの回転数を上げると、機体は降下する。","右もしくは左回転を指示すると、指示した回転方向のローターの回転数が上がりトルクバランスが崩れ、指示した方向の回転が始まる。","機体に備わる全てのローターを回転させ回転数を増加させていくと、上昇し始める。"],a:3,e:"機体に備わる全てのローターを回転させ回転数を増加させ、機体重量以上の揚力を得ると上昇し始めます。機体重量と揚力が釣り合い、対地高度が安定した状態を継続するとホバリングとなり、ホバリング状態からローター回転数を下げると降下します。前後左右移動は、指示した側のローターの回転数を下げ、反対側のローター回転数を上げることで機体が傾き、ローター推力の合力が指示した方向に傾くので、傾いた方向に機体が移動します。水平回転は、揚力を得ている状態で右もしくは左回転を指示すると、指示した回転方向のローターの回転数が下がってトルクバランスが崩れることで始まります。",ref:"教則 第4章 4.3.1 無人航空機の飛行原理"},
  {cat:2,lvl:"common",q:"無人航空機におけるペイロードの積載とその影響について、不適切なものを1つ選べ。",o:["ペイロードの有無によって機体の重心位置が著しく変化しないよう注意が必要である。","飛行機については、離着陸エリアの広さによってもペイロードが制限される可能性がある。","ペイロードの最大積載量とペイロード搭載時の飛行性能は取扱説明書に記載されていても、飛行高度、大気状態によって異なることがある。","機体に安全に飛行できるペイロードの最大積載量が定められている場合、機体重量が変化しても航空機の飛行特性は変化しにくい。"],a:3,e:"無人航空機では、ペイロードが飛行特性に大きく影響を及ぼします。特に機体の重心位置の変化は飛行特性に大きな影響を及ぼすため、ペイロードの有無によって重心位置が著しく変化しないよう注意が必要です。ペイロードの最大積載量と搭載時の飛行性能は、飛行高度や大気状態、離着陸エリアの広さによっても異なり、機体重量が変化すると航空機の飛行特性（安定性、飛行性能、運動性能）は変化します。また、飛行機は垂直に離着陸できないため滑走路が必要であり、機体重量が大きいと長い滑走距離が必要となります。そのため性能上は搭載できても、離着陸エリアが狭い場合はペイロードを調整する必要があります。",ref:"教則 第4章 4.3.3 無人航空機へのペイロード搭載"},
  {cat:2,lvl:"common",q:"以下の選択肢から、送信機から無人航空機への指令の流れに関する最も適切なものを１つ選べ。",o:["遅延を無くすため、送信機からの指令は、直接モーターなどに送られる。","送信機からの指令は、機体メインコントローラー→機体受信機→モーター等の順で送られる。","送信機からの指令は、機体受信機→機体メインコントローラー→モーター等の順で送られる。","送信機側の部品であるメインコントローラーからの指令を、機体の受信機で受け取り、モーターなどを駆動させて機体を操縦する。"],a:2,e:"無人航空機への指令は送信機から送られ、機体の受信機がこれを受け取ります。受信機からの情報は機体に装備されているメインコントローラーへと送られ、モーターなどが駆動されます。これにより機体の操縦が可能となります。この一連の流れは、無人航空機の基本的な操作システムです。",ref:"教則 第4章 4.4.2 無人航空機の主たる構成要素"},
  {cat:2,lvl:"common",q:"以下の無人航空機のモーターやESC（エレクトロニックスピードコントローラー）に関する説明の中から、最も適切なものを１つ選べ。",o:["ESCは機体側に取り付けられている部品で、モーターの回転数を制御し、ローターの回転数を増減させることで揚力や推力を調整している。","ESCはバッテリーの残量を監視するためのデバイスであり、モーターの回転数の制御には関与しない。","ESCは操縦機側に取り付けられている部品で、モーターの回転数を制御し、ローターの回転数を増減させることで揚力や推力を調整している。","ESCは操縦機側に取り付けられている部品で、モーターの回転数を一定に保つためのデバイスであり、揚力や推力の調整には直接的な影響を与えない。"],a:0,e:"無人航空機の飛行には揚力と推力の微妙な調整が求められ、これにはモーターの回転数の制御が重要となります。ESC（エレクトロニックスピードコントローラー）はモーターの回転数を制御するためのデバイスで、モーターで駆動されたローターの回転数を増減させることにより揚力や推力を変化させています。なお、ESCは機体側に取り付けられている部品です。",ref:"教則 第4章 4.4.2 無人航空機の主たる構成要素"},
  {cat:2,lvl:"common",q:"以下の選択肢のうち、送信機のモードについて正しく説明しているものを１つ選べ。",o:["回転翼航空機の上昇下降は、モード1のとき右スティックの上下操作、モード2のとき左スティックの上下操作である。","回転翼航空機の左右移動は、モード1のとき右スティックの左右操作、モード2のとき左スティックの左右操作である。","回転翼航空機の前後移動は、モード1のとき右スティックの上下操作、モード2のとき左スティックの上下操作である。","回転翼航空機の左右旋回は、モード1のとき右スティックの左右操作、モード2のとき左スティックの左右操作である。"],a:0,e:"左右旋回（左スティックの左右操作）と左右移動（右スティックの左右操作）は、モード1、モード2どちらも共通です。一方、上昇下降と前後移動はモードによってスティックが反対になります。上昇下降はモード1では右スティックの上下操作、モード2では左スティックの上下操作、前後移動はモード1では左スティックの上下操作、モード2では右スティックの上下操作です。",ref:"教則 第4章 操縦装置（送信機のモード）"},
  {cat:2,lvl:"common",q:"以下の選択肢から、無人航空機の操作について正しく説明しているものを１つ選べ。",o:["マルチローターの操作では、上下操作をエレベーター、前後移動操作をスロットル、左右移動操作をエルロン、左右旋回操作をラダーという。","マルチローターの操作では、上下操作をラダー、前後移動操作をエルロン、左右移動操作をエレベーター、左右旋回操作をスロットルという。","回転翼航空機の操作では、上下操作をスロットル、前後移動操作をエレベーター、左右移動操作をエルロン、左右旋回操作をラダーという。","マルチローターの操作では、上下操作をエレベーター、前後移動操作をスロットル、左右移動操作をラダー、左右旋回操作をエルロンという。"],a:2,e:"マルチローター（回転翼航空機）の操作では、上下操作をスロットル、前後移動操作をエレベーター、左右移動操作をエルロン、左右旋回操作をラダーといいます。",ref:"教則 第4章 4.4.3 送信機"},
  {cat:2,lvl:"common",q:"以下の選択肢のうち、送信機のアンテナから発射される電波について、最も適切なものを1つ選べ。",o:["アンテナの角度は調整できるので、操縦時の送信機の持ち方や無人航空機の位置を考慮して最適なアンテナ角度を設定する必要がある。","送信機のアンテナ角度を調整すると、無人航空機の飛行速度や高度に影響を与える。","送信機のアンテナから発射される電波の強さは、方向により異なることはない。","送信機のアンテナは、その先端を無人航空機に向けたときに最も強い電波を発射する。"],a:0,e:"送信機のアンテナから発射される電波の強さは、方向により異なります。そのため、操縦時の送信機の持ち方や無人航空機の位置を考慮して、最適なアンテナ角度を設定する必要があります。アンテナの角度が無人航空機の飛行速度や高度に直接影響を与えることはありません。",ref:"教則 第4章 4.3 機体の構成（送信機）"},
  {cat:2,lvl:"common",q:"以下の選択肢から、無人航空機の機体の動力源に関する特徴について正しく説明しているものを１つ選べ。",o:["電動機のメリットは振動や騒音が少なく軽量化が可能で、飛行時間が長いという特徴がある。一方、エンジン機は飛行時間が短く、騒音が大きいというデメリットがある。","電動機のメリットは振動や騒音が少なく軽量化が可能だが、飛行時間が短いというデメリットがある。一方、エンジン機のメリットは飛行時間が長く長距離飛行が可能だが、騒音が大きいというデメリットがある。","エンジン機のメリットは振動や騒音が少なく軽量化が可能で、飛行時間が長いという特徴がある。一方、電動機は騒音が大きく、飛行時間が短いというデメリットがある。","エンジン機のメリットは、振動や騒音が少なく軽量化が可能だが、飛行時間が短いというデメリットがある。一方、電動機は飛行時間が長く長距離飛行が可能だが、騒音が大きいというデメリットがある。"],a:1,e:"無人航空機の動力源として主に用いられる電動機とエンジン機は、それぞれ異なる特性を持っています。電動機は振動や騒音が少なく軽量化が可能ですが、飛行時間が短いというデメリットがあります。エンジン機は飛行時間が長く長距離飛行が可能ですが、騒音が電動機に比べて大きいというデメリットがあります。それぞれの特性を理解し、目的に応じて最適な動力源を選択することが重要です。",ref:"教則 第4章 機体の特徴（動力源）"},
  {cat:2,lvl:"common",q:"以下の選択肢から、エンジン機について最も適切なものを１つ選べ。",o:["エンジン機の燃料に種類はなく、すべてガソリンを使用している。","エンジン機は、エンジンの回転を動力にローターを回転させ揚力と推力を得ている。","エンジンの種類により、潤滑方式、着火温度は異なるが、燃焼サイクルは一定である。","オイル等を混ぜた混合燃料を使用する場合、オイルとの混合比は任意に変えてよい。"],a:1,e:"エンジン機は、エンジンの回転を動力にローターを回転させ、揚力と推力を得る仕組みです。エンジンにはガソリンエンジン、ディーゼルエンジン、ジェットエンジン、グローエンジンなどの種類があり、それぞれ潤滑方式、燃焼サイクル、着火温度などが異なります。そのため、各エンジンに対応した燃料を適切に扱う必要があり、オイル等を混ぜた混合燃料を使用する場合は、指定された混合比で使用することが必要です。",ref:"教則 第4章 4.3 機体の構成（機体の動力源）"},
  {cat:2,lvl:"common",q:"無人航空機のバッテリーについて、適切ではないものを１つ選べ。",o:["１セル当たりの電圧が3.7Vのバッテリーを4セルで構成した場合、そのバッテリーの電圧は14.8Vとなる。","電圧降下は抵抗(Ω)×電流(A)で計算される。","バッテリーの電圧は、セル当たりの電圧とセル数で決まる。","１セル当たりの電圧が3.7Vのとき、複数セルで構成されるバッテリーでもオームの法則より電圧は変わらない。"],a:3,e:"バッテリーの電圧は、セル当たりの電圧（リチウムポリマーバッテリーなら3.7V）とセル数で決まります。電圧降下は抵抗（Ω）×電流（A）で計算されます。１セル当たりの電圧が3.7Vのとき、4セルで構成されるバッテリーの場合は3.7V×4＝14.8Vがそのバッテリーの電圧となります。",ref:"教則 第4章 4.3 機体の構成（バッテリー）"},
  {cat:2,lvl:"common",q:"以下の無人航空機で使われる電気・電子用語の説明の中から、適切ではないものを１つ選べ。",o:["電圧降下は、抵抗（R）×電流（A）で計算され、電池の残量が減ると電池の電圧は下がる。","容量(Ah)は、電流（A）×時間（h）で計算され、満充電から終止電圧になるまでに使用できる仕事量(出力)の総量を表す。","容量（Ah）は、満充電から終止電圧になるまでの間に使用できる電気量の総量を表す。","出力は、放電時電圧（V）×電流（A）で計算され、出力が一定の場合、電池残量が少なくなると、放電時電圧が低下するため、電流は増大する。"],a:1,e:"電圧降下は抵抗（R）×電流（A）で計算され、電池の残量が減ると、電池の電圧も下がります。出力は放電時電圧（V）×電流（A）で求められ、単位時間当たりのエネルギー量を表します。容量（Ah）は電流（A）×時間（h）で求められ、満充電から、電圧が決められた最低電圧（終止電圧）になるまでの間に利用できる「電気量」を示すものであり、仕事量（出力）の総量ではありません。",ref:"教則 第4章 4.3 機体の構成（バッテリー）"},
  {cat:2,lvl:"common",q:"以下の選択肢から、リチウムポリマーバッテリーの特性について適切ではないものを１つ選べ。",o:["リチウムポリマーバッテリーはエネルギー密度が高く、自己放電が少ない。","リチウムポリマーバッテリーの電解質は不燃物である。","リチウムポリマーバッテリーは見かけの放電容量が減少する現象が起きにくい。","リチウムポリマーバッテリーはゲル状のポリマー電解質を有したバッテリーである。"],a:1,e:"リチウムポリマーバッテリーはゲル状のポリマー電解質を採用したバッテリーで、無人航空機の電源として多く使用されています。エネルギー密度が高い、電圧が高い、自己放電が少ない、メモリ効果（継ぎ足し充電などで浅い充放電を行った場合に見かけの放電容量が減少する現象）が小さいという特性があります。一方、電解質は可燃物であるため、取り扱いには注意が必要です。",ref:"教則 第4章 機体の構成（リチウムポリマーバッテリー）"},
  {cat:2,lvl:"common",q:"以下の選択肢のうち、リチウムポリマーバッテリーの取り扱いについて最も適切ではないものを１つ選べ。",o:["複数のセルで構成されたリチウムポリマーバッテリーは、セル間の充電量のバランスを補正しながら充電することが重要である。","セル間の充電量のバランスが著しく崩れたまま充電を行うと、一部のセルが過放電状態となり、バッテリー全体の劣化が進む。","複数のセルで構成されたリチウムポリマーバッテリーは、効率的な放電のため、セル間の電圧差を生じさせるように充電することが重要である。","バランスコネクタがついているものは、充電時にそのコネクタを充電器へ接続することが重要である。"],a:2,e:"リチウムポリマーバッテリーは複数のセルで構成されており、各セルの充電量のバランスを適切に保つことが重要です。バランスが著しく崩れたまま充電を行うと、セル間の電圧差により一部のセルが過放電状態になり、バッテリー全体の劣化が進みます。そのため、バランスコネクタを装備したバッテリーでは、充電時にこのコネクタを充電器に接続し、セル間のバランスを補正しながら充電することが推奨されています。セル間の電圧差を生じさせるように充電するのは誤りです。",ref:"教則 第4章 無人航空機のシステム（バッテリーの取扱い）"},
  {cat:2,lvl:"common",q:"以下の選択肢から、リチウムポリマーバッテリーの取り扱い上の注意点について正しく説明しているものを１つ選べ。",o:["リチウムポリマーバッテリーは、強い衝撃に対して耐性があり、衝撃により発火する可能性は低い。","リチウムポリマーバッテリーは、過放電や過充電を行っても劣化することはない。","バッテリーのコネクタの端子が短絡した場合、発火する可能性がある。","リチウムポリマーバッテリーは充電が進むとガスを発生させ膨らむが、これは通常の現象である。"],a:2,e:"リチウムポリマーバッテリーの取り扱い上、注意が必要な点としては、過放電や過充電、バッテリーへの強い衝撃、コネクタの端子の短絡が挙げられます。これらの状況が発生すると、バッテリーの劣化が進行し、寿命が短くなる可能性があります。また、内部でガスが発生し、バッテリーが膨らむ原因となることもあります。さらに、発火する可能性もあるため、取り扱いには十分な注意が必要です。",ref:"教則 第4章 4.3 機体の構成（バッテリー）"},
  {cat:2,lvl:"common",q:"以下の選択肢のうち、電波の性質について正しく説明しているものを1つ選べ。",o:["電波の電力密度は、進行距離の2乗に比例して増加する。","電波は２つの異なる媒質間を進行するとき、反射や屈折が起こり、常に入射角と反射角の大きさは等しくなる。","電波は高周波数であるほど、障害物をより回り込むことができる。","干渉とは、2 つ以上の波が重なり弱め合うことを指し、強め合うことについては干渉とは言わない。"],a:1,e:"電波は進行方向に障害物が無い場合には直進し、２つの異なる媒質間を進行するときには反射や屈折が起こります。その際、常に反射の法則（入射角と反射角の大きさは等しい）が成り立ちます。周波数が低い（波長が長い）ほど、障害物をより回り込むことができる回折の性質を持ちます。また、2つ以上の波が重なると強め合ったり弱め合ったりする干渉の特性を持ち、電波の電力密度は進行距離の2乗に反比例して減少します。",ref:"教則 第4章 4.4 機体以外の要素技術（電波）"},
