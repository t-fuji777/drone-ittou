<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>一等学科試験 暗記マスター</title>
<meta name="description" content="一等無人航空機操縦士 学科試験の暗記アプリ（教則第4版準拠・必勝計算5公式）">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0e1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="一等学科">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Bebas+Neue&display=swap');

  :root{
    --bg:#0a0e1a;
    --panel:#121829;
    --panel2:#1a2238;
    --line:#26304d;
    --ink:#e8ecf6;
    --sub:#8b97b8;
    --acc:#3dd6c4;
    --acc2:#ffb627;
    --bad:#ff5d6c;
    --good:#3ddc84;
    --hot:#ff7a45;
    --shadow:0 10px 40px rgba(0,0,0,.5);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%}
  /* PWAでホームバー領域(下部セーフエリア)がナビ色で埋まるようにする */
  html{background:#121829}
  body{
    font-family:'Zen Kaku Gothic New',sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(61,214,196,.10), transparent 60%),
      radial-gradient(1000px 500px at -10% 110%, rgba(255,182,39,.07), transparent 55%),
      var(--bg);
    color:var(--ink);
    overflow:hidden;
    height:100dvh;
    display:flex;flex-direction:column;
  }
  #app{position:fixed;top:0;bottom:0;left:0;right:0;height:100%;display:flex;flex-direction:column;max-width:480px;width:100%;margin:0 auto;overflow:hidden}

  /* ---------- Header ---------- */
  header{
    padding:calc(16px + env(safe-area-inset-top)) 18px 16px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,rgba(18,24,41,.9),rgba(18,24,41,.4));
    backdrop-filter:blur(8px);
    position:relative;z-index:5;
  }
  .h-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .logo{display:flex;align-items:center;gap:10px}
  .logo .mark{
    width:36px;height:36px;border-radius:9px;
    object-fit:cover;
    box-shadow:0 4px 14px rgba(0,0,0,.5);
  }
  .logo h1{font-size:15px;font-weight:900;letter-spacing:.02em;line-height:1.15}
  .logo .sub{font-size:10.5px;color:var(--sub);font-weight:500;margin-top:1px}
  .streak{
    font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--acc2);
    border:1px solid rgba(255,182,39,.35);border-radius:20px;padding:4px 11px;
    display:flex;align-items:center;gap:5px;letter-spacing:.06em;
  }
  .progbar{height:5px;background:var(--panel2);border-radius:4px;margin-top:12px;overflow:hidden}
  .progbar > i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:4px;width:0;transition:width .5s cubic-bezier(.4,0,.2,1)}
  .prog-label{display:flex;justify-content:space-between;font-size:10.5px;color:var(--sub);margin-top:6px;font-weight:500}

  /* ---------- Scroll body ---------- */
  main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:30px 16px calc(70px + env(safe-area-inset-bottom))}
  main::-webkit-scrollbar{width:0}

  .screen{animation:fade .3s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* ---------- Home cat cards ---------- */
  .sec-title{font-size:12px;font-weight:700;color:var(--sub);letter-spacing:.08em;margin:6px 2px 12px;text-transform:uppercase}
  .cat{
    background:linear-gradient(135deg,var(--panel),var(--panel2));
    border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px;
    position:relative;overflow:hidden;cursor:pointer;transition:transform .15s, border-color .15s;
  }
  .cat:active{transform:scale(.985)}
  .cat .row{display:flex;align-items:center;gap:13px}
  .cat .ic{
    width:46px;height:46px;border-radius:13px;flex:none;display:grid;place-items:center;font-size:22px;
    background:rgba(61,214,196,.12);border:1px solid rgba(61,214,196,.25);
  }
  .cat.c1 .ic{background:rgba(255,93,108,.12);border-color:rgba(255,93,108,.3)}
  .cat.c2 .ic{background:rgba(61,214,196,.12);border-color:rgba(61,214,196,.3)}
  .cat.c3 .ic{background:rgba(255,182,39,.12);border-color:rgba(255,182,39,.3)}
  .cat.c4 .ic{background:rgba(124,140,255,.12);border-color:rgba(124,140,255,.3)}
  .cat.c5 .ic{background:rgba(255,122,69,.14);border-color:rgba(255,122,69,.35)}
  .cat .meta{flex:1;min-width:0}
  .cat .meta b{font-size:14.5px;font-weight:700;display:block;line-height:1.3}
  .cat .meta span{font-size:11.5px;color:var(--sub);font-weight:500}
  .cat .cprog{margin-top:12px}
  .cat .cprog .bar{height:4px;background:rgba(0,0,0,.3);border-radius:3px;overflow:hidden}
  .cat .cprog .bar i{display:block;height:100%;border-radius:3px;width:0;transition:width .5s}
  .cat.c1 .cprog .bar i{background:var(--bad)}
  .cat.c2 .cprog .bar i{background:var(--acc)}
  .cat.c3 .cprog .bar i{background:var(--acc2)}
  .cat.c4 .cprog .bar i{background:#7c8cff}
  .cat.c5 .cprog .bar i{background:var(--hot)}
  .cat .cprog .t{font-size:10px;color:var(--sub);margin-top:5px;display:flex;justify-content:space-between}
  .badge1{position:absolute;top:11px;right:11px;font-size:9px;font-weight:900;letter-spacing:.05em;
    background:var(--bad);color:#fff;padding:3px 7px;border-radius:6px}

  /* ---------- Mode buttons ---------- */
  .modes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
  .mode-btn{
    border:1px solid var(--line);background:var(--panel);border-radius:14px;padding:14px 12px;text-align:left;
    cursor:pointer;transition:transform .12s,border-color .15s;color:var(--ink);
  }
  .mode-btn:active{transform:scale(.97)}
  .mode-btn .e{font-size:20px;display:block;margin-bottom:7px}
  .mode-btn b{font-size:13px;font-weight:700;display:block}
  .mode-btn span{font-size:10.5px;color:var(--sub)}
  .mode-btn.full{grid-column:1/3;border-color:rgba(255,93,108,.4);background:linear-gradient(135deg,rgba(255,93,108,.1),var(--panel))}

  /* ---------- Quiz ---------- */
  .qhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px}
  .qcount{font-family:'Bebas Neue';font-size:20px;letter-spacing:.05em;color:var(--ink)}
  .qcount small{color:var(--sub);font-size:13px}
  .qtag{font-size:10px;font-weight:700;padding:4px 9px;border-radius:7px;background:var(--panel2);color:var(--sub);border:1px solid var(--line)}
  .qtag.one{background:rgba(255,93,108,.15);color:#ff8a95;border-color:rgba(255,93,108,.3)}
  .qtimer{font-family:'Bebas Neue';font-size:17px;color:var(--acc);letter-spacing:.05em}
  .qmini-bar{height:4px;background:var(--panel2);border-radius:3px;overflow:hidden;margin-bottom:16px}
  .qmini-bar i{display:block;height:100%;background:var(--acc);transition:width .3s}

  .qcard{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:20px 18px;box-shadow:var(--shadow);margin-bottom:16px}
  .qnum{font-size:11px;color:var(--acc);font-weight:700;margin-bottom:9px;letter-spacing:.05em}
  .qtext{font-size:15.5px;font-weight:500;line-height:1.65;white-space:pre-wrap}
  .qtext .fml{display:block;background:var(--panel2);border:1px dashed var(--line);border-radius:9px;padding:10px 12px;margin:11px 0;font-size:13.5px;color:var(--acc2);font-family:'SF Mono','Menlo','Consolas','Courier New',monospace;letter-spacing:.02em;font-weight:600}

  .opts{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
  .opt{
    border:1.5px solid var(--line);background:var(--panel);border-radius:13px;padding:14px 15px;
    display:flex;align-items:flex-start;gap:11px;cursor:pointer;transition:all .15s;color:var(--ink);text-align:left;
    font-size:14px;line-height:1.5;font-weight:500;
  }
  .opt:active{transform:scale(.99)}
  .opt .k{width:22px;height:22px;border-radius:7px;background:var(--panel2);border:1px solid var(--line);
    display:grid;place-items:center;font-size:12px;font-weight:700;flex:none;color:var(--sub);margin-top:1px}
  .opt.sel{border-color:var(--acc);background:rgba(61,214,196,.08)}
  .opt.sel .k{background:var(--acc);color:#04141a;border-color:var(--acc)}
  .opt.correct{border-color:var(--good);background:rgba(61,220,132,.12)}
  .opt.correct .k{background:var(--good);color:#04140a;border-color:var(--good)}
  .opt.wrong{border-color:var(--bad);background:rgba(255,93,108,.1)}
  .opt.wrong .k{background:var(--bad);color:#fff;border-color:var(--bad)}
  .opt.disabled{pointer-events:none;opacity:.65}
  .opt.disabled.correct,.opt.disabled.wrong{opacity:1}

  .explain{border-radius:13px;padding:15px 16px;margin-bottom:14px;font-size:13px;line-height:1.65;animation:fade .3s;border:1px solid var(--line);background:var(--panel2)}
  .explain.ok{border-color:rgba(61,220,132,.4);background:rgba(61,220,132,.07)}
  .explain.ng{border-color:rgba(255,93,108,.4);background:rgba(255,93,108,.07)}
  .explain .res{font-weight:900;font-size:14px;margin-bottom:7px;display:flex;align-items:center;gap:7px}
  .explain.ok .res{color:var(--good)}
  .explain.ng .res{color:var(--bad)}
  .explain .body{color:var(--ink)}
  .explain .ref{margin-top:9px;font-size:10.5px;color:var(--sub);border-top:1px dashed var(--line);padding-top:8px}

  /* ---------- Flashcard ---------- */
  .flash{perspective:1600px;margin-bottom:16px}
  .flash-inner{position:relative;width:100%;min-height:420px;transition:transform .55s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
  .flash.flipped .flash-inner{transform:rotateY(180deg)}
  .flash-face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border:1px solid var(--line);border-radius:18px;padding:20px 18px 44px;display:flex;flex-direction:column;
    justify-content:flex-start;box-shadow:var(--shadow);overflow-y:auto;-webkit-overflow-scrolling:touch}
  .flash-face::-webkit-scrollbar{width:0}
  .flash-front{background:linear-gradient(150deg,var(--panel),var(--panel2))}
  .flash-back{background:linear-gradient(150deg,#15263a,var(--panel2));transform:rotateY(180deg)}
  .flash .tag{font-size:10px;font-weight:700;color:var(--acc);letter-spacing:.06em;margin-bottom:12px;text-align:center;flex:none}
  .flash .fq{font-size:15px;font-weight:700;line-height:1.55;margin-bottom:14px}
  .flash .a{font-size:13px;line-height:1.65;font-weight:500;color:var(--ink)}
  .flash .fopts{display:flex;flex-direction:column;gap:8px}
  .flash .fopt{display:flex;align-items:flex-start;gap:9px;font-size:12.5px;line-height:1.45;font-weight:500;
    border:1px solid var(--line);border-radius:10px;padding:9px 10px;background:rgba(0,0,0,.15)}
  .flash .fk{width:19px;height:19px;border-radius:6px;background:var(--panel2);border:1px solid var(--line);
    display:grid;place-items:center;font-size:11px;font-weight:700;flex:none;color:var(--sub);margin-top:1px}
  .flash .fopt.fok{border-color:var(--good);background:rgba(61,220,132,.14)}
  .flash .fk.fkok{background:var(--good);color:#04140a;border-color:var(--good)}
  .flash .hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:10px;color:var(--sub)}
  .flash .dformula{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--acc2);
    border-radius:10px;padding:14px 14px;font-family:'SF Mono','Menlo','Consolas','Courier New',monospace;font-size:14px;letter-spacing:0;font-weight:600;
    color:var(--acc2);margin-bottom:14px;line-height:1.9;text-align:left;overflow-wrap:anywhere}
  .flash .dmean{font-size:18px;font-weight:700;line-height:1.5;text-align:center;color:var(--ink);margin-bottom:12px}
  .flash .dunit{font-size:13px;color:var(--acc);text-align:center;font-weight:600;
    border-top:1px dashed var(--line);padding-top:11px}
  /* デッキ（公式/記号カード） */
  .deck-screen{display:flex;flex-direction:column;height:100%}
  .deck-flash{flex:1 1 auto;min-height:200px;max-height:420px;margin-bottom:12px}
  .deck-flash .flash-inner{height:100%;min-height:0}
  .deck-flash .flash-face{padding:18px}
  /* 記号一覧テーブル */
  .symtable-wrap{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--panel)}
  .symtable{width:100%;border-collapse:collapse;font-size:12.5px;background:var(--panel)}
  .symtable th{background:var(--panel2);color:var(--sub);font-weight:700;font-size:11px;
    padding:9px 8px;text-align:left;border-bottom:1px solid var(--line)}
  .symtable td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:top;line-height:1.45}
  .symtable tr:last-child td{border-bottom:none}
  .symtable tr:nth-child(even){background:var(--panel2)}
  .symtable .st-sym{font-weight:900;color:var(--acc2);font-size:17px;white-space:nowrap;width:50px;text-align:center}
  .symtable .st-read{color:var(--sub);font-size:11px;white-space:nowrap;width:72px}
  .symtable .st-mean{color:#eef2fb;font-size:13px;font-weight:500}
  .symtable .st-en{display:inline-block;margin-top:6px;font-size:10.5px;color:var(--acc);font-weight:700;
    border:1px solid rgba(61,214,196,.35);border-radius:5px;padding:1px 7px;letter-spacing:.02em}
  /* 記号一覧ここまで */

  /* ---------- Buttons ---------- */
  .actions{display:flex;gap:10px}
  .btn{flex:1;border:none;border-radius:13px;padding:15px;font-size:14px;font-weight:700;cursor:pointer;
    font-family:inherit;transition:transform .12s,opacity .15s;display:flex;align-items:center;justify-content:center;gap:7px}
  .btn:active{transform:scale(.97)}
  .btn.primary{background:linear-gradient(135deg,var(--acc),#2a9d8f);color:#04141a}
  .btn.ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
  .btn.bad{background:rgba(255,93,108,.16);color:#ff8a95;border:1px solid rgba(255,93,108,.3)}
  .btn.good{background:rgba(61,220,132,.16);color:var(--good);border:1px solid rgba(61,220,132,.3)}
  .btn:disabled{opacity:.4;pointer-events:none}

  /* ---------- Result ---------- */
  .result{text-align:center;padding:20px 6px}
  .result .big{font-family:'Bebas Neue';font-size:72px;line-height:1;letter-spacing:.02em}
  .result .big.pass{color:var(--good)}
  .result .big.fail{color:var(--bad)}
  .result .verdict{font-size:18px;font-weight:900;margin:6px 0 4px}
  .result .desc{font-size:12.5px;color:var(--sub);margin-bottom:22px;line-height:1.6}
  .rstat{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:22px}
  .rstat .box{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:14px 8px}
  .rstat .box .n{font-family:'Bebas Neue';font-size:28px;line-height:1}
  .rstat .box .l{font-size:10px;color:var(--sub);margin-top:4px}
  .rstat .box.ok .n{color:var(--good)}
  .rstat .box.ng .n{color:var(--bad)}

  /* ---------- Calc reference ---------- */
  .ref-card{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:16px;margin-bottom:12px}
  .ref-card h3{font-size:14px;font-weight:900;color:var(--acc2);margin-bottom:4px;display:flex;align-items:center;gap:8px}
  .ref-card .when{font-size:10.5px;color:var(--sub);margin-bottom:11px}
  .ref-card .formula{background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--acc2);
    border-radius:9px;padding:13px 14px;font-family:'SF Mono','Menlo','Consolas','Courier New',monospace;font-size:14px;letter-spacing:0;
    color:var(--acc2);margin-bottom:10px;line-height:2;font-weight:600;white-space:normal;overflow-wrap:anywhere;word-break:normal}
  .ref-card .note{font-size:12px;color:var(--sub);line-height:1.6}
  .ref-card .note b{color:var(--ink)}

  /* ---------- Bottom nav ---------- */
  nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;
    height:calc(54px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);
    background:#121829;backdrop-filter:blur(14px);
    border-top:1px solid var(--line);display:flex;z-index:10}
  nav button{flex:1;background:none;border:none;color:var(--sub);display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:3px;cursor:pointer;font-family:inherit;transition:color .15s;padding:0 2px}
  nav button .ni{font-size:18px;line-height:1}
  nav button .nl{font-size:9px;font-weight:700;white-space:nowrap}
  nav button.on{color:var(--acc)}

  .empty{text-align:center;color:var(--sub);font-size:13px;padding:50px 20px;line-height:1.7}
  .pill{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;
    background:var(--panel2);border:1px solid var(--line);color:var(--sub);margin:0 4px 8px 0}
  .pill.on{background:var(--acc);color:#04141a;border-color:var(--acc)}

  .toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--panel2);border:1px solid var(--line);color:var(--ink);padding:11px 18px;border-radius:12px;
    font-size:12.5px;font-weight:600;opacity:0;transition:all .3s;z-index:50;box-shadow:var(--shadow);pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .filter-row{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
  .filter-row::-webkit-scrollbar{height:0}
  .chip{flex:none;font-size:11.5px;font-weight:700;padding:8px 13px;border-radius:20px;border:1px solid var(--line);
    background:var(--panel);color:var(--sub);cursor:pointer;white-space:nowrap;transition:all .15s}
  .chip.on{background:var(--acc);color:#04141a;border-color:var(--acc)}
/* CBT電卓 */
.calcwrap{margin-top:12px}
.calc-toggle{width:100%;padding:11px;border:1px solid var(--line);background:var(--panel2);color:var(--ink);border-radius:10px;font-weight:700;font-size:14px}
.calc-pad{margin-top:8px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:10px}
.calc-disp{background:var(--bg);color:var(--ink);font-family:'SF Mono','Menlo','Consolas','Courier New',monospace;font-size:20px;text-align:right;padding:10px 12px;border-radius:8px;margin-bottom:8px;min-height:24px;word-break:break-all}
.calc-keys{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.calc-keys button{padding:14px 0;border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:8px;font-size:17px;font-weight:700;cursor:pointer}
.calc-keys button:active{background:var(--acc);color:#04201c}
.calc-keys .calc-eq{background:var(--acc);color:#04201c;border-color:var(--acc)}
.formula .fl,.dformula .fl{overflow-wrap:anywhere;word-break:normal;line-height:1.95}
.formula .fn,.dformula .fn{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif;font-size:11px;font-weight:500;color:var(--sub);line-height:1.5;letter-spacing:0;overflow-wrap:anywhere;word-break:normal;margin-top:1px}
.formula .fg,.dformula .fg{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans','Noto Sans JP',sans-serif;font-size:12.5px;font-weight:700;color:var(--acc2);line-height:1.5;overflow-wrap:anywhere;word-break:normal;margin-top:8px}
</style>
</head>
<body>
<div id="app">
  <header>

// ============================================================

const BANK = [];
// ============ 第1章：無人航空機に関する規則 ============
const Q_RULES = [
  {cat:1,lvl:"common",q:"無人航空機の定義として、機体の重量（機体本体＋バッテリー）の下限は何g以上か。",o:["50g以上","100g以上","150g以上","200g以上"],a:1,e:"航空法上の無人航空機は、機体本体とバッテリーの合計重量が100g以上のもの。100g未満は「模型航空機」として別の規制対象となる。",ref:"教則 第3章 無人航空機の定義（p.7）"},
  {cat:1,lvl:"common",q:"特定飛行に該当しないものを1つ選びなさい。",o:["夜間飛行","目視内・補助者ありの自宅敷地内（第三者の立入りなし）での飛行","人口集中地区（DID）上空での飛行","催し場所上空での飛行"],a:1,e:"第三者の立入りを管理した私有地での目視内飛行などは特定飛行に当たらない。夜間飛行・DID上空・催し場所上空はいずれも特定飛行。",ref:"教則 第3章 特定飛行（p.14）"},
  {cat:1,lvl:"common",q:"無人航空機を飛行させる際、原則として地表または水面からの高度何m以上の空域は特定飛行（許可・承認が必要）となるか。",o:["100m","120m","150m","200m"],a:2,e:"地表または水面から150m以上の高さの空域は特定飛行に該当し、原則として許可が必要。",ref:"教則 第3章 飛行の空域（p.14）"},
  {cat:1,lvl:"common",q:"飛行マニュアルに基づき、第三者から確保すべき水平距離（人又は物件との距離）は原則何m以上か。",o:["10m","20m","30m","50m"],a:2,e:"航空法では、人又は物件との間に30m以上の距離を保って飛行させることが原則として求められる（距離未満は特定飛行）。",ref:"教則 第3章 飛行の方法（p.14）"},
  {cat:1,lvl:"common",q:"カテゴリーⅢ飛行の説明として正しいものを1つ選びなさい。",o:["立入管理措置を講じた上で行う特定飛行","第三者の上空で行う、立入管理措置を講じない特定飛行","特定飛行に該当しない飛行","趣味目的の飛行のみを指す"],a:1,e:"カテゴリーⅢ飛行は立入管理措置を講じない＝第三者上空を飛行する最もリスクの高い飛行で、最も厳格な手続が必要。",ref:"教則 第3章 カテゴリー区分（p.14）"},
  {cat:1,lvl:"common",q:"カテゴリーⅡA飛行に含まれないものを1つ選びなさい。",o:["最大離陸重量25kg以上の機体の飛行","催し場所上空の飛行","高度150m以上の飛行","目視内での通常の夜間飛行（重量25kg未満・催し場所外）"],a:3,e:"カテゴリーⅡAは空港周辺・高度150m以上・催し場所上空・危険物輸送・物件投下・最大離陸重量25kg以上などリスクの高い飛行。それ以外のカテゴリーⅡはⅡB。",ref:"教則 第3章 カテゴリーⅡA/ⅡB（p.15）"},
  {cat:1,lvl:"common",q:"機体の登録について、登録記号の表示と併せて義務付けられているものは何か。",o:["GPSロガーの常時記録","リモートID機能による識別情報の発信","第三者賠償保険の証書携帯","操縦ライセンスの機体貼付"],a:1,e:"登録した無人航空機にはリモートID機能を備え、識別情報を電波で発信することが原則義務付けられている（一部例外あり）。",ref:"教則 第3章 機体の登録・リモートID（p.13）"},
  {cat:1,lvl:"common",q:"飛行日誌について、正しい記載が義務付けられる3種の記録の組合せはどれか。",o:["飛行記録・日常点検記録・点検整備記録","飛行記録・気象記録・通信記録","点検記録・整備記録・廃棄記録","飛行記録・事故記録・訓練記録"],a:0,e:"飛行日誌は「飛行記録」「日常点検記録」「点検整備記録」で構成され、特定飛行を行う際は備付け・記載が義務。",ref:"教則 第3章 飛行日誌（p.23）"},
  {cat:1,lvl:"common",q:"無人航空機の事故（人の死傷、第三者物件の損傷等）が発生した場合の対応として正しいものは。",o:["損害が軽微なら報告不要","直ちに飛行を中止し、負傷者の救護等の危険防止措置を講じ、国土交通大臣に報告する","保険会社にのみ連絡すればよい","次回の飛行日誌にまとめて記載すればよい"],a:1,e:"事故時はまず飛行中止と救護等の措置を講じ、その後、国土交通大臣（地方航空局）に報告する義務がある。",ref:"教則 第3章 事故等の報告（p.22）"},
  {cat:1,lvl:"common",q:"飲酒に関する規定として正しいものを1つ選びなさい。",o:["少量なら飛行は可能","アルコールまたは薬物の影響下では一切飛行させてはならない","操縦補助者の確認があれば可能","検査で基準値以下なら可能"],a:1,e:"アルコールまたは薬物の影響により正常な飛行ができないおそれがある間は、飛行させてはならない（量の多寡を問わない）。",ref:"教則 第3章 遵守事項（飲酒等）（p.21）"},
  {cat:1,lvl:"common",q:"夜間飛行を目視内で行う場合に必要な機体側の対応として最も適切なものは。",o:["予備バッテリーを多めに搭載する","機体の姿勢・方向が分かる灯火等を装備する","音声警報装置を装備する","パラシュートを装備する"],a:1,e:"夜間飛行では機体の向きや姿勢を視認できる灯火等が必要。灯火が無い場合は機体の姿勢確認が困難。",ref:"教則 第3章 夜間飛行の方法（p.15）"},
  {cat:1,lvl:"common",q:"物件投下に該当しないものを1つ選びなさい。",o:["農薬の散布","荷物を地上に置くために降下させ静かに離す（着地後に切り離す）","水の散布","資材の空中からの投下"],a:1,e:"着地させてから切り離す行為は物件投下に当たらない。空中から落とす・散布する行為が物件投下に該当する。",ref:"教則 第3章 物件投下（p.17）"},
  {cat:1,lvl:"common",q:"小型無人機等飛行禁止法により飛行が禁止・制限される対象として誤っているものは。",o:["国の重要施設（国会・首相官邸等）周辺","外国公館・防衛関係施設周辺","原子力事業所周辺","一般の住宅地全域"],a:3,e:"同法は国の重要施設・外国公館・防衛関係施設・空港・原子力事業所等の周辺を対象とする。一般住宅地全域が対象ではない。",ref:"教則 第3章 3.2.1 小型無人機等飛行禁止法（p.29）"},
  {cat:1,lvl:"common",q:"レベル3.5飛行の要件として正しいものを1つ選びなさい。",o:["補助者の配置が必須","技能証明の保有・保険加入・機上カメラ等の活用により補助者・看板を不要にできる目視外飛行","第三者上空を自由に飛行できる","高度制限がない"],a:1,e:"レベル3.5は技能証明保有＋第三者賠償保険加入＋デジタル技術（機上カメラ等）の活用を要件に、補助者や看板配置を不要とした目視外飛行（第4版で追記）。",ref:"教則 第3章 3.1.2 レベル3.5飛行（p.13）"},
  {cat:1,lvl:"one",q:"〔一等〕カテゴリーⅢ飛行の許可・承認審査において求められる、第一種機体認証と組み合わせる操縦者要件として正しいものは。",o:["二等技能証明","一等無人航空機操縦士の技能証明","講習修了証のみ","特になし"],a:1,e:"第三者上空（カテゴリーⅢ）飛行には、第一種機体認証を受けた機体と一等技能証明を有する操縦者の組合せが基本となる。",ref:"教則 第3章 機体認証と技能証明の組合せ〔一等〕（p.9）"},
  {cat:1,lvl:"common",q:"機体認証の種類について、第三者上空の飛行を想定し最も厳格な基準が適用されるのはどれか。",o:["第一種機体認証","第二種機体認証","型式認証","予備認証"],a:0,e:"第一種機体認証はカテゴリーⅢ飛行（第三者上空）を想定した最も厳格な安全基準。第二種はカテゴリーⅡ相当。",ref:"教則 第3章 機体認証の種類（p.9）"},
  {cat:1,lvl:"common",q:"次のうち、許可（空域に関する承認）が必要となる飛行はどれか。",o:["私有地の屋内での飛行","空港等周辺の進入表面等の上空の飛行","ネット等で完全に囲われた施設内の飛行","重量100g未満の機体の屋外飛行"],a:1,e:"空港等の周辺空域は航空機の安全に直結するため許可が必要。屋内や完全に囲われた空間は航空法の飛行規制対象外。",ref:"教則 第3章 飛行の空域（p.14）"},
  {cat:1,lvl:"common",q:"リモートID機能の搭載が免除される場合として誤っているものを1つ選びなさい。",o:["事前登録期間中（2022年6月19日まで）に登録した機体","長さ30m以内の紐等で係留して行う飛行","あらかじめ国に届け出た特定区域で必要な措置を講じて行う飛行","重量100g以上であれば常に免除される"],a:3,e:"リモートIDは原則搭載義務。免除は①事前登録機体②係留（30m以内）③リモートID特定区域④警察・海保等の秘匿業務に限られる。重量100g以上は免除理由にならない。",ref:"教則 第3章 3.1.2 リモートID機能の搭載の義務（p.13）"},
  {cat:1,lvl:"common",q:"無人航空機の登録に関する記述として正しいものはどれか。",o:["登録の有効期間は5年である","登録の有効期間は3年で、更新を受けなければ効力を失う","一度登録すれば更新は不要","重量に関係なく登録は任意"],a:1,e:"登録の有効期間は3年。3年ごとに更新を受けなければ効力を失う。所有者・使用者の氏名や住所の変更があれば変更の届出も必要。",ref:"教則 第3章 3.1.2 無人航空機の登録（p.13）"},
  {cat:1,lvl:"one",q:"〔一等〕カテゴリーⅡA飛行に該当するものとして正しいものはどれか。",o:["立入管理措置を講じた高度150m以上の飛行","第三者上空での特定飛行","特定飛行に該当しない目視内飛行","屋内での飛行"],a:0,e:"カテゴリーⅡAは立入管理措置を講じたカテゴリーⅡ飛行のうち、空港周辺・高度150m以上・催し場所上空・危険物輸送・物件投下・最大離陸重量25kg以上などリスクの高いもの。許可・承認が必要。",ref:"教則 第3章 3.1.1 カテゴリーⅡA飛行（p.7）"},
  {cat:1,lvl:"one",q:"〔一等〕機体認証の有効期間の組合せとして正しいものはどれか。",o:["第一種1年・第二種3年","第一種3年・第二種1年","第一種・第二種ともに1年","第一種・第二種ともに3年"],a:0,e:"機体認証の有効期間は第一種が1年、第二種が3年。一方、技能証明の有効期間は一等・二等ともに3年である点と混同しないこと。",ref:"教則 第3章 3.1.1 機体認証及び技能証明（p.7）"},
  {cat:1,lvl:"one",q:"〔一等〕特定飛行の飛行計画の通報について正しいものはどれか。",o:["通報は任意である","あらかじめ通報が原則だが、困難な場合は事後通報も認められる","通報先は警察署である","通報は飛行後3日以内でよい"],a:1,e:"特定飛行は、あらかじめドローン情報基盤システム（飛行計画通報機能）で国土交通大臣に通報するのが原則。あらかじめ困難な場合は事後通報も可。通報した計画に従って飛行する義務がある。",ref:"教則 第3章 3.1.2 飛行計画の通報等（p.13）"},
];

// ============ 第2章：無人航空機のシステム ============
const Q_SYSTEM = [
  {cat:2,lvl:"common",q:"マルチコプター（回転翼航空機）が前進する際の基本的な姿勢制御として正しいものは。",o:["後方ローターの回転数のみ上げる","機体を進行方向へ傾け（ピッチ）、推力の水平成分で前進する","左右のローターを停止させる","プロペラピッチを反転させる"],a:1,e:"マルチコプターは機体を進みたい方向に傾けることで推力に水平方向の分力を生み、その方向へ移動する。",ref:"教則 第4章 飛行原理（マルチコプター）（p.35）"},
  {cat:2,lvl:"common",q:"クアッドコプターで対角のローター同士を同方向に回す主な理由は何か。",o:["速度を上げるため","機体に生じる反トルクを打ち消し、ヨー方向の回転を防ぐため","消費電力を下げるため","騒音を減らすため"],a:1,e:"隣り合うローターを逆回転、対角を同回転にすることで反トルクが相殺され、機体が勝手に回転（ヨー）しない。ヨーは左右回転差で制御する。",ref:"教則 第4章 飛行原理・反トルク（p.44）"},
  {cat:2,lvl:"common",q:"リチウムポリマー（LiPo）バッテリーの取扱いとして誤っているものを1つ選びなさい。",o:["膨張（スウェリング）したものは使用を中止する","過充電・過放電を避ける","刺したり強い衝撃を与えない","残量0%で長期保管するのが望ましい"],a:3,e:"LiPoは過放電に弱く、長期保管はストレージ電圧（おおむね各セル3.8V前後）が望ましい。0%放置は劣化・発火リスクを高める。",ref:"教則 第4章 電源系統（バッテリー）（p.45）"},
  {cat:2,lvl:"common",q:"GNSS（GPS等）が利用できる環境で無人航空機が得られる主な利点はどれか。",o:["バッテリー容量の増加","自己位置の把握による位置保持（ホバリング安定）や自動帰還の精度向上","モーター出力の倍増","通信距離の無限化"],a:1,e:"GNSSにより機体は自己位置を把握でき、位置保持・自動帰還（RTH）・経路飛行の精度が向上する。",ref:"教則 第4章 機体の構成（測位）（p.50）"},
  {cat:2,lvl:"common",q:"IMU（慣性計測装置）が計測する主な物理量の組合せとして正しいものは。",o:["加速度と角速度","電圧と電流","気温と湿度","電波強度と周波数"],a:0,e:"IMUは加速度センサーとジャイロ（角速度センサー）等から成り、機体の姿勢・運動を検出する。",ref:"教則 第4章 機体のシステム（IMU）（p.42）"},
  {cat:2,lvl:"common",q:"電子コンパス（地磁気センサー）が誤差を生じやすい環境はどれか。",o:["開けた田園地帯","鉄塔・高圧線・鉄筋構造物の近く","海上の上空","快晴の屋外"],a:1,e:"地磁気センサーは強い磁場や鉄構造物の影響で狂いやすく、機体の方位誤認や飛行不安定の原因となる。離陸前のキャリブレーションが重要。",ref:"教則 第4章 地磁気センサー（p.49）"},

  {cat:4,lvl:"common",q:"天気図の等圧線の間隔と風の強さの関係として正しいものはどれか。",o:["等圧線の間隔が狭いほど気圧傾度が大きく風が強い","間隔が狭いほど風は弱い","間隔と風速は無関係である","間隔が広いほど風が強い"],a:0,e:"等圧線の間隔が狭い（密）ほど気圧傾度が大きく、風が強い。広いほど風は弱い。",ref:"教則 第6章 6.2.2 気象（等圧線）（p.72）"},

  {cat:4,lvl:"common",q:"日射により生じる上昇気流（サーマル）に関する記述として正しいものはどれか。",o:["地表が暖められて生じる上昇気流で、機体が予期せず持ち上げられることがある","下降気流のことである","夜間に最も強くなる","機体に影響しない弱い流れである"],a:0,e:"日射で地表が暖まると局所的な上昇気流（サーマル）が発生し、機体が持ち上げられて高度が乱れることがある。",ref:"教則 第6章 6.2.2 気象（上昇気流）（p.72）"},

  {cat:1,lvl:"common",q:"920MHz帯の小電力無線局（免許不要）の最大送信出力として正しいものはどれか。",o:["20mW","1W","100mW","10W"],a:0,e:"免許不要の920MHz帯小電力無線局の最大送信出力は20mW。技術基準適合証明等を受けた適合表示無線設備（技適マーク）であることが必要。",ref:"教則 第3章 3.2.2 電波法（無線局の種類）（p.31）"},
  {cat:1,lvl:"common",q:"パワードリフト機（Powered-lift）を飛行させるために必要な技能証明の限定はどれか。",o:["回転翼航空機（マルチローター）及び飛行機の両方の種類の限定","回転翼航空機（ヘリコプター）の限定のみ","飛行機の限定のみ","限定は不要"],a:0,e:"パワードリフト機は回転翼航空機（マルチローター）と飛行機の両方の特徴を併せ持つため、両方の種類の限定に係る資格が必要となる。",ref:"教則 第3章 3.1.2 無人航空機操縦者技能証明制度（p.27）"},
  {cat:2,lvl:"common",q:"回転翼航空機（マルチローター）のローター数と呼称の組合せとして正しいものはどれか。",o:["4＝クワッドコプター、6＝ヘキサコプター、8＝オクトコプター","4＝ヘキサコプター、6＝オクトコプター","4＝オクトコプター、8＝クワッドコプター","ローター数と呼称は無関係"],a:0,e:"マルチローターはローター数で呼称が異なり、4＝クワッドコプター、6＝ヘキサコプター、8＝オクトコプター。ローター数が多いほど故障耐性が向上しペイロードが増える。",ref:"教則 第4章 4.1.4 回転翼航空機（マルチローター）（p.35）"},
  {cat:2,lvl:"common",q:"無人航空機の高度センサに用いられる方式に含まれないものはどれか。",o:["地磁気を用いる方式","気圧センサを用いる方式","超音波センサを用いる方式","LiDAR（レーザー光）を用いる方式"],a:0,e:"高度の計測には気圧センサ・超音波センサ・LiDAR（レーザー光）等が用いられる。地磁気は方位の検出に用いられ、高度計測の方式ではない。",ref:"教則 第4章 4.4.1 高度センサ（p.42）"},
  {cat:2,lvl:"common",q:"バッテリーの容量（Ah）の求め方として正しいものはどれか。",o:["電流（A）×時間（h）","電圧（V）×電流（A）","電圧（V）×時間（h）","抵抗（Ω）×電流（A）"],a:0,e:"容量（Ah）は電流（A）×時間（h）で表され、満充電から終止電圧になるまでに利用できる電気量。放電電流や温度で利用可能な容量は変化する。",ref:"教則 第4章 4.4.2 無人航空機の主たる構成要素（p.43）"},
  {cat:2,lvl:"common",q:"ブラシレスモーターの特徴として正しいものはどれか。",o:["メンテナンスが容易で静音・長寿命である","ブラシの定期交換が必須である","構造が単純だが寿命が短い","回転方向に合わせる必要がない"],a:0,e:"ブラシレスモーターはブラシ交換が不要でメンテナンスが容易、静音・長寿命。ローターは回転方向（CW/CCW）に合わせた形状のものを取り付ける必要がある。",ref:"教則 第4章 4.4.2 モーター、ローター（p.43）"},
  {cat:2,lvl:"common",q:"無人航空機の動力源としての電動機とエンジン機の比較として正しいものはどれか。",o:["電動機は振動・騒音が少なく軽量化できるが飛行時間が短く、エンジン機は飛行時間が長いが騒音が大きい","電動機の方が飛行時間が長い","エンジン機の方が騒音が小さい","両者に差はない"],a:0,e:"電動機は振動・騒音が少なく軽量化できるが飛行時間が短い。エンジン機は飛行時間が長く長距離飛行が可能だが騒音が大きい。",ref:"教則 第4章 4.4.4 機体の動力源（p.45）"},
  {cat:2,lvl:"common",q:"リチウムポリマーバッテリーの特徴として正しいものはどれか。",o:["エネルギー密度が高く電圧が高い一方、電解質が可燃物である","エネルギー密度が低い","メモリ効果が非常に大きい","電解質は不燃性である"],a:0,e:"リチウムポリマーバッテリーはエネルギー密度が高い・電圧が高い・自己放電が少ない・メモリ効果が小さい・電解質が可燃物等の特徴がある。",ref:"教則 第4章 4.4.4 リチウムポリマーバッテリーの特徴（p.45）"},
  {cat:2,lvl:"common",q:"無人航空機に用いられるエンジンの種類に含まれないものはどれか。",o:["リニアモーターエンジン","ガソリンエンジン","ディーゼルエンジン","グローエンジン"],a:0,e:"エンジンには2ストローク・4ストローク、ガソリン・ディーゼル・ジェット・グローエンジン等がある。リニアモーターはエンジンの種類ではない。",ref:"教則 第4章 4.4.4 エンジン（p.46）"},
  {cat:2,lvl:"common",q:"169MHz帯の電波の主な用途として正しいものはどれか。",o:["2.4GHz帯・5.7GHz帯の無人移動体画像伝送システムのバックアップ回線","大容量映像伝送のメイン回線","携帯電話専用","操縦には使用できない"],a:0,e:"169MHz帯は主に2.4GHz帯・5.7GHz帯の無人移動体画像伝送システムの無線局のバックアップ回線として使用される。",ref:"教則 第4章 4.5.1 電波の周波数帯・用途（p.48）"},
  {cat:2,lvl:"common",q:"GNSSを構成する衛星測位システムの組合せとして正しいものはどれか。",o:["米国のGPS・ロシアのGLONASS・欧州のGalileo・日本のQZSS","日本のGPS・米国のGalileo","すべて米国が運用","衛星は1か国のみが運用"],a:0,e:"GNSSはGPS（米）に加え、GLONASS（露）、Galileo（欧）、準天頂衛星QZSS（日）等の総称（全球測位衛星システム）。最低4個以上の衛星から位置を計算する。",ref:"教則 第4章 4.5.3 GNSS（p.50）"},
  {cat:2,lvl:"common",q:"GNSSの測位精度に関する記述として正しいものはどれか。",o:["一般的に水平方向に比べ高度方向の誤差が大きくなる","高度方向の方が精度が高い","捕捉する衛星数は精度に影響しない","マルチパスは精度に影響しない"],a:0,e:"GNSSの位置精度は一般に水平方向に比べ高度方向の誤差が大きい。衛星の時計精度・捕捉衛星数・マルチパス・受信ノイズ等が精度に影響する。",ref:"教則 第4章 4.5.3 GNSSを使用した飛行における注意事項（p.50）"},
  {cat:3,lvl:"common",q:"安全運航のための点検プロセスに含まれないものはどれか。",o:["購入時の機体選定プロセス","飛行前の点検","飛行中の監視","飛行後の点検"],a:0,e:"点検プロセスは飛行前の準備、飛行前の点検、飛行中の監視、飛行後の点検、運航終了後の点検、異常事態発生時の点検。購入時の機体選定は含まれない。",ref:"教則 第5章 5.1.2 運航時の点検及び確認事項（p.52）"},
  {cat:3,lvl:"common",q:"無人航空機の保険の種類に関する記述として正しいものはどれか。",o:["機体やカメラ自体の損傷に対する機体保険と、運航による損害に対する損害賠償責任保険がある","強制加入の自賠責保険がある","保険は機体保険の1種類のみである","保険への加入は禁止されている"],a:0,e:"無人航空機の保険は任意保険で、機体やカメラ自体の損傷に対する機体保険と、運航による対物・対人の損害に対する損害賠償責任保険に大別される。",ref:"教則 第5章 5.1.4 保険及びセキュリティ（p.55）"},
  {cat:3,lvl:"common",q:"TEMを効果的に実践するためのCRMスキル（ノンテクニカルスキル）に含まれないものはどれか。",o:["機体の操縦技量（テクニカルスキル）","状況認識","意思決定","コミュニケーション"],a:0,e:"CRMスキル（ノンテクニカルスキル）は状況認識・意思決定・ワークロード管理・チームワーク・コミュニケーションの5つ。操縦技量はテクニカルスキルでこれとは別。",ref:"教則 第5章 5.4.1 CRM（p.62）"},
  {cat:3,lvl:"common",q:"ボルテックス・リング・ステートの予防に有効な操作として正しいものはどれか。",o:["前進させながら降下する","垂直に急降下する","降下速度をさらに速める","ローターの回転を止める"],a:0,e:"垂直降下や降下を伴う低速前進時にボルテックス・リング・ステートが発生しやすい。前進させながら降下することが予防に有効。",ref:"教則 第5章 5.2.1 降下（p.56）"},
  {cat:4,lvl:"common",q:"標準大気圧（1気圧）の値として正しいものはどれか。",o:["約1013hPa","約500hPa","約2000hPa","約760hPa"],a:0,e:"気圧の単位はヘクトパスカル（hPa）で、標準大気圧（1気圧）は約1013hPa。等圧線の間隔が狭いほど風は強い。",ref:"教則 第6章 6.2.1 気圧（p.70）"},
  {cat:4,lvl:"common",q:"気象庁風力階級表（ビューフォート風力階級）の段階数として正しいものはどれか。",o:["風力0から12までの13階級","風力1から10までの10階級","風力0から20までの21階級","階級は定められていない"],a:0,e:"風力は気象庁風力階級表（ビューフォート風力階級）により、風力0から12までの13階級で表す。天気図では矢羽根の数が風力を表す。",ref:"教則 第6章 6.2.2 風力（p.73）"},
  {cat:4,lvl:"common",q:"マイクロバーストの説明として正しいものはどれか。",o:["直径4km程度以下の下降流で、範囲は小さいが下降流はダウンバーストより強烈なことがある","直径100kmを超える大規模な現象である","上昇気流のことである","数日間継続する現象である"],a:0,e:"ダウンバーストは積乱雲等の強烈な下降流が地表で四方に広がる現象。そのうちマイクロバーストは直径4km程度以下で範囲は小さいが下降流がより強烈なことがある。",ref:"教則 第6章 6.2.2 ダウンバースト（p.73）"},
  {cat:4,lvl:"common",q:"雲の種類と降水の傾向の組合せとして正しいものはどれか。",o:["層雲系は連続的な降水、積雲系は断続的でしゅう雨性の降水を伴う傾向","層雲系は断続的、積雲系は連続的","どちらも降水を伴わない","雲形と降水は無関係"],a:0,e:"層雲系の雲では連続的な降水が、積雲系であれば断続的でしゅう雨性の降水を伴う傾向がある。",ref:"教則 第6章 6.2.2 雲と降水（p.72）"},

  {cat:4,lvl:"one",q:"〔一等〕安全確保措置のロバスト性の評価として正しいものはどれか。",o:["安全性の水準と保証の水準の低い方に準じて評価する","安全性の水準のみで評価する","高い方に準じて評価する","ロバスト性は評価しない"],a:0,e:"ロバスト性は安全性の水準（安全性の増加）と保証の水準（証明の方法）の双方を勘案し、低い方に準じて評価する。低・中・高の3水準がある。",ref:"教則 第6章 6.1.6 ロバスト性（p.68）"},
  {cat:4,lvl:"one",q:"〔一等〕空中リスクの低減における「戦術的対策」の説明として正しいものはどれか。",o:["飛行中に航空機との衝突を回避するための対策","飛行前に遭遇確率を下げる対策","機体を購入する際の対策","保険に加入する対策"],a:0,e:"戦略的対策は飛行前に航空機との遭遇確率やリスク暴露時間を下げる対策（時間帯・境界の限定等）。戦術的対策は飛行中に衝突を回避するための対策。",ref:"教則 第6章 6.1.6 リスク評価手法（空中リスク）（p.69）"},
  {cat:4,lvl:"common",q:"回転翼航空機（マルチローター）の離陸地点と操縦者・補助者との推奨距離として正しいものはどれか。",o:["3m以上（取扱説明書に推奨距離があればそれに従う）","必ず20m以上","必ず100m以上","距離の制限はない"],a:0,e:"マルチローターの離陸地点は操縦者・補助者と3m以上離す（取扱説明書に推奨距離があればそれに従う）。飛行機・ヘリは20m以上が推奨され、周囲の物件からは30m以上離す。",ref:"教則 第6章 6.3.3 回転翼航空機（マルチローター）（p.77）"},

// ============================================================
//  3択化ヘルパー（方式A：4択データから正解1＋誤答2を出題時に抽出）
//  - q.o[q.a] を必ず含め、残りからランダムに2つ選び、計3つをシャッフル
//  - 返り値: { opts:[3つの文章], ans:正解の表示index(0-2) }
//  - 3択未満（元データが3択以下）の場合はそのまま使う
// ============================================================
function make3(q){
  const correct = q.o[q.a];
  const wrongs = q.o.filter((_,i)=>i!==q.a);
  const pickW = shuffle(wrongs).slice(0,2);
  const opts = shuffle([correct, ...pickW]);
  return { opts, ans: opts.indexOf(correct) };
}

// ---------- Persistent state ----------
const KEY="ittou_state_v1";
let S = { known:{}, wrong:{}, seen:{}, streak:0, lastDay:null, history:[], attempts:{} };

async function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw) S = Object.assign(S, JSON.parse(raw));
  }catch(e){ /* first run */ }
  // streak day logic
  const today = new Date().toDateString();
  if(S.lastDay !== today){
    const y = new Date(Date.now()-864e5).toDateString();
    if(S.lastDay === y) S.streak += 1; else if(S.lastDay) S.streak = 1; else S.streak = 1;
    S.lastDay = today;
    save();
  }
}
function save(){ try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){} }

function clearSession(){ if(S.session){ delete S.session; save(); } }
function hasResume(){ const s=S.session; return !!(s && s.ids && s.ids.length && (s.i||0) < s.ids.length); }
function discardSession(){ clearSession(); renderHome(); setNavActive("home"); }
function resumeSession(){
  const s=S.session;
  if(!s||!s.ids){ renderHome(); setNavActive("home"); return; }
  const list=s.ids.map(id=>BANK[id]).filter(Boolean);
  if(list.length<s.ids.length*0.5){ clearSession(); toast("再開データを更新できませんでした"); renderHome(); setNavActive("home"); return; }
  const i=Math.min(s.i||0, list.length-1);
  Q={ list, i, sel:null, answered:false, correct:s.correct||0, wrongIds:(s.wrongIds||[]).slice(),
      mode:s.mode||"cat", timer:s.timer||0, tInt:null, mock:!!s.mock, learn:!!s.learn, view3:snap3(list) };
  renderQuiz();
  if(Q.mock && Q.timer>0){ tickTimer(); }
}
function resumeCardHTML(){
  const s=S.session, total=s.ids.length, pos=Math.min((s.i||0)+1,total);
  const ml={learn:"学習モード",cat:"分野別演習",review:"復習",mock:"本番模試"}[s.mode]||"演習";
  return `<div class="ref-card" style="border:1px solid var(--acc);margin-bottom:14px">
    <h3 style="color:var(--ink);font-size:13px">中断した${ml}があります</h3>
    <div class="note" style="margin-top:4px">${pos} / ${total}問まで進行（正解 ${s.correct||0}）</div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button class="btn primary" style="flex:1" onclick="resumeSession()">続きから再開</button>
      <button class="btn ghost" style="flex:none;padding:9px 16px" onclick="discardSession()">破棄</button>
    </div></div>`;
}

// 出題リストに対し、各問の3択スナップショット（opts/ans）を生成して保持。
// これにより「毎回ランダムな選択肢・配置」かつ採点が安定する。
function snap3(list){ return list.map(q=>make3(q)); }

function buildMock(){
  // 国家試験を想定：二等相当(common) 50問 ＋ 一等相当(one：計算含む) 20問 ＝ 70問
  // 一等20問の内訳は one(非計算)＋計算 をまとめてシャッフルし上限20問。
  const common = shuffle(BANK.filter(q=>q.lvl==="common"));
  const oneAll = shuffle(BANK.filter(q=>q.lvl==="one")); // cat5(計算)も lvl:"one" 想定
  const pick=(arr,n)=>arr.slice(0,Math.min(n,arr.length));
  return shuffle([...pick(common,50), ...pick(oneAll,20)]);
}

function startQuiz(mode,cat){
  clearInterval(Q.tInt);   // 前回のタイマー（特に模試）が残って誤作動するのを防ぐ
  let list, learn=false, mock=false;
  if(mode==="mock"){ list=buildMock(); mock=true; }
  else if(mode==="cat"){ list=shuffle(byCat(cat)); }
  else if(mode==="review"){ list=shuffle(BANK.filter(q=>S.wrong[q.id])); }
  else if(mode==="learn"){ list=shuffle(learnList(cat)); learn=true; } // cat=null:全章順次 / 数値:その章
  else { toast("対象の問題がありません"); return; }
  if(!list.length){ toast("対象の問題がありません"); return; }
  Q={list,i:0,sel:null,answered:false,correct:0,wrongIds:[],mode,timer:0,tInt:null,mock,learn,view3:snap3(list)};
  if(Q.mock){ Q.timer=75*60; tickTimer(); }
  renderQuiz();
}

// 学習モード：教則の順番（章順→章内はid順）で並べる。calc=null で全章、数値でその章のみ。
function learnList(cat){
  if(cat){ return BANK.filter(q=>q.cat===cat).slice().sort((a,b)=>a.id-b.id); }
  // 全章：LEARN_ORDER（教則章順）に従い、各章内はid昇順
  let out=[];
  for(const c of LEARN_ORDER){ out=out.concat(BANK.filter(q=>q.cat===c).slice().sort((a,b)=>a.id-b.id)); }
  return out;
}
function tickTimer(){
  clearInterval(Q.tInt);
  Q.tInt=setInterval(()=>{
    Q.timer--; const el=$("#qtimer"); 
    if(el){ const m=Math.floor(Q.timer/60),s=Q.timer%60; el.textContent=`${m}:${String(s).padStart(2,'0')}`; }
    if(Q.timer<=0){ clearInterval(Q.tInt); finishQuiz(); }
  },1000);
}

function renderQuiz(){
  Tview="quiz";
  const q=Q.list[Q.i];
  const v=Q.view3[Q.i];               // {opts:[3], ans:0-2}
  const total=Q.list.length;
  const tag = q.cat===5 ? `<span class="qtag one">計算〔一等〕</span>`
            : q.lvl==="one" ? `<span class="qtag one">一等</span>`
            : `<span class="qtag">${CATS[q.cat].short}</span>`;
  const tmr = Q.mock ? `<span class="qtimer" id="qtimer">75:00</span>` : "";
  const quitLabel = Q.learn ? "終了" : "中断";
  const heading = Q.learn
    ? `<div class="qcount">${Q.i+1}<small> / ${total}</small> <span style="font-size:11px;color:var(--sub);font-weight:600">学習</span></div>`
    : `<div class="qcount">${Q.i+1}<small> / ${total}</small></div>`;
  let h=`<div class="screen">
    <div class="qhead">
      ${heading}
      <div style="display:flex;align-items:center;gap:10px">${tmr}${tag}</div>
    </div>
    <div class="qmini-bar"><i style="width:${(Q.i)/total*100}%"></i></div>
    <div class="qcard">
      <div class="qnum">Q${Q.i+1}${q.calc?'・'+q.calc:''}</div>
      <div class="qtext">${fmtQ(q)}</div>
    </div>
    <div class="opts" id="opts">`;
  v.opts.forEach((opt,idx)=>{
    h+=`<button class="opt" data-i="${idx}" onclick="choose(${idx})"><span class="k">${"ABC"[idx]}</span><span>${opt}</span></button>`;
  });
  // 学習モードは「解答する」→即フィードバック→「次へ」。模試は従来通り。
  const firstBtn = Q.learn ? "解答する" : "解答する";
  h+=`</div><div id="exp"></div><div class="actions" id="qact">
    <button class="btn ghost" onclick="quitQuiz()" style="flex:.5">${quitLabel}</button>
    <button class="btn primary" id="nextBtn" disabled onclick="nextQ()">${firstBtn}</button>
  </div>${q.cat===5?calcPadHTML():''}</div>`;
  main.innerHTML=h; main.scrollTop=0;
  if(q.cat===5) calcExpr='';
  if(Q.mock){ tickTimer(); }
  saveSession();
}
// ---------- CBT電卓（計算問題用・四則＋√） ----------
let calcExpr='';
function calcPadHTML(){
  return `<div class="calcwrap">
    <button class="calc-toggle" onclick="toggleCalc()">🖩 電卓を開く／閉じる</button>
    <div class="calc-pad" id="calcPad" style="display:none">
      <div class="calc-disp" id="calcDisp">0</div>
      <div class="calc-keys">
        <button onclick="calcClear()">C</button>
        <button onclick="calcKey('(')">(</button>
        <button onclick="calcKey(')')">)</button>
        <button onclick="calcDel()">←</button>
        <button onclick="calcKey('7')">7</button>
        <button onclick="calcKey('8')">8</button>
        <button onclick="calcKey('9')">9</button>
        <button onclick="calcKey('/')">÷</button>
        <button onclick="calcKey('4')">4</button>
        <button onclick="calcKey('5')">5</button>
        <button onclick="calcKey('6')">6</button>
        <button onclick="calcKey('*')">×</button>
        <button onclick="calcKey('1')">1</button>
        <button onclick="calcKey('2')">2</button>
        <button onclick="calcKey('3')">3</button>
        <button onclick="calcKey('-')">−</button>
        <button onclick="calcKey('0')">0</button>
        <button onclick="calcKey('.')">.</button>
        <button onclick="calcKey('√')">√</button>
        <button onclick="calcKey('+')">＋</button>
        <button class="calc-eq" style="grid-column:span 4" onclick="calcEqual()">＝</button>
      </div>
    </div>
  </div>`;
}
function calcShow(){ const d=$("#calcDisp"); if(d) d.textContent = (calcExpr||'0').replace(/\*/g,'×').replace(/\//g,'÷'); }
function toggleCalc(){ const p=$("#calcPad"); if(p) p.style.display = (p.style.display==='none'?'block':'none'); }
function calcKey(k){ if(calcExpr==='エラー') calcExpr=''; calcExpr += (k==='√'?'√(':k); calcShow(); }
function calcClear(){ calcExpr=''; calcShow(); }
function calcDel(){ if(calcExpr==='エラー') calcExpr=''; else calcExpr=calcExpr.slice(0,-1); calcShow(); }
function calcEqual(){
  try{
    let e=calcExpr.replace(/√/g,'Math.sqrt').replace(/×/g,'*').replace(/÷/g,'/');
    if(!/^[0-9+\-*/().\sMathsqrt]*$/.test(e)){ calcExpr='エラー'; calcShow(); return; }
    const r=Function('"use strict";return ('+e+')')();
    calcExpr=(r==null||Number.isNaN(r)||!Number.isFinite(r))?'エラー':String(Math.round(r*1e6)/1e6);
  }catch(_){ calcExpr='エラー'; }
  calcShow();
}
function fmtQ(q){
  let t = q.q.replace(/\n/g,"<br>");
  /* 計算問題の公式表示は撤去（出題で答えを示さない） */
  return t;
}

function choose(idx){
  if(Q.answered) return;
  Q.sel=idx;
  document.querySelectorAll(".opt").forEach(o=>o.classList.toggle("sel",+o.dataset.i===idx));
  const b=$("#nextBtn"); b.disabled=false;
}

function nextQ(){
  const q=Q.list[Q.i];
  const v=Q.view3[Q.i];
  if(!Q.answered){
    // grade（3択：表示上の正解index v.ans と選択 Q.sel を比較）
    Q.answered=true;
    const correct = Q.sel===v.ans;
    S.seen[q.id]=true;
    if(correct){ Q.correct++; if(!Q.mock){ S.known[q.id]=true; } delete S.wrong[q.id]; }
    else { Q.wrongIds.push(q.id); S.wrong[q.id]=true; }
    S.attempts[q.id]=(S.attempts[q.id]||0)+1;
    save();
    document.querySelectorAll(".opt").forEach(o=>{
      const i=+o.dataset.i; o.classList.add("disabled");
      if(i===v.ans) o.classList.add("correct");
      else if(i===Q.sel) o.classList.add("wrong");
    });
    if(!Q.mock){
      $("#exp").innerHTML=`<div class="explain ${correct?'ok':'ng'}">
        <div class="res">${correct?'✓ 正解':'✗ 不正解'} — 正答は ${"ABC"[v.ans]}</div>
        <div class="body">${q.e.replace(/\n/g,"<br>")}</div>
        <div class="ref">📖 ${q.ref}</div></div>`;
    }
    const last = Q.i>=Q.list.length-1;
    $("#nextBtn").textContent = last ? "結果を見る" : "次の問題 →";
    $("#nextBtn").disabled=false;
  } else {
    Q.i++; Q.sel=null; Q.answered=false;
    if(Q.i>=Q.list.length){ finishQuiz(); } else renderQuiz();
  }
}

function quitQuiz(){
  clearInterval(Q.tInt);
  if(Q.learn){ renderHome(); setNavActive("home"); return; }
  if(confirm("演習を中断してホームに戻りますか？")){ renderHome(); setNavActive("home"); }
}

function finishQuiz(){
  Tview="result"; clearInterval(Q.tInt); clearSession();
  const total=Q.list.length, correct=Q.correct, wrong=total-correct;
  const pct=Math.round(correct/total*100);
  // 学習モードは合否でなく「一巡完了」として表示
  if(Q.mode==="learn"){
    S.history.push({t:Date.now(),mode:"learn",total,correct,pct,mock:false});
    if(S.history.length>50) S.history=S.history.slice(-50);
    save();
    let h=`<div class="screen result">
      <div class="big ${pct>=80?'pass':'fail'}">${pct}%</div>
      <div class="verdict">📚 学習一巡 完了</div>
      <div class="desc">この範囲を最後まで進めました（正解 ${correct}/${total}）。<br>間違えた問題は復習タブにまとまっています。</div>
      <div class="rstat">
        <div class="box ok"><div class="n">${correct}</div><div class="l">正解</div></div>
        <div class="box ng"><div class="n">${wrong}</div><div class="l">不正解</div></div>
        <div class="box"><div class="n">${total}</div><div class="l">問題数</div></div>
      </div>
      <div class="actions" style="flex-direction:column">
        ${Q.wrongIds.length?`<button class="btn bad" onclick="reviewThese()">✗ 間違えた${Q.wrongIds.length}問を復習</button>`:''}
        <button class="btn primary" onclick="renderHome();setNavActive('home')">ホームへ戻る</button>
      </div></div>`;
    main.innerHTML=h; main.scrollTop=0; refreshHeader(); return;
  }
  const pass = Q.mock ? pct>=90 : pct>=80;
  S.history.push({t:Date.now(),mode:Q.mode,total,correct,pct,mock:Q.mock});
  if(S.history.length>50) S.history=S.history.slice(-50);
  save();
  let note;
  if(Q.mock) note = pass?"合格基準（90%）クリア！この調子で本番に臨みましょう。":"本番は二等相当・一等とも各科目で高い正答率が必要。間違えた問題を復習で潰しましょう。";
  else note = pass?"よくできています。":"復習タブで弱点を重点的に固めましょう。";
  let h=`<div class="screen result">
    <div class="big ${pass?'pass':'fail'}">${pct}%</div>
    <div class="verdict">${pass?'🎉 合格ライン':'もう一歩'}</div>
    <div class="desc">${note}</div>
    <div class="rstat">
      <div class="box ok"><div class="n">${correct}</div><div class="l">正解</div></div>
      <div class="box ng"><div class="n">${wrong}</div><div class="l">不正解</div></div>
      <div class="box"><div class="n">${total}</div><div class="l">問題数</div></div>
    </div>
    <div class="actions" style="flex-direction:column">
      ${Q.wrongIds.length?`<button class="btn bad" onclick="reviewThese()">✗ 間違えた${Q.wrongIds.length}問を復習</button>`:''}
      <button class="btn primary" onclick="renderHome();setNavActive('home')">ホームへ戻る</button>
    </div></div>`;
  main.innerHTML=h; main.scrollTop=0; refreshHeader();
}
let _lastWrong=[];
function reviewThese(){
  _lastWrong=Q.wrongIds.slice();
  const list=shuffle(BANK.filter(q=>_lastWrong.includes(q.id)));
  Q={list,i:0,sel:null,answered:false,correct:0,wrongIds:[],mode:"review",timer:0,tInt:null,mock:false,learn:false,view3:snap3(list)};
  renderQuiz();
}

let D={list:[],i:0,flipped:false,kind:""};
function startDeck(kind){
  clearInterval(Q.tInt);
  const src = kind==="formula" ? FORMULA_CARDS : SYMBOL_CARDS;
  D={list:shuffle(src),i:0,flipped:false,kind};
  renderDeck();
}
function renderDeck(){
  Tview="deck";
  const c=D.list[D.i];
  const isF = D.kind==="formula";
  const title = isF ? "公式カード" : "記号・単語カード";
  const front = isF ? c.term : c.sym;
  const frontSize = isF ? "22px" : "44px";
  let backHtml;
  if(isF){
    backHtml = `<div class="dformula">${fmlHTML(c.formula)}</div>${c.note?`<div class="a" style="font-size:13px;text-align:center">${c.note}</div>`:''}`;
  }else{

    const rd = c.read ? `<div style="font-size:13px;color:var(--sub);text-align:center;margin-bottom:10px">読み: ${c.read}</div>` : '';
    backHtml = `${rd}<div class="dmean">${c.mean}</div>${en}`;
  }
  // 表面のタグに読みを併記（記号カードのみ）
  const frontTag = isF ? title : (c.read ? `${title}（${c.read}）` : title);
  let h=`<div class="screen deck-screen">
    <div class="qhead"><div class="qcount">${D.i+1}<small> / ${D.list.length}</small></div>
      <button class="btn ghost" style="flex:none;padding:9px 14px;font-size:12px" onclick="renderHome();setNavActive('home')">終了</button></div>
    <div class="qmini-bar"><i style="width:${(D.i+1)/D.list.length*100}%"></i></div>
    <div class="flash deck-flash ${D.flipped?'flipped':''}" id="flash" onclick="flipDeck()">
      <div class="flash-inner">
        <div class="flash-face flash-front" style="justify-content:center;text-align:center">
          <div class="tag">${frontTag}</div>
          <div style="font-size:${frontSize};font-weight:900;line-height:1.3">${front}</div>
          <div class="hint">タップで${isF?'公式':'意味'}を表示</div>
        </div>
        <div class="flash-face flash-back" style="justify-content:center">
          <div class="tag" style="color:var(--acc2);text-align:center">${front}</div>
          ${backHtml}
        </div>
      </div>
    </div>
    <div class="actions">
      <button class="btn ghost" onclick="prevDeck()" ${D.i===0?'disabled':''}>← 前</button>
      <button class="btn primary" onclick="nextDeck()">${D.i>=D.list.length-1?'最初に戻る ↻':'次へ →'}</button>
    </div></div>`;
  main.innerHTML=h; main.scrollTop=0;
}
function flipDeck(){ D.flipped=!D.flipped; $("#flash").classList.toggle("flipped",D.flipped); }
function nextDeck(){
  if(D.i+1 >= D.list.length){
    // 一周したら再シャッフル（直前のカードが先頭に来ないように）
    const last = D.list[D.i];
    let next = shuffle(D.list);
    if(next.length>1 && next[0]===last){ [next[0],next[next.length-1]]=[next[next.length-1],next[0]]; }
    D.list = next; D.i = 0;
  } else {
    D.i++;
  }
  D.flipped=false; renderDeck();
}
function prevDeck(){ if(D.i>0){ D.i--; D.flipped=false; renderDeck(); } }

function fmlHTML(str){
  return String(str).split("<br>").map(function(ln){
    var t=ln.trim();
    if(t.indexOf("「公式語呂」")>=0||t.indexOf("（公式語呂）")>=0||t.indexOf("（語呂覚え）")>=0){
      var g=t.replace(/^※/,"").replace("（公式語呂）","").replace("（語呂覚え）","").trim();
      return '<div class="fg">語呂「'+g+'」</div>';
    }
    if(t.charAt(0)==="※") return '<div class="fn">'+ln+'</div>';
    return '<div class="fl">'+ln+'</div>';
  }).join("");
}

    sub.forEach(q=>{
      h+=`<div class="ref-card" style="padding:13px 14px"><div style="font-size:13px;line-height:1.5;font-weight:500">${q.q.split("\n")[0]}</div>
        <div style="font-size:11px;color:var(--good);margin-top:7px">正答: ${q.o[q.a]}</div>
        <div style="font-size:10.5px;color:var(--sub);margin-top:5px;line-height:1.5">${q.e.split("\n")[0]}</div></div>`;
    });
  }
  h+=`</div>`;
  main.innerHTML=h; main.scrollTop=0;
}

// ============================================================
//  STATS
// ============================================================
function renderStats(){
  Tview="stats";
  const tot=BANK.length, kn=BANK.filter(q=>S.known[q.id]).length, seen=BANK.filter(q=>S.seen[q.id]).length;
  const wrong=BANK.filter(q=>S.wrong[q.id]).length;
  const mocks=S.history.filter(h=>h.mock);
  const lastMock=mocks[mocks.length-1];
  let h=`<div class="screen"><div class="sec-title">📊 学習成績</div>
    <div class="rstat" style="margin-bottom:14px">
      <div class="box ok"><div class="n">${kn}</div><div class="l">習得</div></div>
      <div class="box ng"><div class="n">${wrong}</div><div class="l">要復習</div></div>
      <div class="box"><div class="n">${Math.round(kn/tot*100)}<span style="font-size:14px">%</span></div><div class="l">全体習得率</div></div>
    </div>`;
  // per-category bars
  h+=`<div class="ref-card"><h3 style="color:var(--ink);font-size:13px">分野別 習得率</h3><div style="margin-top:6px">`;
  for(const c of [1,2,3,4,5]){
    const list=byCat(c), k=knownCount(list), p=list.length?Math.round(k/list.length*100):0;
    h+=`<div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:4px">
      <span>${CATS[c].icon} ${CATS[c].short}</span><span style="color:var(--sub)">${k}/${list.length}・${p}%</span></div>
      <div style="height:7px;background:var(--panel2);border-radius:4px;overflow:hidden"><i style="display:block;height:100%;width:${p}%;background:var(--acc);border-radius:4px"></i></div></div>`;
  }
  h+=`</div></div>`;
  // mock history
  h+=`<div class="ref-card"><h3 style="color:var(--ink);font-size:13px">模試の記録</h3>`;
  if(lastMock){
    h+=`<div class="note" style="margin-top:4px">直近: <b style="color:${lastMock.pct>=90?'var(--good)':'var(--bad)'}">${lastMock.pct}%</b>（${lastMock.correct}/${lastMock.total}）・${lastMock.pct>=90?'合格基準達成':'基準未達'}</div>`;
    const recent=mocks.slice(-6);
    h+=`<div style="display:flex;gap:6px;align-items:flex-end;height:70px;margin-top:14px">`;
    recent.forEach(m=>{ h+=`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
      <div style="width:100%;height:${Math.max(8,m.pct*0.55)}px;background:${m.pct>=90?'var(--good)':'var(--bad)'};border-radius:4px 4px 0 0"></div>
      <span style="font-size:9px;color:var(--sub)">${m.pct}</span></div>`; });
    h+=`</div>`;
  } else {
    h+=`<div class="note" style="margin-top:4px">まだ模試の記録がありません。「本番模試」に挑戦してみましょう。</div>`;
  }
  h+=`</div>`;
  h+=`<button class="btn ghost" style="margin-top:6px" onclick="resetAll()">学習データをリセット</button></div>`;
  main.innerHTML=h; main.scrollTop=0; refreshHeader();
}
async function resetAll(){
  if(!confirm("習得状況・復習リスト・成績をすべて消去します。よろしいですか？")) return;
  S={ known:{}, wrong:{}, seen:{}, streak:S.streak, lastDay:S.lastDay, history:[], attempts:{} };
  await save(); toast("リセットしました"); renderStats(); refreshHeader();
}

// ============================================================
//  NAV
// ============================================================
function setNavActive(name){
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("on",b.dataset.nav===name));
}
function setNav(name){
  clearInterval(Q.tInt);   // クイズ/模試から他タブへ移動したらタイマー停止
  setNavActive(name);
  if(name==="home") renderHome();
  else if(name==="symbols") renderSymbolTable();
  else if(name==="calc") renderCalc();
  else if(name==="review") renderReview();
  else if(name==="stats") renderStats();
}
document.querySelectorAll("nav button").forEach(b=>{
  b.addEventListener("click",()=>setNav(b.dataset.nav));
});

// ---------- boot ----------
(async()=>{ await load(); renderHome(); refreshHeader(); })();

// ---------- PWA: Service Worker 登録 ----------
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

</script>
